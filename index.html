// ═══ Spells & Kits Combined Panel ═══
function SpellKitsPanel({D,sel,vanillaSpells,vanillaKits,vanillaClasses,vanillaItems,detailVer,onGoToMod,spellids,kitcap,splstate,catMap}){
  const data=useContext(DC);const{t}=useLang();
  const[skTab,setSkTab]=useState(()=>LS.get(LK.SKTAB,'overview'));
  const[skFilter,setSkFilter]=useState('');
  const[expSplLv,setExpSplLv]=useState(null);
  useEffect(()=>{LS.set(LK.SKTAB,skTab)},[skTab]);

  // Overview data: resolve spell mods + kit mods summaries
  const spellOverview=useMemo(()=>{
    if(!vanillaSpells)return{mods:[],stats:{total:0,modified:0,added:0,conflicts:0}};
    const state={};
    Object.entries(vanillaSpells).forEach(([ref,sp])=>{state[ref]={...sp,ref,vanilla:true,activeMods:[],hasConflict:false}});
    let order=0;
    CO.filter(c=>catMap[c]).forEach(cat=>{(catMap[cat]||[]).forEach(mod=>{
      const detail=data._detailCache[mod.i];const spl=detail&&detail.spl;if(!spl)return;
      mod.co.forEach((comp,ci)=>{if(!sel[mod.i+'-'+ci])return;const entry=spl[''+ci];if(!entry)return;
        if(entry.spells)entry.spells.forEach(([ref,action,summary])=>{
          if(!state[ref])state[ref]={n:ref,type:'wizard',lv:0,ref,vanilla:false,activeMods:[],hasConflict:false};
          const me={modId:mod.i,modName:mod.n,compIdx:ci,compName:comp.n,action,summary,order,scope:entry.scope};
          if(!state[ref].activeMods.some(x=>x.modId===me.modId&&x.action===me.action&&x.summary===me.summary))state[ref].activeMods.push(me);
        });
        if(entry.new)entry.new.forEach(([ref,type,lv,school,name])=>{
          const me={modId:mod.i,modName:mod.n,compIdx:ci,compName:comp.n,action:'add',order,scope:entry.scope};
          if(!state[ref])state[ref]={n:name,type,lv,ref,vanilla:false,activeMods:[me],hasConflict:false};
          else if(!state[ref].activeMods.some(x=>x.modId===me.modId&&x.action===me.action))state[ref].activeMods.push(me);
        });
        order++;
      });
    })});
    Object.values(state).forEach(s=>{s.hasConflict=s.activeMods.filter(m=>m.action==='modify'||m.action==='replace').length>1});
    const all=Object.values(state);
    const modMap={};all.forEach(sp=>sp.activeMods.forEach(m=>{
      if(!modMap[m.modId])modMap[m.modId]={modId:m.modId,modName:m.modName,scope:m.scope||'tweaks',modifiedCount:0,addedCount:0,typeCounts:{wizard:0,priest:0,innate:0,hla:0},components:new Set()};
      if(m.action==='add')modMap[m.modId].addedCount++;else modMap[m.modId].modifiedCount++;
      const tKey=(sp.type==='hla'||sp.type==='innate'||sp.type==='special')?(sp.type==='hla'?'hla':'innate'):(sp.type==='priest'?'priest':'wizard');
      modMap[m.modId].typeCounts[tKey]=(modMap[m.modId].typeCounts[tKey]||0)+1;
      if(m.compName)modMap[m.modId].components.add(m.compName);
    }));
    Object.values(modMap).forEach(m=>{m.components=Array.from(m.components).sort()});
    return{mods:Object.values(modMap).sort((a,b)=>a.modName.localeCompare(b.modName)),stats:{total:all.length,modified:all.filter(s=>s.activeMods.length>0&&s.vanilla!==false).length,added:all.filter(s=>s.vanilla===false).length,conflicts:all.filter(s=>s.hasConflict).length}};
  },[sel,D,vanillaSpells,catMap,detailVer]);

  const kitOverview=useMemo(()=>{
    if(!vanillaKits)return{mods:[],classCounts:{}};
    const state={};
    Object.entries(vanillaKits).forEach(([ref,k])=>{state[ref]={...k,ref,vanilla:true,activeMods:[]}});
    let order=0;
    CO.filter(c=>catMap[c]).forEach(cat=>{(catMap[cat]||[]).forEach(mod=>{
      const detail=data._detailCache[mod.i];const kd=detail&&detail.kits;if(!kd)return;
      mod.co.forEach((comp,ci)=>{if(!sel[mod.i+'-'+ci])return;const entry=kd[''+ci];if(!entry)return;
        if(entry.kits)entry.kits.forEach(([ref,action,summary])=>{
          if(!state[ref])state[ref]={n:ref,class:'fighter',ref,vanilla:false,activeMods:[]};
          const me={modId:mod.i,modName:mod.n,compIdx:ci,compName:comp.n,action,summary,order};
          if(!state[ref].activeMods.some(x=>x.modId===me.modId))state[ref].activeMods.push(me);
        });
        if(entry.new)entry.new.forEach(([ref,cls,name])=>{
          const me={modId:mod.i,modName:mod.n,compIdx:ci,compName:comp.n,action:'add',summary:null,order};
          if(!state[ref])state[ref]={n:name,class:cls,ref,vanilla:false,activeMods:[me]};
          else if(!state[ref].activeMods.some(x=>x.modId===me.modId))state[ref].activeMods.push(me);
        });
        order++;
      });
    })});
    const modMap={};Object.values(state).forEach(k=>k.activeMods.forEach(m=>{
      if(!modMap[m.modId])modMap[m.modId]={modId:m.modId,modName:m.modName,modifiedCount:0,addedCount:0,addedKits:[],modifiedKits:[],components:new Set()};
      if(m.action==='add'){modMap[m.modId].addedCount++;modMap[m.modId].addedKits.push(k.n||k.ref)}
      else{modMap[m.modId].modifiedCount++;modMap[m.modId].modifiedKits.push(k.n||k.ref)}
      if(m.compName)modMap[m.modId].components.add(m.compName);
    }));
    // Convert Set to sorted array for stable render
    Object.values(modMap).forEach(m=>{m.components=Array.from(m.components).sort()});
    const cc={};const CLS=['fighter','ranger','paladin','cleric','druid','thief','bard','mage','sorcerer','monk','shaman','multi','npc'];
    CLS.forEach(c=>{const kits=Object.values(state).filter(k=>k.class===c);cc[c]={total:kits.length,affected:kits.filter(k=>k.activeMods.length>0).length}});
    // Subtab count: kits added + vanilla kits modified by selected mods
    const added=Object.values(state).filter(k=>!k.vanilla).length;
    const modified=Object.values(state).filter(k=>k.vanilla&&k.activeMods.length>0).length;
    return{mods:Object.values(modMap).sort((a,b)=>a.modName.localeCompare(b.modName)),classCounts:cc,added,modified};
  },[sel,D,vanillaKits,catMap,detailVer]);

  // Item overview: aggregate item mods from selected mods.
  // NOTE: `modifiedCount` depends on data._detailCache[mod.i] being loaded —
  // on cold start (before the mod's detail JSON is fetched) it will read 0 and
  // the card will show only `addedCount`. `detailVer` in the deps array triggers
  // re-aggregation once detail caches populate, so the counts self-correct.
  const itemOverview=useMemo(()=>{
    const modMap={};
    let totalAddedItems=0;
    const typeTotals={};
    const modifiedRefs=new Set();
    CO.filter(c=>catMap[c]).forEach(cat=>{(catMap[cat]||[]).forEach(mod=>{
      const detail=data._detailCache[mod.i];const itemData=detail&&detail.items;
      mod.co.forEach((comp,ci)=>{if(!sel[mod.i+'-'+ci])return;
        // Per-mod bucket allocation (may have both new items and modifies)
        const hasItems=(comp.it||0)>0||(itemData&&itemData[''+ci]&&itemData[''+ci].modify&&itemData[''+ci].modify.length);
        if(!hasItems)return;
        if(!modMap[mod.i])modMap[mod.i]={modId:mod.i,modName:mod.n,addedCount:0,modifiedCount:0,typeCounts:{},modifiedRefs:new Set(),components:new Set()};
        if(comp.n)modMap[mod.i].components.add(comp.n);
        // Count unique vanilla items touched by modify entries (per-mod + global)
        if(itemData){const entry=itemData[''+ci];if(entry&&entry.modify)entry.modify.forEach(([ref])=>{modifiedRefs.add(ref);modMap[mod.i].modifiedRefs.add(ref)})}
        const it=comp.it||0;
        modMap[mod.i].addedCount+=it;
        totalAddedItems+=it;
        const itC=comp.itC||{};
        Object.entries(itC).forEach(([type,count])=>{
          modMap[mod.i].typeCounts[type]=(modMap[mod.i].typeCounts[type]||0)+count;
          typeTotals[type]=(typeTotals[type]||0)+count;
        });
      });
    })});
    // Finalize per-mod modifiedCount from the Set + components to sorted array
    Object.values(modMap).forEach(m=>{m.modifiedCount=m.modifiedRefs.size;delete m.modifiedRefs;m.components=Array.from(m.components).sort()});
    return{mods:Object.values(modMap).sort((a,b)=>a.modName.localeCompare(b.modName)),total:totalAddedItems,typeTotals,modified:modifiedRefs.size,added:totalAddedItems};
  },[sel,D,catMap,detailVer,data]);

  const navigateToMod=(modId)=>{const mod=D.find(m=>m.i===modId);if(mod)onGoToMod(mod)};

  return(<div style={{display:'flex',flexDirection:'column',flex:1,overflow:'hidden'}}>
    <div style={{display:'flex',alignItems:'center',gap:0,padding:'4px 12px 0',borderBottom:'1px solid var(--brd)',background:'var(--bgs)',flexWrap:'wrap'}}>
      <div style={{display:'flex',gap:0,flexShrink:0}}>
        {[['overview',t('ski.overview','Overview')],['spells',t('ski.spells','Spells')],['kits',t('ski.kits','Kits')],['items',t('ski.items','Items')]].map(([k,label])=>{
          let count='';
          if(k==='items'){const n=(itemOverview.modified||0)+(itemOverview.added||0);if(n>0)count=' ('+n+')'}
          else if(k==='spells'){const n=(spellOverview.stats.modified||0)+(spellOverview.stats.added||0);if(n>0)count=' ('+n+')'}
          else if(k==='kits'){const n=(kitOverview.modified||0)+(kitOverview.added||0);if(n>0)count=' ('+n+')'}
          return <div key={k} className={"spell-subtab"+(skTab===k?' ac':'')} onClick={()=>setSkTab(k)} style={{padding:'6px 14px',cursor:'pointer',fontSize:'.84rem'}}>{label}{count}</div>;
        })}
      </div>
      <div style={{flex:1,display:'flex',justifyContent:'center'}}>
        {skTab!=='overview'&&<div style={{width:'100%',maxWidth:300}}><input className="sx" placeholder={skTab==='spells'?t('ski.search_spells','Search spells...'):skTab==='kits'?t('ski.search_kits','Search kits...'):t('ski.search_items','Search items...')} value={skFilter} onChange={e=>setSkFilter(e.target.value)} style={{fontSize:'.78rem',padding:'4px 8px'}}/></div>}
      </div>
      <div style={{display:'flex',gap:4,alignItems:'center',flexShrink:0,padding:'2px 0'}}>
        {Object.entries(ACTION_STYLES).map(([k,[label,cls]])=><span key={k} className={"action-badge "+cls} style={{fontSize:'.52rem',padding:'1px 4px'}}>{label}</span>)}
      </div>
    </div>
    <div style={{flex:1,overflow:'auto'}}>
    {skTab==='overview'&&<div style={{padding:'16px'}}>
      {/* ═══ SPELL.IDS section ═══ */}
      {spellids&&<div style={{marginBottom:20}}>
        <div style={{display:'flex',alignItems:'baseline',gap:10,marginBottom:6}}>
          <h3 style={{fontSize:'.85rem',color:'var(--tx)',margin:0}}>SPELL.IDS</h3>
          <span style={{fontSize:'.72rem',color:'var(--txd)'}}><span style={{color:'var(--pur)',fontWeight:600}}>{spellids.total}</span>/891 ({spellids.base} vanilla + {spellids.modSP} mods) · Cap: 50/level</span>
        </div>
        {spellids.overCount>0&&<div style={{fontSize:'.78rem',color:'var(--red)',fontWeight:600,marginBottom:6}}>{"\u26a0"} {spellids.overCount} spell level{spellids.overCount!==1?'s':''} over the 50-slot cap!</div>}
        <div style={{display:'flex',gap:4,flexWrap:'wrap',marginBottom:4}}>
          {Object.keys(VANILLA_SPELLS).map((k,i)=>{const lv=spellids.levels[k];if(!lv)return null;const CAP=LIMITS.SPELL_LEVEL_CAP;const danger=lv.total>CAP;const warn=lv.total>40;const hasContribs=spellids.contribsByLv[k];const isDiv=k.startsWith('p');
            return <React.Fragment key={k}>{i===9&&<div style={{width:4}}/>}<div style={{background:danger?'rgba(248,113,113,.12)':warn?'rgba(251,146,60,.08)':'var(--bg2)',border:'1px solid '+(danger?'rgba(248,113,113,.4)':warn?'rgba(251,146,60,.3)':'var(--brd)'),borderRadius:4,padding:'2px 5px',minWidth:46,textAlign:'center',cursor:hasContribs?'pointer':'default'}} onClick={()=>{if(hasContribs)setExpSplLv(expSplLv===k?null:k)}} title={(isDiv?'Divine':'Arcane')+' L'+k.slice(1)}>
              <div style={{fontSize:'.55rem',color:'var(--txd)'}}>{isDiv?'D':'A'}{k.slice(1)}</div>
              <div style={{fontSize:'.72rem',fontWeight:600,color:danger?'var(--red)':warn?'var(--org)':'var(--pur)'}}>{lv.total}<span style={{color:'var(--txd)',fontWeight:400,fontSize:'.6rem'}}>/{CAP}</span></div>
            </div></React.Fragment>})}
        </div>
        {expSplLv&&spellids.contribsByLv[expSplLv]&&<div style={{padding:'4px 8px',background:'var(--bg2)',borderRadius:4,border:'1px solid var(--brd)',marginBottom:4}}>
          <div style={{fontSize:'.68rem',color:'var(--txd)',marginBottom:2}}>{expSplLv.startsWith('w')?'Arcane':'Divine'} L{expSplLv.slice(1)} contributors:</div>
          {spellids.contribsByLv[expSplLv].sort((a,b)=>b.n-a.n).map((c,i)=><div key={i} style={{display:'flex',justifyContent:'space-between',fontSize:'.72rem',padding:'1px 0'}}><span><span style={{color:'var(--tx)'}}>{c.comp}</span> <span style={{color:'var(--txd)'}}>({c.mod})</span></span><span style={{color:'var(--pur)',fontWeight:600}}>+{c.n}</span></div>)}
        </div>}
        {spellOverview.mods.length>0&&<>
          <h3 style={{fontSize:'.85rem',color:'var(--tx)',margin:'12px 0 8px'}}>Spell Mods ({spellOverview.mods.length})</h3>
          <div className="spell-overview-grid">
            {spellOverview.mods.map(sm=>{
              const typeEntries=[['wizard','wizard','#60a5fa'],['priest','priest','var(--gold)'],['innate','innate','var(--cyn)'],['hla','HLA','var(--pur)']].filter(([k])=>(sm.typeCounts&&sm.typeCounts[k])>0);
              const tip=<>
                <span className="tip-title">{sm.modName}</span>
                <span className="tip-meta">{sm.modifiedCount>0?sm.modifiedCount+' modified':''}{sm.modifiedCount>0&&sm.addedCount>0?' \u00b7 ':''}{sm.addedCount>0?sm.addedCount+' new':''}{' \u00b7 '+sm.scope}</span>
                {typeEntries.length>0&&<span className="tip-desc"><b style={{color:'var(--txd)'}}>By type:</b> {typeEntries.map(([k,label])=>label+' '+sm.typeCounts[k]).join(', ')}</span>}
                {sm.components&&sm.components.length>0&&<span className="tip-desc" style={{marginTop:3}}><b style={{color:'var(--txd)'}}>Components:</b> {sm.components.join(' \u00b7 ')}</span>}
              </>;
              return <Tip key={sm.modId} content={tip}>
                <div className="spell-mod-card" onClick={()=>navigateToMod(sm.modId)}>
                  <div className="mod-name">{sm.modName}</div>
                  <div className="mod-stats">{sm.modifiedCount>0&&<span>{sm.modifiedCount} modified</span>}{sm.modifiedCount>0&&sm.addedCount>0&&' \u00b7 '}{sm.addedCount>0&&<span>{sm.addedCount} new</span>}{' '}<span className={"bd "+(sm.scope==='overhaul'?'bd3':sm.scope==='additions'?'bd1':'bd2')} style={{fontSize:'.52rem'}}>{sm.scope}</span></div>
                  {typeEntries.length>0&&<div style={{display:'flex',gap:3,flexWrap:'wrap',marginTop:3}}>
                    {typeEntries.map(([k,label,color])=><span key={k} style={{fontSize:'.52rem',padding:'0 4px',borderRadius:6,background:'var(--bg)',color,border:'1px solid var(--brd)'}}>{label} {sm.typeCounts[k]}</span>)}
                  </div>}
                </div>
              </Tip>;
            })}
          </div>
        </>}
      </div>}

      {/* ═══ KIT.IDS section ═══ */}
      {kitcap&&<div style={{marginBottom:20}}>
        <div style={{display:'flex',alignItems:'baseline',gap:10,marginBottom:6}}>
          <h3 style={{fontSize:'.85rem',color:'var(--tx)',margin:0}}>KIT.IDS</h3>
          <span style={{fontSize:'.72rem',color:'var(--txd)'}}><span style={{color:'var(--blu)',fontWeight:600}}>{kitcap.total}</span>/{LIMITS.KIT_CAP} ({kitcap.base} vanilla + {kitcap.modKits} mods) · Cap: {LIMITS.KIT_CAP}</span>
        </div>
        {kitcap.total>LIMITS.KIT_CAP&&<div style={{fontSize:'.78rem',color:'var(--red)',fontWeight:600,marginBottom:6}}>{"\u26a0"} Over the {LIMITS.KIT_CAP} kit limit by {kitcap.total-LIMITS.KIT_CAP}! Game will crash.</div>}
        {kitcap.total>LIMITS.KIT_CRIT&&kitcap.total<=LIMITS.KIT_CAP&&<div style={{fontSize:'.78rem',color:'var(--red)',fontWeight:600,marginBottom:6}}>{"\u26a0"} Very close to the {LIMITS.KIT_CAP} kit limit!</div>}
        {kitcap.total>LIMITS.KIT_WARN&&kitcap.total<=LIMITS.KIT_CRIT&&<div style={{fontSize:'.78rem',color:'var(--org)',marginBottom:6}}>Caution: Approaching the {LIMITS.KIT_CAP} kit limit.</div>}
        <div style={{display:'flex',gap:4,flexWrap:'wrap',marginBottom:4}}>
          {Object.entries(kitOverview.classCounts).map(([cls,ct])=>{
            const col=KIT_CLASS_COLORS[cls]||'var(--txd)';
            return <div key={cls} style={{background:ct.affected>0?'rgba(96,165,250,.06)':'var(--bg2)',border:'1px solid '+(ct.affected>0?'rgba(96,165,250,.25)':'var(--brd)'),borderRadius:4,padding:'2px 6px',cursor:'pointer',minWidth:46,textAlign:'center'}} onClick={()=>setSkTab('kits')} title={KIT_CLASS_LABELS[cls]+': '+ct.total+' kits'+(ct.affected>0?', '+ct.affected+' affected':'')}>
              <div style={{fontSize:'.55rem',color:col,fontWeight:600}}>{KIT_CLASS_LABELS[cls]}</div>
              <div style={{fontSize:'.72rem',fontWeight:600,color:ct.affected>0?col:'var(--txd)'}}>{ct.total}</div>
            </div>;
          })}
        </div>
        {kitOverview.mods.length>0&&<>
          <h3 style={{fontSize:'.85rem',color:'var(--tx)',margin:'12px 0 8px'}}>Kit Mods ({kitOverview.mods.length})</h3>
          <div className="spell-overview-grid">
            {kitOverview.mods.map(m=>{
              const tip=<>
                <span className="tip-title">{m.modName}</span>
                <span className="tip-meta">{m.modifiedCount>0?m.modifiedCount+' modified':''}{m.modifiedCount>0&&m.addedCount>0?' \u00b7 ':''}{m.addedCount>0?m.addedCount+' new':''}</span>
                {m.addedKits&&m.addedKits.length>0&&<span className="tip-desc"><b style={{color:'var(--grn)'}}>Adds:</b> {m.addedKits.slice(0,8).join(', ')}{m.addedKits.length>8?' \u2026':''}</span>}
                {m.modifiedKits&&m.modifiedKits.length>0&&<span className="tip-desc"><b style={{color:'var(--blu)'}}>Modifies:</b> {m.modifiedKits.slice(0,8).join(', ')}{m.modifiedKits.length>8?' \u2026':''}</span>}
                {m.components&&m.components.length>0&&<span className="tip-desc" style={{marginTop:3}}><b style={{color:'var(--txd)'}}>Components:</b> {m.components.join(' \u00b7 ')}</span>}
              </>;
              return <Tip key={m.modId} content={tip}>
                <div className="spell-mod-card" onClick={()=>navigateToMod(m.modId)}>
                  <div className="mod-name">{m.modName}</div>
                  <div className="mod-stats">{m.modifiedCount>0&&<span>{m.modifiedCount} modified</span>}{m.modifiedCount>0&&m.addedCount>0&&' \u00b7 '}{m.addedCount>0&&<span>{m.addedCount} new</span>}</div>
                </div>
              </Tip>;
            })}
          </div>
        </>}
        {kitOverview.mods.length===0&&kitcap.modKits===0&&<div style={{fontSize:'.74rem',color:'var(--txd)'}}>No selected mods have known ADD_KIT contributions.</div>}
      </div>}

      {/* ═══ SPLSTATE.IDS section ═══ */}
      {splstate&&<div style={{marginBottom:20}}>
        <div style={{display:'flex',alignItems:'baseline',gap:10,marginBottom:4}}>
          <h3 style={{fontSize:'.85rem',color:'var(--tx)',margin:0}}>SPLSTATE.IDS</h3>
          <span style={{fontSize:'.72rem',color:'var(--txd)'}}><span style={{color:'var(--cyn)',fontWeight:600}}>{splstate.total}</span>/{LIMITS.SPLSTATE_CAP} ({splstate.base} base + {splstate.modSS} mods) · Cap: {LIMITS.SPLSTATE_CAP}</span>
        </div>
        {splstate.total>LIMITS.SPLSTATE_CAP&&<div style={{fontSize:'.78rem',color:'var(--red)',fontWeight:600,marginBottom:4}}>{"\u26a0"} Over the {LIMITS.SPLSTATE_CAP} limit by {splstate.total-LIMITS.SPLSTATE_CAP}! Game may crash during combat or spellcasting.</div>}
        {splstate.total>LIMITS.SPLSTATE_CRIT&&splstate.total<=LIMITS.SPLSTATE_CAP&&<div style={{fontSize:'.78rem',color:'var(--red)',fontWeight:600,marginBottom:4}}>Warning: Very close to the {LIMITS.SPLSTATE_CAP} limit!</div>}
        {splstate.total>LIMITS.SPLSTATE_WARN&&splstate.total<=LIMITS.SPLSTATE_CRIT&&<div style={{fontSize:'.78rem',color:'var(--org)',marginBottom:4}}>Caution: Approaching the {LIMITS.SPLSTATE_CAP} limit.</div>}
        {splstate.contribs.length>0&&<>
          <h3 style={{fontSize:'.85rem',color:'var(--tx)',margin:'8px 0 8px'}}>SPLSTATE Mods ({splstate.contribs.length})</h3>
          <div className="spell-overview-grid">
            {(()=>{const map={};splstate.contribs.forEach(c=>{if(!map[c.mod])map[c.mod]={mod:c.mod,ss:0,comps:[]};map[c.mod].ss+=c.ss;map[c.mod].comps.push(c.comp)});return Object.values(map).sort((a,b)=>a.mod.localeCompare(b.mod)).map((c,i)=><div key={i} className="spell-mod-card" title={c.comps.join(', ')}>
              <div className="mod-name">{c.mod}</div>
              <div className="mod-stats">+{c.ss} entries</div>
            </div>)})()}
          </div>
        </>}
        {splstate.contribs.length===0&&splstate.modSS===0&&<div style={{fontSize:'.74rem',color:'var(--txd)'}}>No selected mods have known SPLSTATE.IDS contributions.</div>}
      </div>}

      {/* ═══ ITEMS section ═══ */}
      {itemOverview.mods.length>0&&<div style={{marginBottom:20}}>
        <div style={{display:'flex',alignItems:'baseline',gap:10,marginBottom:6}}>
          <h3 style={{fontSize:'.85rem',color:'var(--tx)',margin:0}}>ITEMS</h3>
          <span style={{fontSize:'.72rem',color:'var(--txd)'}}><span style={{color:'var(--org)',fontWeight:600}}>+{itemOverview.total}</span> new items from {itemOverview.mods.length} mod{itemOverview.mods.length!==1?'s':''}</span>
        </div>
        {Object.keys(itemOverview.typeTotals).length>0&&<div style={{display:'flex',gap:4,flexWrap:'wrap',marginBottom:8}}>
          {Object.entries(itemOverview.typeTotals).sort((a,b)=>b[1]-a[1]).map(([type,count])=>
            <span key={type} style={{fontSize:'.62rem',padding:'1px 6px',borderRadius:8,background:'var(--bg2)',color:ITEM_CAT_COLORS[type]||'var(--txd)',border:'1px solid var(--brd)'}}>{type} <b>{count}</b></span>
          )}
        </div>}
        <h3 style={{fontSize:'.85rem',color:'var(--tx)',margin:'4px 0 8px'}}>Item Mods ({itemOverview.mods.length})</h3>
        <div className="spell-overview-grid">
          {itemOverview.mods.map(m=>{
            const topTypes=Object.entries(m.typeCounts||{}).sort((a,b)=>b[1]-a[1]).slice(0,4);
            const allTypes=Object.entries(m.typeCounts||{}).sort((a,b)=>b[1]-a[1]);
            const tip=<>
              <span className="tip-title">{m.modName}</span>
              <span className="tip-meta">{m.modifiedCount>0?m.modifiedCount+' modified':''}{m.modifiedCount>0&&m.addedCount>0?' \u00b7 ':''}{m.addedCount>0?m.addedCount+' new':''}</span>
              {allTypes.length>0&&<span className="tip-desc"><b style={{color:'var(--txd)'}}>By type:</b> {allTypes.map(([t,c])=>t+' '+c).join(', ')}</span>}
              {m.components&&m.components.length>0&&<span className="tip-desc" style={{marginTop:3}}><b style={{color:'var(--txd)'}}>Components:</b> {m.components.join(' \u00b7 ')}</span>}
            </>;
            return <Tip key={m.modId} content={tip}>
              <div className="spell-mod-card" onClick={()=>navigateToMod(m.modId)}>
                <div className="mod-name">{m.modName}</div>
                <div className="mod-stats">{m.modifiedCount>0&&<span>{m.modifiedCount} modified</span>}{m.modifiedCount>0&&m.addedCount>0&&' \u00b7 '}{m.addedCount>0&&<span>{m.addedCount} new</span>}</div>
                {topTypes.length>0&&<div style={{display:'flex',gap:3,flexWrap:'wrap',marginTop:3}}>
                  {topTypes.map(([type,count])=><span key={type} style={{fontSize:'.52rem',padding:'0 4px',borderRadius:6,background:'var(--bg)',color:ITEM_CAT_COLORS[type]||'var(--txd)',border:'1px solid var(--brd)'}}>{type} {count}</span>)}
                </div>}
              </div>
            </Tip>;
          })}
        </div>
      </div>}

      {spellOverview.mods.length===0&&kitOverview.mods.length===0&&splstate.modSS===0&&itemOverview.mods.length===0&&<div className="spell-empty"><h3>No Spell, Kit, Item, or SPLSTATE Mods Selected</h3><p>Select mods in the Mods tab to see their impact on spells, kits, items, and engine limits.</p></div>}
    </div>}
    {skTab==='spells'&&<SpellsPanel D={D} sel={sel} vanillaSpells={vanillaSpells} detailVer={detailVer} onGoToMod={onGoToMod} spellids={spellids} catMap={catMap} filter={skFilter}/>}
    {skTab==='kits'&&<KitsPanel D={D} sel={sel} vanillaKits={vanillaKits} vanillaClasses={vanillaClasses} detailVer={detailVer} onGoToMod={onGoToMod} kitcap={kitcap} catMap={catMap} filter={skFilter}/>}
    {skTab==='items'&&<ItemsPanel vanillaItems={vanillaItems} D={D} sel={sel} catMap={catMap} detailVer={detailVer} onGoToMod={onGoToMod} filter={skFilter}/>}
    </div>
  </div>);
}

// Pure helpers for portrait resolution — stateless, reusable across renders.
const npcHasConflict=(npc)=>PHASES.some(p=>npc.phases[p]&&npc.phases[p].all.length>1);
const npcIsAffected=(npc)=>npc.allEntries.length>0;
const npcModCount=(npc)=>{const s=new Set();npc.allEntries.forEach(e=>s.add(e.modId));return s.size};
const npcPrimaryPhase=(npc)=>{for(const p of['bg2','bg1','sod','tob']){if(npc.phases[p])return p}return PHASES.find(p=>npc.phases[p])||null};
const npcHasPhaseVariation=(npc)=>{const imgs=PHASES.map(p=>npc.phases[p]?.winner?.image).filter(Boolean);return new Set(imgs).size>1};

// Reusable portrait image component. Wrapped in React.memo so reference stability
// across parent re-renders avoids re-rendering 372+ card images unnecessarily.
const PortraitImg=React.memo(function PortraitImg({src,name,size,imgErr,onError}){
  const w=size||70;const h=Math.round(w*1.545);
  const alt=name||'Portrait';
  if(!src||(imgErr&&imgErr[src])){
    return <div className="portrait-avatar" style={{width:w,height:h}} role="img" aria-label={alt+' — no portrait image'}>
      <span className="placeholder" style={{fontSize:w>60?'1.6rem':'1rem'}} aria-hidden="true">{name?name[0]:'?'}</span>
    </div>;
  }
  return <div className="portrait-avatar" style={{width:w,height:h}}>
    <img src={src} alt={alt} loading="lazy" onError={()=>onError&&onError(src)}/>
  </div>;
});

function PortraitsPanel({D,sel,npcDefs,detailVer,onGoToMod,catMap}){
  const data=useContext(DC);const{t}=useLang();
  const[filter,setFilter]=useState('');
  const[subTab,setSubTab]=useState(()=>LS.get(LK.PTAB)||'companions');
  const[detailNpc,setDetailNpc]=useState(null);
  const[imgErr,setImgErr]=useState({});
  const[conflictsOnly,setConflictsOnly]=useState(()=>LS.get('portraitConflictsOnly',false)===true);
  const[affectedOnly,setAffectedOnly]=useState(()=>LS.get('portraitAffectedOnly',false)===true);
  const[sortBy,setSortBy]=useState(()=>LS.get('portraitSortBy','name'));
  const[phaseFilter,setPhaseFilter]=useState(()=>LS.get('portraitPhaseFilter',null));

  const[viewPortrait,setViewPortrait]=useState(null);

  useEffect(()=>{LS.set(LK.PTAB,subTab)},[subTab]);
  useEffect(()=>{LS.set('portraitConflictsOnly',conflictsOnly)},[conflictsOnly]);
  useEffect(()=>{LS.set('portraitAffectedOnly',affectedOnly)},[affectedOnly]);
  useEffect(()=>{LS.set('portraitSortBy',sortBy)},[sortBy]);
  useEffect(()=>{LS.set('portraitPhaseFilter',phaseFilter)},[phaseFilter]);
  useEffect(()=>{if(!detailNpc)return;const h=e=>{if(e.key==='Escape')setDetailNpc(null)};window.addEventListener('keydown',h);return()=>window.removeEventListener('keydown',h)},[detailNpc]);
  useEffect(()=>{if(!viewPortrait)return;const h=e=>{if(e.key==='Escape')setViewPortrait(null)};window.addEventListener('keydown',h);return()=>window.removeEventListener('keydown',h)},[viewPortrait]);

  // Resolve portraits PER PHASE: iterate in install order, last selected wins per phase
  // Portrait data lives in mod detail files as pt.npc / pt.pc fields
  const resolved=useMemo(()=>{
    if(!npcDefs||!Object.keys(npcDefs).length)return{};
    const state={};

    // Initialize defaults from npcDefs
    Object.entries(npcDefs).forEach(([npcId,npc])=>{
      state[npcId]={name:npc.name,game:npc.game,recruitable:!!npc.recruitable,phases:{},allEntries:[]};
      const s=state[npcId];
      const defImg=npc.default||null;
      const defBg1=npc.defaultBg1||defImg;
      const defSod=npc.defaultSod||defImg;
      const defTob=npc.defaultTob||defImg;
      const phaseDefaults={bg1:defBg1,sod:defSod,bg2:defImg,tob:defTob};
      const validPhases=GAME_PHASES[npc.game]||PHASES;
      validPhases.forEach(p=>{
        const img=phaseDefaults[p];
        if(img){
          const defEntry={modId:0,modName:t('portraits.default','Default'),compIdx:-1,compName:t('portraits.vanilla','Vanilla portrait'),image:img,order:-1,phase:'all',isDefault:true};
          s.phases[p]={winner:defEntry,all:[defEntry]};
        }
      });
    });

    // Iterate mods in install order, read pt from detail cache
    let order=0;
    CO.filter(c=>catMap[c]).forEach(cat=>{
      (catMap[cat]||[]).forEach(mod=>{
        const detail=data._detailCache[mod.i];
        const pt=detail&&detail.pt;
        if(!pt)return;
        mod.co.forEach((comp,ci)=>{
          const selKey=mod.i+'-'+ci;
          if(!sel[selKey])return;
          const ciKey=''+ci;
          const hits=pt.npc&&pt.npc[ciKey];
          if(!hits)return;
          hits.forEach(([npcId,image,phase])=>{
            const nDef=npcDefs[npcId];
            if(!state[npcId]){
              state[npcId]={name:nDef?nDef.name:npcId,game:nDef?nDef.game:'bg2',recruitable:nDef?!!nDef.recruitable:false,phases:{},allEntries:[]};
            }
            const entry={modId:mod.i,modName:mod.n,compIdx:ci,compName:comp.n,image:image,order:order,phase:phase};
            state[npcId].allEntries.push(entry);
            const targetPhases=phase==='all'?PHASES:[phase];
            targetPhases.forEach(p=>{
              if(!state[npcId].phases[p])state[npcId].phases[p]={winner:null,all:[]};
              const pd=state[npcId].phases[p];
              if(pd.all.length===1&&pd.all[0].isDefault)pd.all=[];
              pd.all.push(entry);
              pd.winner=entry;
            });
          });
          order++;
        });
      });
    });
    return state;
  },[sel,D,npcDefs,catMap,detailVer]);

  const npcList=useMemo(()=>{
    const fl=filter.toLowerCase();
    return Object.entries(resolved)
      .filter(([id,npc])=>{
        if(Object.keys(npc.phases).length===0)return false;
        if(affectedOnly&&!npcIsAffected(npc))return false;
        if(conflictsOnly&&!npcHasConflict(npc))return false;
        if(phaseFilter&&!npc.phases[phaseFilter])return false;
        if(!fl)return true;
        if(npc.name.toLowerCase().includes(fl))return true;
        return PHASES.some(p=>{const pd=npc.phases[p];return pd&&pd.all.some(e=>e.modName.toLowerCase().includes(fl))});
      })
      .sort((a,b)=>{
        if(sortBy==='game')return(a[1].game||'').localeCompare(b[1].game||'')||a[1].name.localeCompare(b[1].name);
        if(sortBy==='mods')return npcModCount(b[1])-npcModCount(a[1])||a[1].name.localeCompare(b[1].name);
        return a[1].name.localeCompare(b[1].name);
      });
  },[resolved,filter,sortBy,affectedOnly,conflictsOnly,phaseFilter]);

  const companions=useMemo(()=>npcList.filter(([id,npc])=>npc.recruitable),[npcList]);
  const otherNpcs=useMemo(()=>npcList.filter(([id,npc])=>!npc.recruitable),[npcList]);

  // PC portrait mods - read from mod detail pt.pc fields
  const pcMods=useMemo(()=>{
    const result=[];
    CO.filter(c=>catMap[c]).forEach(cat=>{
      (catMap[cat]||[]).forEach(mod=>{
        const detail=data._detailCache[mod.i];
        const pt=detail&&detail.pt;
        if(!pt||!pt.pc)return;
        Object.entries(pt.pc).forEach(([ciKey,pc])=>{
          const ci=parseInt(ciKey);
          result.push({modId:mod.i,compIdx:ci,label:pc.label,images:pc.images,selected:!!sel[mod.i+'-'+ci]});
        });
      });
    });
    return result;
  },[sel,D,catMap,detailVer]);
  const pcSelected=pcMods.filter(m=>m.selected);

  const conflictCount=useMemo(()=>{
    let c=0;
    Object.values(resolved).forEach(npc=>{
      PHASES.forEach(p=>{if(npc.phases[p]&&npc.phases[p].all.length>1)c++});
    });
    return c;
  },[resolved]);
  const phaseCounts=useMemo(()=>{
    const c={};PHASES.forEach(p=>{c[p]=0});
    Object.values(resolved).forEach(npc=>{PHASES.forEach(p=>{if(npc.phases[p])c[p]++})});
    return c;
  },[resolved]);

  const handleImgError=useCallback((key)=>setImgErr(p=>({...p,[key]:true})),[]);

  if(!npcDefs||!Object.keys(npcDefs).length){
    return <div className="spell-panel"><EmptyGrid entity="Portrait" entityPlural="portraits" extraReason={t('portraits.no_data','Portraits data not loaded — npcs.json not found.')}/></div>;
  }

  const activeList=subTab==='companions'?companions:subTab==='npcs'?otherNpcs:[];
  const showNpcGrid=subTab==='companions'||subTab==='npcs';

  // Local wrappers that capture `t()` for i18n, delegating data logic to module helpers.
  const cardStatus=(npc)=>{
    if(npcHasConflict(npc))return{label:t('action.conflict','CONFLICT'),cls:'action-remove'};
    if(npcIsAffected(npc))return{label:t('action.modified','MODIFIED'),cls:'action-modify'};
    return{label:t('action.vanilla','VANILLA'),cls:'action-vanilla'};
  };

  // Single NPC card with phase tabs (only shown when portrait varies by phase)
  const NpcCard=({npcId,npc})=>{
    const activePhases=PHASES.filter(p=>npc.phases[p]);
    const varied=npcHasPhaseVariation(npc);
    const pp=npcPrimaryPhase(npc);
    const[viewPhase,setViewPhase]=useState(pp);
    // When the global phase filter changes, jump each card ONCE to that phase (if it has it).
    // After the jump, the user can click a different tab and that choice persists — the filter
    // only acts as a one-shot "sync" signal, not a permanent lock.
    useEffect(()=>{if(phaseFilter&&npc.phases[phaseFilter])setViewPhase(phaseFilter)},[phaseFilter]);
    const pd=npc.phases[viewPhase]||npc.phases[pp];
    const shown=pd?pd.winner:null;
    const status=cardStatus(npc);
    const shownMod=shown&&!shown.isDefault?{modId:shown.modId,modName:shown.modName,action:'modify'}:null;
    const openDetail=()=>setDetailNpc({id:npcId,...npc});
    const cardLabel=npc.name+' \u2014 '+(npc.recruitable?t('portraits.companion','Companion'):t('portraits.npc','NPC'))+' \u2014 '+status.label;
    // Shared phase-row styling so tabs (varied) and badges (non-varied) align identically.
    // Both share height, border, padding, and font metrics — only background/selection differs.
    const phaseChipBase={fontSize:'.58rem',padding:'1px 6px',borderRadius:4,fontWeight:600,lineHeight:'1.2',border:'1px solid transparent',display:'inline-block'};
    return(
      <div className="spell-card" style={{cursor:'pointer'}} {...clickableProps(cardLabel,openDetail)}>
        <div className={"card-action-bar "+status.cls}>{status.label}</div>
        <div style={{margin:'0 auto 4px'}}>
          <PortraitImg src={shown?shown.image:null} name={npc.name} size={110} imgErr={imgErr} onError={handleImgError}/>
        </div>
        {/* 1. Name — always directly below portrait */}
        <div className="spell-name">{npc.name}</div>
        {/* 2. Type label — always on its own row, same position regardless of variation */}
        <div className="spell-school" style={{color:npc.recruitable?'var(--grn)':'var(--txd)'}}>
          {npc.recruitable?t('portraits.companion','Companion'):t('portraits.npc','NPC')}
        </div>
        {/* 3. Phase row — interactive tabs when varied, static badges otherwise; same metrics */}
        {activePhases.length>0&&<div style={{display:'flex',gap:3,justifyContent:'center',flexWrap:'wrap',marginTop:3,marginBottom:2}} role={varied?'tablist':undefined} aria-label={varied?t('portraits.phases','Phases'):undefined}>
          {activePhases.map(p=>{
            if(varied){
              const sel=viewPhase===p;
              return <span key={p} role="tab" tabIndex={0} aria-selected={sel}
                onClick={e=>{e.stopPropagation();setViewPhase(p)}}
                onKeyDown={e=>{if(e.key==='Enter'||e.key===' '){e.stopPropagation();e.preventDefault();setViewPhase(p)}}}
                style={{...phaseChipBase,cursor:'pointer',background:sel?'rgba(212,168,67,.15)':'transparent',color:sel?'var(--gold)':PHASE_COLORS[p],borderColor:sel?'var(--goldd)':'var(--brd)',transition:'all .12s'}}>{PHASE_LABELS[p]}</span>;
            }
            return <span key={p} style={{...phaseChipBase,color:PHASE_COLORS[p]}}>{PHASE_LABELS[p]}</span>;
          })}
        </div>}
        <CardFooter activeMods={shownMod?[shownMod]:[]} winner={shownMod} refId={npcId} onNavigate={mid=>{const mod=D.find(m=>m.i===mid);if(mod&&onGoToMod)onGoToMod(mod)}}/>
      </div>);
  };

  // Shared NPC grid renderer
  const renderNpcGrid=(list)=>{
    if(list.length===0)return <EmptyGrid entity="Portrait" entityPlural="portraits" filter={filter} affectedOnly={affectedOnly} conflictsOnly={conflictsOnly} extraReason={Object.keys(resolved).length===0?t('portraits.no_mods_desc','Select mods that include portrait changes to see affected NPCs here.'):undefined}/>;
    return(
      <div className="spell-grid">
        {list.map(([npcId,npc])=><NpcCard key={npcId} npcId={npcId} npc={npc}/>)}
      </div>
    );
  };

  // Player portraits tab renderer
  const renderPlayerTab=()=>{
    if(pcMods.length===0)return <EmptyGrid entity="Player Portrait" entityPlural="player portraits" extraReason={t('portraits.no_pc_data','Player portrait mod data has not been configured yet.')}/>;
    const sorted=[...pcMods].sort((a,b)=>(b.selected?1:0)-(a.selected?1:0)||(a.label||'').localeCompare(b.label||''));
    return(
      <div>
        {pcSelected.length>0&&<div style={{display:'flex',alignItems:'baseline',gap:10,marginBottom:12}}>
          <span style={{fontSize:'.85rem',color:'var(--tx)',fontWeight:600}}>{pcSelected.reduce((s,m)=>s+m.images.length,0)}</span>
          <span style={{fontSize:'.72rem',color:'var(--txd)'}}>{t('portraits.player_count','player portraits from')} {pcSelected.length} {t('portraits.selected_mods','selected mod')}{pcSelected.length!==1?'s':''}</span>
        </div>}
        <div className="spell-overview-grid">
          {sorted.map((pc,i)=>(
            <div key={i} style={{background:'var(--bg2)',border:'1px solid '+(pc.selected?'var(--goldd)':'var(--brd)'),borderRadius:8,padding:12,opacity:pc.selected?1:.45,transition:'all .15s'}}>
              <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:pc.selected?10:0}}>
                <span style={{fontSize:'.82rem',fontWeight:600,color:'var(--gold)',flex:1,minWidth:0,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{pc.label}</span>
                <span style={{fontSize:'.68rem',padding:'1px 8px',borderRadius:8,background:pc.selected?'rgba(74,222,128,.12)':'var(--bg)',color:pc.selected?'var(--grn)':'var(--txd)',border:'1px solid '+(pc.selected?'rgba(74,222,128,.3)':'var(--brd)'),fontWeight:600}}>{pc.images.length}</span>
              </div>
              {pc.selected&&<div style={{display:'flex',flexWrap:'wrap',gap:4}}>
                {pc.images.map((img,j)=>{
                  const fname=img.split('/').pop()||('Portrait '+(j+1));
                  return <Tip key={j} content={<><span className="tip-meta" style={{fontFamily:'monospace'}}>{fname}</span></>}>
                    <div style={{width:42,height:65,borderRadius:3,overflow:'hidden',background:'var(--bg3)',border:'1px solid var(--brd)',cursor:'pointer'}}
                      role="button" tabIndex={0}
                      aria-label={pc.label+' — '+fname}
                      onClick={()=>setViewPortrait({src:img,label:pc.label,fname})}
                      onKeyDown={e=>{if(e.key==='Enter'||e.key===' '){e.preventDefault();setViewPortrait({src:img,label:pc.label,fname})}}}>
                      {imgErr[img]?<span style={{fontSize:'.5rem',color:'var(--txd)',display:'flex',alignItems:'center',justifyContent:'center',height:'100%'}}>?</span>
                      :<img src={img} alt={pc.label+' '+(j+1)} loading="lazy" onError={()=>handleImgError(img)} style={{width:'100%',height:'100%',objectFit:'cover'}}/>}
                    </div>
                  </Tip>;
                })}
              </div>}
              {!pc.selected&&<div style={{fontSize:'.72rem',color:'var(--txd)',fontStyle:'italic',marginTop:6}}>{t('portraits.select_to_preview','Select this mod to preview portraits')}</div>}
            </div>
          ))}
        </div>
        {viewPortrait&&<div className="mo" onClick={e=>{if(e.target===e.currentTarget)setViewPortrait(null)}}>
          <div className="md" onClick={e=>e.stopPropagation()} style={{maxWidth:320,width:'auto',textAlign:'center',padding:20}}>
            <div style={{marginBottom:10}}>
              <div className="portrait-avatar" style={{width:210,height:324,margin:'0 auto'}}>
                {imgErr[viewPortrait.src]
                  ?<span className="placeholder">?</span>
                  :<img src={viewPortrait.src} alt={viewPortrait.fname} onError={()=>handleImgError(viewPortrait.src)}/>}
              </div>
            </div>
            <div style={{fontSize:'.82rem',color:'var(--gold)',fontWeight:600}}>{viewPortrait.label}</div>
            <div style={{fontSize:'.68rem',color:'var(--txd)',fontFamily:'monospace',marginTop:4}}>{viewPortrait.fname}</div>
            <button className="bt" onClick={()=>setViewPortrait(null)} style={{marginTop:12,fontSize:'.72rem',padding:'4px 16px'}}>{t('lbl.close','Close')}</button>
          </div>
        </div>}
      </div>
    );
  };

  return(
    <div className="spell-panel">
      {/* Toolbar */}
      <div className="spell-toolbar">
        {showNpcGrid&&<>
          <span style={{fontSize:'.72rem',color:'var(--txd)'}}>{t('lbl.sort','Sort')}:</span>
          {[['name',t('lbl.name','Name')],['game',t('lbl.game','Game')],['mods',t('lbl.mods','Mods')]].map(([k,label])=>
            <Pill key={k} active={sortBy===k} onClick={()=>setSortBy(k)} style={{fontSize:'.72rem'}}>{label}</Pill>
          )}
          <span style={{borderLeft:'1px solid var(--brd)',height:18,margin:'0 4px'}}/>
        </>}
        <Tip content={<><span className="tip-title">{t('ski.affected','Affected only')}</span><span className="tip-desc">{t('tip.affected_portraits','Hide NPCs whose portraits are not changed by any selected mod.')}</span></>}>
          <Pill active={affectedOnly} onClick={()=>setAffectedOnly(!affectedOnly)} style={{fontSize:'.72rem'}}>{t('ski.affected','Affected')}</Pill>
        </Tip>
        <Tip content={<><span className="tip-title">{t('ski.conflicts','Conflicts only')}</span><span className="tip-desc">{t('tip.conflicts_portraits','Show only NPCs where multiple mods provide different portraits for the same phase.')}</span></>}>
          <Pill active={conflictsOnly} onClick={()=>setConflictsOnly(!conflictsOnly)} style={{fontSize:'.72rem'}}>{t('ski.conflicts','Conflicts')}{conflictCount>0?' ('+conflictCount+')':''}</Pill>
        </Tip>
        {showNpcGrid&&<input className="sx" style={{maxWidth:200,flex:'0 1 200px',marginLeft:'auto'}} placeholder={t('portraits.filter','Filter NPC or mod...')} value={filter} onChange={e=>setFilter(e.target.value)}/>}
      </div>

      {/* Sub-tabs */}
      <div className="portrait-subtabs">
        <div className={"portrait-subtab"+(subTab==='companions'?' ac':'')} onClick={()=>setSubTab('companions')}>{t('portraits.companions','Companions')} ({companions.length})</div>
        <div className={"portrait-subtab"+(subTab==='npcs'?' ac':'')} onClick={()=>setSubTab('npcs')}>{t('portraits.other_npcs','Other NPCs')} ({otherNpcs.length})</div>
        <div className={"portrait-subtab"+(subTab==='player'?' ac':'')} onClick={()=>setSubTab('player')}>{t('portraits.player','Player')}{pcSelected.length>0?' ('+pcSelected.length+')':''}</div>
      </div>

      {/* Phase breakdown pills — click to filter grid AND switch all cards to that phase */}
      {showNpcGrid&&<div style={{display:'flex',gap:4,flexWrap:'wrap',padding:'4px 0',marginBottom:8}}>
        {PHASES.map(p=><Pill key={p} active={phaseFilter===p} onClick={()=>setPhaseFilter(phaseFilter===p?null:p)} style={{fontSize:'.62rem',padding:'1px 6px',color:phaseFilter===p?'var(--gold)':PHASE_COLORS[p],fontWeight:600}} ariaLabel={PHASE_LABELS[p]+' \u2014 '+phaseCounts[p]+' NPCs'}>{PHASE_LABELS[p]} <b>{phaseCounts[p]}</b></Pill>)}
      </div>}

      {/* Tab content */}
      {showNpcGrid&&renderNpcGrid(activeList)}
      {subTab==='player'&&renderPlayerTab()}

      {/* Detail modal */}
      {detailNpc&&<div className="mo" onClick={e=>{if(e.target===e.currentTarget)setDetailNpc(null)}}>
        <div className="md" onClick={e=>e.stopPropagation()} style={{maxWidth:620,width:'90%',maxHeight:'85vh',overflowY:'auto'}}>
          {/* Header */}
          <div style={{display:'flex',gap:12,alignItems:'center',marginBottom:12,paddingBottom:10,borderBottom:'1px solid var(--brd)'}}>
            {(()=>{const pp=npcPrimaryPhase(detailNpc);const w=pp&&detailNpc.phases[pp]?detailNpc.phases[pp].winner:null;return w?<div style={{flexShrink:0}}><PortraitImg src={w.image} name={detailNpc.name} size={80} imgErr={imgErr} onError={handleImgError}/></div>:null})()}
            <div style={{flex:1,minWidth:0}}>
              <div style={{fontSize:'1.05rem',color:'var(--gold)',fontWeight:600,fontFamily:"'Cinzel',serif"}}>{detailNpc.name}</div>
              <div style={{display:'flex',gap:8,alignItems:'center',marginTop:4,flexWrap:'wrap'}}>
                <span style={{fontSize:'.7rem',padding:'1px 8px',borderRadius:8,background:'var(--bg2)',color:detailNpc.recruitable?'var(--grn)':'var(--txd)',border:'1px solid var(--brd)'}}>{detailNpc.recruitable?t('portraits.companion','Companion'):t('portraits.npc','NPC')}</span>
                <span style={{fontSize:'.7rem',padding:'1px 8px',borderRadius:8,background:'var(--bg2)',color:'var(--tx)',border:'1px solid var(--brd)'}}>{(detailNpc.game||'bg2').toUpperCase()}</span>
                <RefChip refId={detailNpc.id}/>
                {npcHasConflict(detailNpc)&&<span style={{fontSize:'.55rem',padding:'1px 6px',borderRadius:4,background:'var(--bg-err)',color:'var(--red)'}}>{t('action.conflict','CONFLICT')}</span>}
              </div>
            </div>
            <button className="bt" onClick={()=>setDetailNpc(null)} style={{fontSize:'.8rem',padding:'4px 10px'}}>{"\u2715"}</button>
          </div>

          {/* Per-phase portrait comparison */}
          {PHASES.map(p=>{
            const pd=detailNpc.phases[p];
            if(!pd)return null;

// Reusable tooltip — renders a styled floating panel via React portal so it escapes
// all ancestor stacking contexts and overflow clipping. Position computed on hover.
//
// Props:
//   content  — JSX shown in the floating panel. Use .tip-title / .tip-meta /
//              .tip-desc / .tip-warn spans for consistent styling.
//   children — the anchor element(s). Wrapped in a .ui-tip-host span.
//   className — extra classes added to the host span.
//   style    — inline style forwarded to the host span. Use this when wrapping
//              block-level children inside a flex/grid layout, e.g.
//              style={{display:'block'}} to override the default inline-block,
//              or style={{display:'contents'}} to let children inherit grid/flex
//              placement directly from the grandparent.
function Tip({content,children,className,style}){
  const[tip,setTip]=React.useState(null);
  const hostRef=React.useRef(null);
  if(!content)return children;
  // When display:contents is applied to the host, its own bounding box collapses to (0,0,0,0).
  // Compute the union of child rects instead so the tooltip anchors to visible content.
  const resolveAnchorRect=(el)=>{
    if(!el)return null;
    const own=el.getBoundingClientRect();
    if(own.width>0||own.height>0)return own;
    // Walk children and merge their rects
    let u=null;
    Array.from(el.children).forEach(c=>{
      const rc=resolveAnchorRect(c);
      if(!rc)return;
      if(!u)u={left:rc.left,top:rc.top,right:rc.right,bottom:rc.bottom};
      else{u.left=Math.min(u.left,rc.left);u.top=Math.min(u.top,rc.top);u.right=Math.max(u.right,rc.right);u.bottom=Math.max(u.bottom,rc.bottom)}
    });
    if(!u)return own;
    return{left:u.left,top:u.top,right:u.right,bottom:u.bottom,width:u.right-u.left,height:u.bottom-u.top,x:u.left,y:u.top};
  };
  const show=(e)=>{
    if(!hostRef.current)return;
    let r=resolveAnchorRect(hostRef.current);
    // Final fallback to the mouse event's coords if we still got nothing usable
    if(!r||(r.width===0&&r.height===0)){
      if(e&&(e.clientX!=null)){r={left:e.clientX-8,top:e.clientY-8,right:e.clientX+8,bottom:e.clientY+8,width:16,height:16}}
      else return;
    }
    const vw=window.innerWidth;
    const placement=r.top<140?'bottom':'top';
    const y=placement==='top'?r.top-6:r.bottom+6;
    // Anchor center: where the arrow wants to point.
    const anchorX=r.left+r.width/2;
    // Tooltip box center is clamped into the viewport so the box never hangs off-screen.
    const x=Math.min(Math.max(anchorX,170),vw-170);
    // Arrow offset from the tooltip's horizontal center (positive = right of center).
    // CSS uses calc(50% + var(--tip-arrow-offset)), so this keeps the arrow on the anchor.
    // Clamp to +-150px so it stays inside the visible tooltip for any content width.
    const arrowOffset=Math.max(-150,Math.min(anchorX-x,150));
    setTip({x,y,placement,arrowOffset});
  };
  const hide=()=>setTip(null);
  return <>
    <span ref={hostRef} className={"ui-tip-host"+(className?' '+className:'')} style={style}
      onMouseEnter={show} onMouseLeave={hide}>
      {children}
    </span>
    {tip&&ReactDOM.createPortal(
      <div className={"ui-tip-float ui-tip-"+tip.placement} style={{left:tip.x,top:tip.y,'--tip-arrow-offset':tip.arrowOffset+'px'}}>
        {content}
      </div>,
      document.body
    )}
  </>;
}
function EquipSlot({slotId,label,types,item,otherRing,vanillaItems,onSelect,formatStats,activeBadge,inactiveBadge,checkUsability}){

      {item.desc&&<span className="tip-desc" style={{marginTop:4,maxHeight:200,overflow:'hidden',display:'block'}}>{item.desc.length>500?item.desc.substring(0,500)+'\u2026':item.desc}</span>}

        {item&&<button className="eq-clear" onClick={e=>{e.stopPropagation();onSelect(null);setSearch('')}} aria-label="Unequip" title="Unequip">{"\u2715"}</button>}

              {item.desc&&<span className="tip-desc" style={{marginTop:4,maxHeight:180,overflow:'hidden',textOverflow:'ellipsis',display:'block'}}>{item.desc.length>400?item.desc.substring(0,400)+'\u2026':item.desc}</span>}

          }
          return <span className="eq-info-stats"/>;
        })()}

        {activeBadge&&<Tip content={<><span className="tip-title">{activeBadge.active?'Active Weapon':'Set Active'}</span><span className="tip-desc">{activeBadge.active?'This weapon feeds into combat stats (THAC0, damage, speed, proficiency pips).':'Click to designate this weapon as the active one used for combat calculations.'}</span></>}><span
          className={"eq-active-badge"+(activeBadge.active?' on':'')}
          onClick={activeBadge.onToggle}>
          {activeBadge.active?'ACTIVE':'Set active'}
        </span></Tip>}
      </div>
    </div>
  </div>;
}

// Generic panel error boundary — wraps any top-level panel so a crash in one
// doesn't take down the whole app. Renders a fallback with the error message,
// stack trace, and a Retry button that resets the boundary's error state.
class PanelBoundary extends React.Component{
  static contextType=LC;
  constructor(p){super(p);this.state={err:null}}
  static getDerivedStateFromError(e){return{err:e}}
  componentDidCatch(e,info){/* Silenced for production — captured in state */}
  render(){
    const t=this.context?.t||((_,fb)=>fb);
    const name=this.props.name||t('panel.name','panel');
    if(this.state.err)return <div className="spell-panel"><div className="spell-empty">
      <h3>{t('panel.error','The {name} panel encountered an error').replace('{name}',name)}</h3>
      <p style={{color:'var(--txd)'}}>{this.state.err.message}</p>
      <pre style={{color:'var(--txd)',fontSize:'.6rem',marginTop:8,maxHeight:160,overflow:'auto',whiteSpace:'pre-wrap',background:'var(--bg)',padding:8,borderRadius:4,textAlign:'left'}}>{this.state.err.stack}</pre>
      <button className="bt" style={{marginTop:8}} onClick={()=>this.setState({err:null})}>{t('btn.retry','Retry')}</button>
    </div></div>;
    return this.props.children;
  }
}

    }catch(e){/* Malformed share link — silently ignore and clear hash so it doesn't persist */
      window.history.replaceState(null,'',window.location.pathname+window.location.search);
    }
  },[]);

  // Race data
  const raceData=chargen.races[race]||chargen.races.human;

  // Allowed classes for this race
  const allowedClasses=useMemo(()=>raceData.classes||[],[raceData]);

  // Reset class if not allowed for race
  useEffect(()=>{if(!allowedClasses.includes(singleClass)&&allowedClasses.length>0)setSingleClass(allowedClasses[0])},[allowedClasses,singleClass]);

  // Allowed multiclass combos for this race
  const allowedMulti=useMemo(()=>(raceData.multi||[]).filter(k=>chargen.multiclass.combos[k]),[raceData,chargen]);
  useEffect(()=>{if(classMode==='multi'&&allowedMulti.length===0)setClassMode('single');else if(classMode==='multi'&&!allowedMulti.includes(multiCombo))setMultiCombo(allowedMulti[0])},[allowedMulti,classMode,multiCombo]);
  useEffect(()=>{if(classMode==='dual'&&!raceData.canDual)setClassMode('single')},[raceData,classMode]);

  // Dual-class allowed targets
  const dualAllowed=useMemo(()=>{
    if(!chargen.dualclass.allowed[dualOld])return[];
    return chargen.dualclass.allowed[dualOld];
  },[dualOld,chargen]);
  useEffect(()=>{if(classMode==='dual'&&dualAllowed.length>0&&!dualAllowed.includes(dualNew))setDualNew(dualAllowed[0])},[dualAllowed,classMode,dualNew]);

  // Active classes for calculations
  const activeClasses=useMemo(()=>{
    if(classMode==='multi'){const combo=chargen.multiclass.combos[multiCombo];return combo||['FIGHTER','MAGE']}
    if(classMode==='dual')return [dualOld,dualNew];
    return [singleClass];
  },[classMode,singleClass,multiCombo,dualOld,dualNew,chargen]);

  const primaryClass=activeClasses[0];
  const isWarrior=useMemo(()=>activeClasses.some(c=>{const ci=chargen.classInfo[c];return ci&&ci.group==='warrior'}),[activeClasses,chargen]);

  // Base ability scores (pre-equipment): base stat + racial adj + kit bonus. Used for kit/dual-class
  // requirement checks so equipment doesn't cause circular eligibility. `effAb` (declared later) layers
  // equipment SET/ADD on top of this.
  const baseAb=useMemo(()=>{
    const adj=raceData.adj||{};
    const r={};
    const kitAbil=(kit&&classMode==='single'&&chargen&&chargen.kitAbilities&&chargen.kitAbilities[kit])||null;
    const kitBonusRaw=kitAbil&&kitAbil.statBonus;
    const kitBonusFor=(s)=>{
      if(!kitBonusRaw||!kitBonusRaw[s]||!kitBonusRaw[s].bonusAtLevel)return 0;
      const map=kitBonusRaw[s].bonusAtLevel;
      let b=0;
      Object.keys(map).forEach(lvKey=>{const lv=parseInt(lvKey,10);if(level>=lv)b+=map[lvKey]||0});
      return b;
    };
    ['str','dex','con','int','wis','cha'].forEach(s=>{
      r[s]=Math.max(1,Math.min(25,(ab[s]||10)+(adj[s]||0)+kitBonusFor(s)));
    });
    return r;
  },[ab,raceData,kit,classMode,chargen,level]);

  // Class info helper
  const getCI=c=>chargen.classInfo[c]||chargen.classInfo.FIGHTER;

  // Resolved items pool — vanilla + mod-added + mod-modified annotations
  // Mirrors the resolvedSpells pattern: walks selected mods and merges their item additions/modifications.
  const resolvedItems=useMemo(()=>{
    const result={};
    if(vanillaItems)Object.entries(vanillaItems).forEach(([ref,it])=>{result[ref]={...it,ref,vanilla:true,modifiers:[]}});
    const cache=data._detailCache||{};
    try{Object.keys(sel).forEach(key=>{
      if(!sel[key])return;
      const[mid,ci]=key.split('-').map(Number);
      const detail=cache[mid];
      if(!detail||!detail.items)return;
      const entry=detail.items[String(ci)];
      if(!entry)return;
      const mod=D.find(m=>m.i===mid);
      const modName=mod?mod.n:'Mod';
      // Mod-added items: [ref, type, name, desc, stats?, meta?]
      // Some mods inline profType/usability/charges inside the stats object instead of a separate meta slot,
      // so we fall back to reading those top-level item flags from stats when meta is absent.
      if(Array.isArray(entry.new)){
        entry.new.forEach(it=>{
          if(!Array.isArray(it)||!it[0])return;
          const[ref,type,name,desc,stats,meta]=it;
          if(result[ref])return; // don't clobber vanilla
          const src=(meta&&typeof meta==='object')?meta:(stats&&typeof stats==='object'?stats:{});
          result[ref]={
            ref,
            n:name||ref,
            type:type||'misc',
            desc:desc||'',
            stats:stats||null,
            // Icon path follows the vanilla convention: items/icons/I<REF>.png (mod icon packs ship alongside vanilla)
            icon:'items/icons/I'+ref+'.png',
            vanilla:false,
            modName,
            modifiers:[],
            twoHanded:src.twoHanded,
            profType:src.profType,
            usability:src.usability,
            charges:src.charges,
            wt:src.wt,
            ench:src.ench
          };
        });
      }
      // Mod-modified vanilla items: [[ref, action, summary], ...] — annotate the vanilla entry
      if(Array.isArray(entry.modify)){
        entry.modify.forEach(it=>{
          if(!Array.isArray(it)||!it[0])return;
          const[ref,action,summary]=it;
          if(result[ref])result[ref].modifiers.push({modName,action:action||'modify',summary:summary||''});
        });
      }
    })}catch(e){console.warn('Item resolution error:',e)}
    return result;
  },[vanillaItems,sel,data._detailCache,D,detailVer]);

  // Equipment resolution (must be before calcTHAC0/calcSaves which depend on it)
  const equippedItems=useMemo(()=>{
    const result={};
    if(!resolvedItems)return result;
    EQUIP_SLOTS.forEach(([slotId])=>{
      const ref=equipment[slotId];if(!ref)return;
      const item=resolvedItems[ref];
      if(item)result[slotId]={...item,ref};
    });
    return result;
  },[equipment,resolvedItems]);

  // Check if an item meets the character's usability restrictions.
  // Returns { ok: bool, reasons: string[] } — reasons empty when ok.
  // Undefined usability field fails open (allow).
  const checkItemUsability=useCallback((it)=>{
    if(!it||!it.usability)return{ok:true,reasons:[]};
    const u=it.usability;const reasons=[];
    if(Array.isArray(u.classes)&&u.classes.length>0){
      const active=activeClasses.map(c=>c.charAt(0)+c.slice(1).toLowerCase()); // "FIGHTER" -> "Fighter"
      const anyOK=active.some(c=>u.classes.includes(c));
      if(!anyOK)reasons.push('class: '+u.classes.join('/'));
    }
    if(u.minStr!=null&&(effAb.str||0)<u.minStr)reasons.push('STR '+u.minStr+'+ (have '+effAb.str+')');
    if(u.minInt!=null&&(effAb.int||0)<u.minInt)reasons.push('INT '+u.minInt+'+ (have '+effAb.int+')');
    if(u.minWis!=null&&(effAb.wis||0)<u.minWis)reasons.push('WIS '+u.minWis+'+ (have '+effAb.wis+')');
    if(u.minDex!=null&&(effAb.dex||0)<u.minDex)reasons.push('DEX '+u.minDex+'+ (have '+effAb.dex+')');
    if(u.minCon!=null&&(effAb.con||0)<u.minCon)reasons.push('CON '+u.minCon+'+ (have '+effAb.con+')');
    if(u.minCha!=null&&(effAb.cha||0)<u.minCha)reasons.push('CHA '+u.minCha+'+ (have '+effAb.cha+')');
    if(Array.isArray(u.excludedAlignments)&&alignment&&u.excludedAlignments.includes(alignment))reasons.push('alignment: not '+alignment);
    if(Array.isArray(u.races)&&u.races.length>0){
      const rname=(raceData&&raceData.n)||'';
      if(!u.races.includes(rname))reasons.push('race: '+u.races.join('/'));
    }
    return{ok:reasons.length===0,reasons};
  },[activeClasses,effAb,alignment,raceData]);

  // Resolved proficiency data (vanilla + mod overrides) — declared early so weaponProfBonus / activeStyle
  // can consult `replaceSrc` / `profMap` to remap vanilla weapon profTypes to grouped IDs (cdtweaks 2161 etc.).
  const resolvedProfData=useMemo(()=>{
    const vanillaProfs=(chargen.proficiencies||[]).map(p=>({...p}));
    let base=vanillaProfs.map(p=>({...p}));
    let replaceSrc=null; // {modName, compName, compNo, desc} of last replace-mode entry that took effect
    let profMap=null;    // map vanilla profType IDs -> grouped IDs in the replaced list
    const global={};const flags={};const profSlotsOver={};const multiclass={};
    try{if(catMap&&CO&&CO.length){const cache=data._detailCache||{};
      // First pass: find last replace-mode entry to use as base
      CO.filter(c=>catMap[c]).forEach(cat=>{(catMap[cat]||[]).forEach(mod=>{
        if(!mod||!mod.co)return;const detail=cache[mod.i];if(!detail||!detail.prof)return;
        mod.co.forEach((comp,ci)=>{if(!sel[mod.i+'-'+ci])return;
          const pd=detail.prof[''+(comp.cn!=null?comp.cn:ci)];if(!pd)return;
          if(pd.mode==='replace'&&Array.isArray(pd.proficiencies)){
            base=pd.proficiencies.map(p=>({...p,action:'replace',modName:mod.n}));
            replaceSrc={modName:mod.n,compName:(comp.n||''),compNo:(comp.cn!=null?comp.cn:ci),desc:pd.desc||''};
            profMap=pd.profMap?{...pd.profMap}:null;
          }
        });
      })});
      // Second pass: apply patches + collect global/flags/profSlots/multiclass
      CO.filter(c=>catMap[c]).forEach(cat=>{(catMap[cat]||[]).forEach(mod=>{
        if(!mod||!mod.co)return;const detail=cache[mod.i];if(!detail||!detail.prof)return;
        mod.co.forEach((comp,ci)=>{if(!sel[mod.i+'-'+ci])return;
          const pd=detail.prof[''+(comp.cn!=null?comp.cn:ci)];if(!pd)return;
          if(pd.mode!=='replace'){
            if(pd.add&&Array.isArray(pd.add))pd.add.forEach(p=>{if(!base.find(b=>b.id===p.id))base.push({...p,action:'add',modName:mod.n})});
            if(pd.remove&&Array.isArray(pd.remove))pd.remove.forEach(id=>{const idx=base.findIndex(b=>b.id===id);if(idx>=0){base[idx].action='remove';base[idx].modName=mod.n}});
            if(pd.modify&&Array.isArray(pd.modify))pd.modify.forEach(m=>{const b=base.find(x=>x.id===m.id);if(b){const changes=[];if(m.maxPips!=null&&m.maxPips!==b.maxPips){changes.push('max '+m.maxPips+' pips');b.maxPips=m.maxPips}if(m.n&&m.n!==b.n){changes.push('renamed');b.n=m.n}b.action='modify';b.modName=mod.n;if(m.desc)b.desc=m.desc;b.changes=changes.join(', ')}});
          }
          if(pd.global){Object.assign(global,pd.global)}
          if(pd.flags){Object.assign(flags,pd.flags)}
          if(pd.profSlots){Object.entries(pd.profSlots).forEach(([grp,ov])=>{profSlotsOver[grp]={...(profSlotsOver[grp]||{}),...ov}})}
          if(pd.multiclass){Object.assign(multiclass,pd.multiclass)}
        });
      })})}}catch(e){}
    if(global.styleMaxPips!=null){base.forEach(p=>{if(p.cat==='style')p.maxPips=global.styleMaxPips})}
    const profs=base.filter(p=>p.action!=='remove');
    // Compute which categories vanilla had but the resolved set has lost (typically because of a replace-mode mod)
    const vanillaCats=new Set(vanillaProfs.map(p=>p.cat).filter(Boolean));
    const presentCats=new Set(profs.map(p=>p.cat).filter(Boolean));
    const missingCats=Array.from(vanillaCats).filter(c=>!presentCats.has(c));
    // Reverse map: grouped prof id -> [vanilla prof id, ...] that merged into it. Lets a row tooltip explain
    // which vanilla weapons are now pooled under one prof entry (e.g., Large Sword <- Bastard, Long, 2H, Katana, Scimitar).
    const profMapReverse={};
    if(profMap){
      Object.entries(profMap).forEach(([vanillaId,groupedId])=>{
        if(!profMapReverse[groupedId])profMapReverse[groupedId]=[];
        profMapReverse[groupedId].push(vanillaId);
      });
    }
    return{profs,global,flags,profSlotsOver,multiclass,replaceSrc,missingCats,profMap,profMapReverse};
  },[chargen,sel,data._detailCache,D,catMap,detailVer]);

  // Helper: resolve a weapon's RAW proficiency ID (vanilla form). Prefers top-level wpn.profType, falls
  // back to stats.profType (legacy) then chargen.itemTypeToProf. Lowercase strings remap via profTypeMap.
  // For mod-aware (replaced/grouped) IDs, callers re-route via resolvedProfData.profMap (see weaponProfBonus).
  const resolveWeaponProfId=useCallback((wpn)=>{
    if(!wpn)return null;
    const raw=wpn.profType||(wpn.stats&&wpn.stats.profType);
    let id=null;
    if(raw){
      if(/^[A-Z_]+$/.test(raw))id=raw; // already in chargen ID form
      else{const mapped=chargen.profTypeMap&&chargen.profTypeMap[raw];if(mapped)id=mapped}
    }
    if(!id)id=(chargen.itemTypeToProf&&chargen.itemTypeToProf[wpn.type])||null;
    return id;
  },[chargen]);
  // Helper: determine if a weapon is two-handed. Order: explicit flag -> profType -> type -> name pattern
  const isWeaponTwoHanded=useCallback((wpn)=>{
    if(!wpn)return false;
    if(wpn.twoHanded===true)return true;
    if(wpn.stats&&wpn.stats.twoHanded)return true;
    const profId=resolveWeaponProfId(wpn);
    if(profId&&(chargen.twoHandedProfTypes||[]).includes(profId))return true;
    if(['halberd','spear','staff','two-handed sword','bow','crossbow','sling'].includes(wpn.type))return true;
    const n=(wpn.n||'').toLowerCase();
    if(/two[- ]handed/.test(n))return true;
    return false;
  },[chargen,resolveWeaponProfId]);

  const equipmentBonuses=useMemo(()=>{
    const b={ac:0,thac0:0,dmgBonus:0,saves:0,saveDeath:0,saveWand:0,savePoly:0,saveBreath:0,saveSpell:0,apr:0,str:0,dex:0,con:0,int:0,wis:0,cha:0,magicResist:0};
    let armorAC=10;let hasArmor=false;
    const immunities=new Set();const resistances={};const specials=[];const extraSpellSlots={};
    // Shield is inactive when dual-wielding or using a 2H weapon
    const activeWpn=equippedItems[activeWeapon];
    const activeIs2H=isWeaponTwoHanded(activeWpn);
    const shieldBlocked=dualWielding||activeIs2H;
    const inactiveSlots=new Set();
    if(shieldBlocked)inactiveSlots.add('shield');
    Object.entries(equippedItems).forEach(([slotId,item])=>{
      if(inactiveSlots.has(slotId))return;
      const s=item.stats;if(!s)return;
      if(slotId==='armor'&&s.ac!=null){armorAC=s.ac;hasArmor=true}
      else if(s.ac)b.ac+=s.ac;
      if(s.thac0)b.thac0+=s.thac0;if(s.dmgBonus)b.dmgBonus+=s.dmgBonus;
      if(s.saves)b.saves+=s.saves;
      if(s.saveDeath)b.saveDeath+=s.saveDeath;if(s.saveWand)b.saveWand+=s.saveWand;
      if(s.savePoly)b.savePoly+=s.savePoly;if(s.saveBreath)b.saveBreath+=s.saveBreath;
      if(s.saveSpell)b.saveSpell+=s.saveSpell;
      if(s.apr)b.apr+=s.apr;
      ['str','dex','con','int','wis','cha'].forEach(a=>{if(s[a])b[a]+=s[a]});
      if(s.magicResist)b.magicResist+=s.magicResist;
      // Aggregate direct-field resistances (top-level stat fields) into the unified resistances map
      ['fireResist','coldResist','electricityResist','acidResist','poisonResist','magicDamageResist','slashingResist','piercingResist','crushingResist','missileResist'].forEach(k=>{
        if(s[k]==null)return;
        // Strip 'Resist' suffix and capitalise-friendly key: fireResist -> fire, magicDamageResist -> magicDamage
        const key=k.replace(/Resist$/,'');
        resistances[key]=(resistances[key]||0)+s[k];
      });
      // Aggregate special abilities
      if(s.special&&Array.isArray(s.special)){s.special.forEach(sp=>{
        if(!sp||!sp.type)return;
        if(sp.type==='immunity')immunities.add(sp.target||sp.desc||'');
        else if(sp.type==='resistance'&&sp.target){resistances[sp.target]=(resistances[sp.target]||0)+(sp.value||0)}
        else if(sp.type==='extraSpellSlot'&&sp.level){const key=(sp.spellType||'wizard')+'_'+sp.level;extraSpellSlots[key]=(extraSpellSlots[key]||0)+1}
        else if(sp.type==='freeAction'){immunities.add('slow');immunities.add('web');immunities.add('hold');specials.push({type:'freeAction',desc:sp.desc||'Free Action',src:item.n})}
        else if(sp.type==='regen'){specials.push({type:'regen',value:sp.value,desc:sp.desc||'Regenerate '+sp.value+' HP/round',src:item.n})}
        else{specials.push({...sp,src:item.n})}
      })}
    });
    b.armorAC=hasArmor?armorAC:10;
    b.immunities=[...immunities].sort();
    b.resistances=resistances;
    b.specials=specials;
    b.extraSpellSlots=extraSpellSlots;
    b.inactiveSlots=[...inactiveSlots];
    return b;
  },[equippedItems,activeWeapon,dualWielding,isWeaponTwoHanded]);

  // Effective abilities, including equipment SET (>=15 rule) / ADD modifiers.
  // Items like Girdle of Frost Giant Strength (stats.str=21) SET STR to max of all SET sources.
  // Items like Holy Symbol of Lathander (stats.str=1) ADD on top. Inactive slots (e.g. shield with 2H weapon) are skipped.
  const effAb=useMemo(()=>{
    const r={...baseAb};
    const eqAdd={str:0,dex:0,con:0,int:0,wis:0,cha:0};
    const eqSet={str:0,dex:0,con:0,int:0,wis:0,cha:0};
    const inactive=new Set(equipmentBonuses.inactiveSlots||[]);
    Object.entries(equippedItems||{}).forEach(([slotId,it])=>{
      if(inactive.has(slotId))return;
      const s=it&&it.stats;if(!s)return;
      ['str','dex','con','int','wis','cha'].forEach(a=>{
        const v=s[a];if(!v)return;
        if(Math.abs(v)>=15)eqSet[a]=Math.max(eqSet[a],v);
        else eqAdd[a]+=v;
      });
    });
    ['str','dex','con','int','wis','cha'].forEach(s=>{
      const base=r[s]||10;
      const afterSet=Math.max(base,eqSet[s]||0);
      r[s]=Math.max(1,Math.min(25,afterSet+(eqAdd[s]||0)));
    });
    r._base=baseAb;r._eqAdd=eqAdd;r._eqSet=eqSet;
    return r;
  },[baseAb,equippedItems,equipmentBonuses]);

  // Exceptional STR only applies when the *base* STR is 18 (not bumped up by equipment).
  const hasExcStr=isWarrior&&baseAb.str===18&&classMode!=='multi';

  // STR bonuses (derived from effective STR, including equipment)
  const strBonus=useMemo(()=>{
    const s=String(effAb.str);
    if(hasExcStr){
      const ranges=chargen.abilityEffects.strExceptionalRanges;
      for(const[lo,hi,key] of ranges){if(excStr>=lo&&excStr<=hi)return chargen.abilityEffects.strExceptional[key]||{}}
      return chargen.abilityEffects.str[s]||{};
    }
    return chargen.abilityEffects.str[s]||{};
  },[effAb.str,hasExcStr,excStr,chargen]);
  const dexBonus=chargen.abilityEffects.dex[String(effAb.dex)]||{};
  const conBonus=chargen.abilityEffects.con[String(effAb.con)]||{};
  const intBonus=chargen.abilityEffects.int[String(effAb.int)]||{};
  const wisBonus=chargen.abilityEffects.wis[String(effAb.wis)]||{};
  const chaBonus=chargen.abilityEffects.cha[String(effAb.cha)]||{};

  const formatEquipStats=(stats,slotId,item)=>{
    if(!stats&&!item)return '';
    const parts=[];
    if(stats){
      if(slotId==='armor'&&stats.ac!=null)parts.push('AC '+stats.ac);
      else if(stats.ac)parts.push('AC'+(stats.ac>0?'+':'')+stats.ac);
      if(stats.thac0)parts.push('THAC0+'+stats.thac0);
      if(stats.dmg)parts.push(stats.dmg);
      if(stats.dmgBonus)parts.push('Dmg+'+stats.dmgBonus);
      if(stats.apr)parts.push('APR+'+stats.apr);
      // Ability-score stats: values >= 15 render as SET (e.g. Girdle of Frost Giant Strength → "STR 21"),
      // smaller values as additive bonuses (+N). Mirrors BG2EE item conventions.
      ['str','dex','con','int','wis','cha'].forEach(a=>{
        if(stats[a]==null||stats[a]===0)return;
        const u=a.toUpperCase();
        if(Math.abs(stats[a])>=15)parts.push(u+' '+stats[a]);
        else parts.push(u+(stats[a]>0?'+':'')+stats[a]);
      });
      if(stats.saves)parts.push('Save'+(stats.saves>0?'+':'')+stats.saves);
      [['saveDeath','SvD'],['saveWand','SvW'],['savePoly','SvP'],['saveBreath','SvB'],['saveSpell','SvS']].forEach(([k,lbl])=>{if(stats[k])parts.push(lbl+(stats[k]>0?'+':'')+stats[k])});
      const resMap={fireResist:'Fire',coldResist:'Cold',electricityResist:'Elec',acidResist:'Acid',poisonResist:'Poison',magicDamageResist:'MagDmg',magicResist:'MR',slashingResist:'Slash',piercingResist:'Pierce',crushingResist:'Crush',missileResist:'Missile'};
      Object.entries(resMap).forEach(([k,lbl])=>{if(stats[k])parts.push(lbl+' '+stats[k]+'%')});
      if(stats.speed&&!(slotId||'').startsWith('weapon'))parts.push('Spd '+stats.speed);
      if(stats.special){if(Array.isArray(stats.special))parts.push(stats.special.length+' special');else parts.push(stats.special)}
    }
    if(item&&item.charges){
      const c=item.charges;if(c.count)parts.push(c.count+'\u00d7'+(c.period||'use'));
    }
    return parts.join(' ');
  };

  // Active weapon style — detects from loadout (active weapon + shield + dual-wield toggle)
  const activeStyle=useMemo(()=>{
    const wpn=equippedItems[activeWeapon];
    if(!wpn)return null;
    const isTwoHanded=isWeaponTwoHanded(wpn);
    if(dualWielding&&!isTwoHanded)return 'TWO_WEAPON';
    if(equippedItems.shield&&!isTwoHanded)return 'SWORD_SHIELD';
    if(isTwoHanded)return 'TWO_HANDED';
    return 'SINGLE_WEAPON';
  },[equippedItems,activeWeapon,dualWielding,isWeaponTwoHanded]);

  // Weapon proficiency bonuses from equipped weapon. profId comes from top-level wpn.profType first.
  const weaponProfBonus=useMemo(()=>{
    const none={thac0:0,dmg:0,apr:0,speed:0,ac:0,acAll:0,acMissile:0,critRange:0,pips:0,label:'',profId:null,style:null,styleLabel:'',profRemapNote:null};
    const wpn=equippedItems[activeWeapon];
    if(!wpn||!chargen.profPipBonuses)return none;
    let profId=resolveWeaponProfId(wpn);
    let profRemapNote=null;
    // If a replace-mode mod consolidated/grouped the prof list, the vanilla profId may not exist anymore.
    // Re-route through resolvedProfData.profMap when available; track the remap so the UI can explain it.
    if(profId&&resolvedProfData&&Array.isArray(resolvedProfData.profs)){
      if(!resolvedProfData.profs.find(p=>p.id===profId)){
        const mapped=resolvedProfData.profMap&&resolvedProfData.profMap[profId];
        if(mapped&&resolvedProfData.profs.find(p=>p.id===mapped)){
          profRemapNote={from:profId,to:mapped,modName:(resolvedProfData.replaceSrc&&resolvedProfData.replaceSrc.modName)||null};
          profId=mapped;
        }
      }
    }
    let thac0=0,dmg=0,apr=0,speed=0,label='',pips=0;
    if(profId){
