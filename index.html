<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Infinity Mod Forge</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Fira+Code:wght@400;500&family=Source+Sans+3:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0c0e14;--bg2:#141620;--bg3:#1a1e2e;--bgs:#10121a;--gold:#d4a843;--goldd:#8b7030;--goldb:#f0d060;--tx:#c8ccd8;--txd:#8890a4;--txb:#e8ecf4;--grn:#4ade80;--red:#f87171;--blu:#60a5fa;--pur:#a78bfa;--brd:#1e2234;--brd2:#2a3050;--org:#fb923c;--cyn:#67e8f9;--bg-bd1:#1e3a2f;--bg-bd2:#1e2a3a;--bg-bd3:#2a1e3a;--bg-bd4:#3a1e1e;--bg-warn:#2a2010;--brd-warn:#4a3820;--tx-warn:#f0c050;--bg-err:#2a1010;--brd-err:#4a2020;--bg-info:#10202a;--brd-info:#204a60;--bg-alert:#1a1410;--brd-alert:#3a2820}
html,body{height:100%}html{background:var(--bg);color:var(--tx);font-family:'Source Sans 3',sans-serif;font-size:14px;letter-spacing:.01em}body{display:flex;flex-direction:column}
::-webkit-scrollbar{width:6px;height:6px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--goldd);border-radius:3px}
a{color:var(--blu);text-decoration:none}a:hover{text-decoration:underline}
.ci{font-family:'Cinzel',serif}.fi{font-family:'Fira Code',monospace;font-size:.82em}
.bd{display:inline-block;padding:1px 7px;border-radius:3px;font-size:.72rem;font-weight:600;letter-spacing:.02em}
.bd1{background:var(--bg-bd1);color:var(--grn)}.bd2{background:var(--bg-bd2);color:var(--blu)}.bd3{background:var(--bg-bd3);color:var(--pur)}.bd4{background:var(--bg-bd4);color:var(--red)}
.bdo{background:#2a1a1a;color:var(--red);border:1px solid #4a2a2a}.bd-win{background:rgba(251,146,60,.12);color:var(--org);border:1px solid rgba(251,146,60,.3)}
.gw{text-shadow:0 0 20px rgba(212,168,67,.3)}
.tb{background:linear-gradient(180deg,#12141e,var(--bg));border-bottom:1px solid var(--brd);padding:10px 20px;position:sticky;top:0;z-index:50}
.sb{width:260px;min-width:260px;background:var(--bgs);border-right:1px solid var(--brd);overflow-y:auto;transition:left .25s}
.si{padding:7px 14px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;transition:all .15s;font-size:.83rem}
.si:hover{background:var(--bg3)}.si.ac{background:var(--bg3);border-left:3px solid var(--gold);color:var(--gold)}.si .ct{color:var(--txd);font-size:.75rem}
.sh{padding:8px 12px;font-size:.66rem;text-transform:uppercase;letter-spacing:.1em;color:var(--goldd);font-weight:700}
.mc{background:var(--bg2);border:1px solid var(--brd);border-radius:8px;margin-bottom:4px;transition:all .15s;overflow:hidden}
.mc:hover{border-color:var(--brd2);box-shadow:0 1px 6px rgba(212,168,67,.06)}.mc.sel{box-shadow:inset 3px 0 0 var(--gold)}.mc.sel.exp{margin-bottom:4px}.mx.fin{border-bottom:2px solid var(--gold);border-radius:0 0 6px 6px}.mc.cfl{border-color:#4a2020}
.mh{padding:9px 14px;cursor:pointer;display:flex;align-items:flex-start;gap:8px}
.mx{padding:0 14px 10px 32px;border-top:1px solid var(--brd)}
.cr{display:flex;align-items:flex-start;gap:8px;padding:5px 0 5px 8px;border-bottom:1px solid var(--brd);transition:background .15s}
.cr:last-child{border-bottom:none}.cr.xo{opacity:.5}.cr.ck-on{background:rgba(212,168,67,.08);border-radius:4px}
.ck{appearance:none;-webkit-appearance:none;width:16px;height:16px;min-width:16px;border:1.5px solid var(--brd2);border-radius:3px;cursor:pointer;position:relative;transition:all .15s;vertical-align:middle}
.ck:checked{background:var(--gold);border-color:var(--gold)}.ck:checked::after{content:'\2713';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:11px;color:var(--bg);font-weight:bold;line-height:1}
.sx{background:var(--bg2);border:1px solid var(--brd);color:var(--txb);padding:7px 12px;border-radius:6px;width:100%;font-size:.88rem;outline:none;font-family:inherit}.sx:focus{border-color:var(--goldd)}
.bt{padding:5px 14px;border-radius:5px;border:1px solid var(--brd2);background:var(--bg2);color:var(--tx);cursor:pointer;font-family:inherit;font-size:.82rem;transition:all .15s}
.bt:hover{background:var(--bg3);border-color:var(--goldd)}.bg{background:linear-gradient(135deg,var(--goldd),var(--gold));color:var(--bg);border:none;font-weight:700}.bg:hover{background:linear-gradient(135deg,var(--gold),var(--goldb))}
.bs{padding:3px 10px;font-size:.76rem}
.st{text-align:center}.sn{font-size:1.4rem;font-weight:700;color:var(--gold);line-height:1}.sl{font-size:.66rem;color:var(--txd);text-transform:uppercase;letter-spacing:.08em}
.ar{transition:transform .2s;color:var(--txd);font-size:.8rem;display:inline-block}.ar.op{transform:rotate(90deg)}
.nt{font-size:.76rem;color:var(--txd);line-height:1.4;white-space:pre-wrap;padding:3px 0}
.bb{position:sticky;bottom:0;background:var(--bgs);border-top:1px solid var(--brd);padding:8px 20px;display:flex;align-items:center;justify-content:space-between;z-index:50;gap:8px;flex-wrap:wrap}
.pl{padding:3px 10px;border-radius:12px;font-size:.72rem;cursor:pointer;border:1px solid var(--brd2);color:var(--tx);background:transparent;transition:all .15s;display:inline-block;user-select:none}
.pl:hover{border-color:var(--goldd);color:var(--tx)}.pl.ac{background:var(--goldd);color:var(--bg);border-color:var(--gold)}
.pl:focus-visible{outline:2px solid var(--goldd);outline-offset:2px}
@keyframes fi{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}.fin{animation:fi .15s ease-out}
@keyframes spin{to{transform:rotate(360deg)}}.spin{animation:spin 1s linear infinite}
.mo{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:100;display:flex;align-items:center;justify-content:center}
.md{background:var(--bg2);border:1px solid var(--brd2);border-radius:8px;padding:20px;max-width:760px;width:95%;max-height:85vh;overflow-y:auto}
.warn{background:var(--bg-warn);border:1px solid var(--brd-warn);border-radius:4px;padding:6px 12px;margin:3px 0;font-size:.78rem;color:var(--tx-warn)}
.err{background:var(--bg-err);border:1px solid var(--brd-err);color:var(--red)}.info{background:var(--bg-info);border:1px solid var(--brd-info);color:var(--blu)}
.sec-hdr{padding:6px 14px;font-size:.66rem;text-transform:uppercase;letter-spacing:.1em;color:var(--goldd);font-weight:700;font-family:'Cinzel',serif;background:linear-gradient(90deg,rgba(212,168,67,.08),transparent);border-left:3px solid var(--goldd);display:flex;align-items:center;gap:8px;height:50px;box-sizing:border-box}
.sec-hdr .sec-sub{font-family:'Source Sans 3',sans-serif;font-size:.62rem;color:var(--txd);letter-spacing:.04em;font-weight:400;text-transform:none}
.split-bd{background:rgba(167,139,250,.12);color:var(--pur);border:1px solid rgba(167,139,250,.3);cursor:pointer}
.split-bd:hover{background:rgba(167,139,250,.2)}
.v-comment{font-size:.68rem;color:var(--txd);font-style:italic;opacity:.8}
.drop-zone{border:2px dashed var(--brd2);border-radius:8px;padding:12px;text-align:center;transition:all .2s;cursor:pointer}
.drop-zone:hover{border-color:var(--gold);background:rgba(212,168,67,.05)}
.preset-card{background:var(--bg);border:1px solid var(--brd);border-radius:6px;padding:10px 12px;cursor:pointer;transition:all .15s}
.preset-card:hover{border-color:var(--gold);background:var(--bg3)}
.diff-add{color:var(--grn)}.diff-rem{color:var(--red)}
.tab{padding:7px 14px;cursor:pointer;font-size:.82rem;color:var(--txd);border-bottom:2px solid transparent;transition:all .15s}
.tab:hover{color:var(--tx)}.tab.ac{color:var(--gold);border-bottom-color:var(--gold)}
.diag-card{background:var(--bg);border:1px solid var(--brd);border-radius:6px;padding:10px 14px;margin-bottom:6px}
.diag-crit{border-left:3px solid var(--red)}.diag-warn{border-left:3px solid var(--org)}.diag-info{border-left:3px solid var(--blu)}.diag-ok{border-left:3px solid var(--grn)}
.ver-badge{font-size:.68rem;padding:1px 6px;border-radius:3px;font-weight:600}
.ver-ok{background:#1a2e1a;color:var(--grn)}.ver-up{background:#2a2010;color:var(--org)}
.gh-btn{padding:4px 10px;border-radius:4px;border:1px solid var(--brd);background:var(--bg2);color:var(--txd);cursor:pointer;font-size:.75rem;transition:all .15s}
.gh-btn:hover{border-color:var(--gold);color:var(--tx)}.gh-btn:disabled{opacity:.4;cursor:not-allowed}
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;gap:16px}
.loading-ring{width:40px;height:40px;border:3px solid var(--brd);border-top-color:var(--gold);border-radius:50%}
.detail{width:340px;min-width:340px;background:var(--bgs);border-left:1px solid var(--brd);overflow-y:auto;padding:0 14px 14px}
.detail-section{margin-bottom:12px}
.detail-section h4{font-size:.78rem;color:var(--goldd);text-transform:uppercase;letter-spacing:.08em;margin-bottom:4px}
.timeline{padding:14px;overflow-y:auto;flex:1}
.tl-cat{margin-bottom:10px}
.tl-cat-head{font-size:.82rem;font-weight:600;color:var(--gold);padding:4px 0;border-bottom:1px solid var(--brd);margin-bottom:4px}
.tl-mod{display:inline-block;padding:2px 8px;margin:2px;border-radius:4px;font-size:.72rem;cursor:pointer;border:1px solid var(--brd);transition:all .15s}
.tl-mod:hover{border-color:var(--gold)}.tl-mod.tl-sel{background:var(--goldd);color:var(--bg);border-color:var(--gold)}
/* Portraits panel */
/* .spell-* classes are shared across Spells, Kits, and Items panels (not spell-specific) */
.spell-panel{padding:14px;overflow-y:auto;flex:1}
.spell-toolbar{display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:12px}
.spell-subtabs{display:flex;gap:0;border-bottom:1px solid var(--brd);margin-bottom:12px}
.spell-subtab{padding:6px 14px;font-size:.78rem;cursor:pointer;color:var(--txd);border-bottom:2px solid transparent;transition:all .15s}
.spell-subtab:hover{color:var(--tx)}
.spell-subtab.ac{color:var(--gold);border-bottom-color:var(--gold);font-weight:600}
.spell-levels{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:12px}
.spell-levels .pill{padding:3px 12px;font-size:.75rem;border-radius:12px;cursor:pointer;background:var(--bg2);border:1px solid var(--brd);color:var(--txd);transition:all .15s}
.spell-levels .pill:hover{border-color:var(--brd2);color:var(--tx)}
.spell-levels .pill.ac{background:rgba(212,168,67,.12);border-color:var(--gold);color:var(--gold);font-weight:600}
.spell-levels .pill .cnt{font-size:.65rem;opacity:.7;margin-left:3px}
.spell-grid{display:flex;flex-wrap:wrap;gap:8px}
.spell-card{background:var(--bg2);border:1px solid var(--brd);border-radius:6px;padding:8px 10px;transition:all .15s;width:180px;text-align:center;position:relative;display:flex;flex-direction:column}
.spell-card:hover{border-color:var(--brd2);box-shadow:0 1px 8px rgba(212,168,67,.08)}
.spell-card.has-mods{border-bottom:2px solid var(--blu)}
.spell-card.is-added{border-bottom:2px solid var(--grn)}
.spell-card.has-conflict{border-bottom:2px solid var(--org)}
.spell-card .spell-icon{width:32px;height:32px;margin:0 auto 4px;border-radius:3px;overflow:hidden;background:var(--bg3);image-rendering:pixelated}
.spell-card .spell-icon img{width:100%;height:100%;object-fit:contain;image-rendering:pixelated}
.spell-card .spell-name{font-size:.78rem;font-weight:600;color:var(--gold);margin-bottom:2px;line-height:1.2}
.spell-card .spell-school{font-size:.62rem;color:var(--txd);margin-bottom:3px}
.spell-card .card-info{margin-top:4px;border-top:1px solid var(--brd);border-bottom:1px solid var(--brd);padding:4px 0;display:flex;flex-direction:column;gap:3px}
.spell-card .spell-desc{font-size:.62rem;color:var(--txd);line-height:1.3;text-align:center;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
.spell-card .card-info + .mod-changes,.spell-card .card-info ~ div > .mod-changes:first-child{border-top:0;padding-top:0}
.spell-card .action-badge{display:inline-block;padding:1px 5px;border-radius:3px;font-size:.55rem;font-weight:700;letter-spacing:.02em}
.spell-card .action-badge-corner{position:absolute;top:4px;left:4px}
.action-badge{display:inline-block;padding:2px 7px;border-radius:3px;font-size:.68rem;font-weight:700;letter-spacing:.02em}
.action-modify{background:#1e2a3a;color:var(--blu)}
.action-replace{background:#2a1e3a;color:var(--pur)}
.action-add{background:#1e3a2f;color:var(--grn)}
.action-tweak{background:rgba(212,168,67,.12);color:var(--goldd)}
.action-remove{background:#3a1e1e;color:var(--red)}
.card-action-bar{margin:-8px -10px 6px;padding:2px 0;border-radius:5px 5px 0 0;font-size:.55rem;font-weight:700;letter-spacing:.04em;text-align:center;text-transform:uppercase}
.card-action-bar.action-add{background:#1e3a2f;color:var(--grn)}
.card-action-bar.action-modify{background:#1e2a3a;color:var(--blu)}
.card-action-bar.action-replace{background:#2a1e3a;color:var(--pur)}
.card-action-bar.action-tweak{background:rgba(212,168,67,.12);color:var(--goldd)}
.card-action-bar.action-remove{background:#3a1e1e;color:var(--red)}
.card-action-bar.action-vanilla{background:var(--bg3);color:var(--txd)}
.spell-card .mod-changes{margin-top:auto;text-align:center;border-top:1px solid var(--brd);padding-top:4px}
.spell-card .mod-entry{margin-bottom:3px;font-size:.6rem}
.spell-card .mod-entry.is-winner{background:rgba(212,168,67,.06);border-radius:3px;padding:2px 3px}
.spell-card .mod-link{color:var(--blu);cursor:pointer;font-weight:600}
.spell-card .mod-link:hover{text-decoration:underline}
.spell-overview-grid{display:flex;flex-wrap:wrap;gap:6px}
.spell-mod-card{background:var(--bg2);border:1px solid var(--brd);border-radius:6px;padding:8px 10px;width:200px;height:52px;display:flex;flex-direction:column;justify-content:center;cursor:pointer;transition:all .15s;overflow:hidden}
.spell-mod-card:hover{border-color:var(--brd2);background:rgba(255,255,255,.03)}
.spell-mod-card .mod-name{font-weight:600;color:var(--tx);font-size:.78rem;line-height:1.3}
.spell-mod-card .mod-scope{font-size:.65rem;color:var(--txd);margin-top:2px}
.spell-mod-card .mod-stats{font-size:.68rem;color:var(--txd);margin-top:2px}
.spell-empty{text-align:center;padding:60px 20px;color:var(--txd)}
.spell-empty h3{color:var(--gold);margin-bottom:8px}
.portrait-avatar{width:110px;height:170px;margin:0 auto;border-radius:4px;overflow:hidden;background:var(--bg3);display:flex;align-items:center;justify-content:center;position:relative}
.portrait-avatar img{width:100%;height:100%;object-fit:cover}
.portrait-avatar .placeholder{font-size:2.4rem;font-weight:700;color:var(--goldd);opacity:.5;user-select:none}
.portrait-subtabs{display:flex;gap:0;border-bottom:1px solid var(--brd);margin-bottom:12px}
.portrait-subtab{padding:6px 14px;font-size:.78rem;cursor:pointer;color:var(--txd);border-bottom:2px solid transparent;transition:all .15s}
.portrait-subtab:hover{color:var(--tx)}
.portrait-subtab.ac{color:var(--gold);border-bottom-color:var(--gold);font-weight:600}
.tag-row{display:flex;gap:3px;flex-wrap:wrap;padding:3px 12px}
.tag{padding:2px 8px;border-radius:10px;font-size:.68rem;cursor:pointer;border:1px solid var(--brd);color:var(--txd);transition:all .15s}
.tag:hover{border-color:var(--goldd)}.tag.ac{background:var(--pur);color:#fff;border-color:var(--pur)}
/* Phase 1D + 2: New styles */
.alert-bar{background:#1a1410;border:1px solid #3a2820;border-radius:6px;padding:7px 12px;margin:3px 8px;display:flex;align-items:center;gap:8px;font-size:.8rem;animation:fi .15s ease-out;flex-wrap:wrap;word-break:break-word}
.alert-order{border-color:#1a3a3a;background:#0a1e1e;color:var(--cyn)}
.alert-conflict{border-color:#4a2020;background:#1e0e0e;color:var(--red)}
.alert-conflict-warn{border-color:rgba(251,146,60,.55);background:#1e1608;color:var(--org)}
.alert-dep{border-color:#204a20;background:#0e1e0e;color:var(--grn)}
.alert-essential{border-color:#6a4a10;background:#1e1408;color:#fbbf24}
.essential-badge{background:linear-gradient(135deg,#2a3a1a,#1a2a10);border:1px solid #4a6a2a;color:#a0d060;font-size:.6rem;padding:1px 6px;border-radius:3px;font-weight:700;letter-spacing:.04em}
.updated-badge{background:#2a2a1a;border:1px solid #4a4a2a;color:var(--org);font-size:.6rem;padding:1px 5px;border-radius:3px;font-weight:600}
.stars-badge{color:var(--goldb);font-size:.68rem}
.conflict-dot{width:7px;height:7px;border-radius:50%;background:var(--red);display:inline-block;margin-right:3px;flex-shrink:0}
.conflict-dot-warn{width:7px;height:7px;border-radius:50%;background:var(--org);display:inline-block;margin-right:3px;flex-shrink:0}
.dep-dot{width:7px;height:7px;border-radius:50%;background:var(--grn);display:inline-block;margin-right:3px;flex-shrink:0}
/* Wizard */
.wiz-overlay{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:200;display:flex;align-items:center;justify-content:center}
.wiz-card{background:var(--bg2);border:1px solid var(--gold);border-radius:12px;padding:28px;max-width:640px;width:95%;max-height:85vh;overflow-y:auto}
.wiz-dots{display:flex;gap:6px;margin-bottom:16px;justify-content:center}
.wiz-dot{width:10px;height:10px;border-radius:50%;background:var(--brd2);transition:all .2s}
.wiz-dot.ac{background:var(--gold)}
.wiz-opt{background:var(--bg);border:1px solid var(--brd);border-radius:8px;padding:12px 14px;cursor:pointer;transition:all .15s;margin-bottom:6px}
.wiz-opt:hover{border-color:var(--gold);background:var(--bg3)}
.wiz-opt.chosen{border-color:var(--gold);background:rgba(212,168,67,.1)}
/* Mobile */
.menu-toggle{display:none;background:none;border:1px solid var(--brd);color:var(--gold);font-size:1.1rem;padding:2px 8px;border-radius:4px;cursor:pointer}
@media(max-width:900px){.sb{width:220px;min-width:220px}.detail{width:280px;min-width:280px}}
@media(max-width:700px){
  .menu-toggle{display:inline-block}
  .sb{position:fixed;left:-270px;z-index:60;height:100vh;top:0;width:260px}
  .sb.open{left:0}
  .detail{position:fixed;right:-340px;z-index:60;top:52px;height:calc(100vh - 52px)}
  .detail.open{right:0}
  .mob-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:55}
}
/* Character Planner */
.planner-panel{padding:14px;overflow-y:auto;flex:1;display:flex;flex-direction:column;gap:14px}
.planner-top{display:flex;gap:12px;align-items:center;flex-wrap:wrap;padding:8px 12px;background:var(--bg2);border:1px solid var(--brd);border-radius:8px}
.planner-top select,.planner-top input[type="number"],.planner-top input[type="text"]{background:var(--bg);border:1px solid var(--brd);color:var(--tx);padding:4px 8px;border-radius:4px;font-family:inherit;font-size:.82rem}
.planner-top select:focus,.planner-top input:focus{border-color:var(--goldd);outline:none}
.planner-top label{font-size:.72rem;color:var(--txd);text-transform:uppercase;letter-spacing:.06em;display:flex;flex-direction:column;gap:2px}
.planner-mode-btns{display:flex;gap:0;border:1px solid var(--brd);border-radius:4px;overflow:hidden}
.planner-mode-btn{padding:4px 12px;font-size:.76rem;cursor:pointer;background:var(--bg);color:var(--txd);border:none;border-right:1px solid var(--brd);font-family:inherit;transition:all .15s}
.planner-mode-btn:last-child{border-right:none}
.planner-mode-btn.ac{background:var(--goldd);color:var(--bg);font-weight:600}
.planner-mode-btn:hover:not(.ac){background:var(--bg3);color:var(--tx)}
.planner-level{display:flex;align-items:center;gap:8px}
.planner-level input[type="range"]{width:180px;max-width:40vw;accent-color:var(--gold);cursor:pointer}
.planner-level .lv-num{font-size:1.1rem;font-weight:700;color:var(--gold);min-width:28px;text-align:center}

const LC=createContext({t:(k,fb)=>fb,tMod:(id,f,fb)=>fb,uiLang:'en',setUiLang:()=>{},langLoading:false});

function LangProvider({children}){
  const[uiLang,setUiLang]=useState(()=>LS.get('uiLang','en'));
  const[uiStr,setUiStr]=useState(null);
  const[modStr,setModStr]=useState(null);
  const[toolStr,setToolStr]=useState(null);
  const[langLoading,setLangLoading]=useState(false);
  useEffect(()=>{LS.set('uiLang',uiLang)},[uiLang]);
  useEffect(()=>{document.documentElement.lang=uiLang},[uiLang]);
  useEffect(()=>{
    if(uiLang==='en'){setUiStr(null);setModStr(null);setToolStr(null);return}
    setLangLoading(true);
    Promise.all([
      fetch('./data/lang/ui-'+uiLang+'.json').then(r=>r.ok?r.json():null).catch(()=>null),
      fetch('./data/lang/mods-'+uiLang+'.json').then(r=>r.ok?r.json():null).catch(()=>null),

    if(uiLang==='en'||!uiStr)return fallback;

    if(uiLang==='en'||!modStr)return fallback;

  },[uiLang,modStr]);
  const tTool=useCallback((toolId,field,fallback)=>{
    if(uiLang==='en'||!toolStr)return fallback;
    const entry=toolStr[toolId];if(!entry)return fallback;
    return entry[field]||fallback;
  },[uiLang,toolStr]);
  const value=useMemo(()=>({uiLang,setUiLang,t,tMod,tTool,langLoading}),[uiLang,t,tMod,tTool,langLoading]);
  return React.createElement(LC.Provider,{value},children);
}

// Parse a PI (Project Infinity) CSV export: each line is `<identifier>;<description>`.
// Identifier can be either `folder:cn` (legacy fallback when tp2 has no LABEL) or a raw
// LABEL such as `A7-DLCMERGER-MERGE_SOD` or `EBG1_MainComponent`. Description is always
// `<ModName> - <ComponentName>` — the authoritative string PI writes to the file.
// We emit a unified entry shape used by the resolver:
//   {folder?, comp?, modName?, compName?, raw, fmt:'pi'}
// folder/comp are populated for the colon form; modName/compName always populated from
// the description; raw is the original line for error display.
function parsePiCsv(text){
  const out=[];
  const colonRe=/^([^:;]+):(\d+)$/;
  text.split('\n').forEach(line=>{
    const l=line.trim();
    if(!l||l.startsWith('#')||l.startsWith('//'))return;
    const sc=l.indexOf(';');
    if(sc<0)return;
    const ident=l.slice(0,sc).trim();
    const desc=fixMojibake(l.slice(sc+1).trim());
    if(!ident||!desc)return;
    const dash=desc.indexOf(' - ');
    const modName=dash>0?desc.slice(0,dash).trim():null;
    const compName=dash>0?desc.slice(dash+3).trim():desc;
    const entry={raw:l,fmt:'pi',modName,compName};
    const cm=colonRe.exec(ident);
    if(cm){entry.folder=cm[1].toLowerCase();entry.comp=parseInt(cm[2],10)}
    out.push(entry);
  });
  return out;
}

// Is the text a PI CSV file? Heuristic: first non-empty, non-comment line contains `;`
// and does NOT look like a WeiDU.log line (no `~folder/file.tp2~` pattern).
function looksLikePiCsv(text){
  const lines=text.split('\n');

    if(!t||t.startsWith('#')||t.startsWith('//'))continue;

}

        {allEE.length===0&&classic.length===0?<div style={{fontSize:'.78rem',color:'var(--txd)'}}>{t('lbl.none','None')}</div>:null}
      </div>})()}
      {mod.no&&<div className="detail-section"><h4>{t('detail.notes','Notes')}</h4><div className="nt">{mod.no}</div></div>}
      {/* Structured conflicts */}
      {modConflicts.length>0&&<div className="detail-section"><h4>{t('detail.known_conflicts','Known Conflicts')} ({modConflicts.length})</h4>
        {modConflicts.map((c,i)=>{const other=D.find(m=>m.i===c.other);const swm=selWcByMod||{};function _isCA(mid,ws){if(!ws)return true;const s=swm[mid];if(!s)return false;for(const w of ws){if(s.has(w))return true}return false};const isActive=other&&other.co.some((_,ci)=>sel[other.i+'-'+ci])&&_isCA(mod.i,c.wcSet_a)&&_isCA(other.i,c.wcSet_b);
          return <div key={i} style={{padding:'4px 0',borderBottom:'1px solid var(--brd)'}}>
            <div style={{display:'flex',alignItems:'center',gap:4}}>
              {isActive&&<span className="conflict-dot"/>}

              <span style={{fontSize:'.82rem',color:isActive?'var(--red)':'var(--tx)'}}>{other?other.n:'Unknown'}</span>
            </div>

          </div>})}
      </div>}
      {modConflicts.length===0&&mod.ic&&<div className="detail-section"><h4>{t('detail.conflicts','Conflicts')}</h4><div style={{fontSize:'.82rem',color:'var(--red)'}}>{mod.ic}</div></div>}
      {mod.pl==='win'&&<div className="detail-section"><h4>{t('detail.platform','Platform')}</h4>
        <div style={{fontSize:'.82rem',color:'var(--org)'}}>{"\u229e"} Requires EEex (Windows native / Linux via Proton)</div>
        <div style={{fontSize:'.76rem',color:'var(--txd)',marginTop:2}}>macOS: Not supported (EEexMacLoader project is defunct)</div>
      </div>}
      {(vcEntry2||(ghMod&&(ghMod.pushed||ghMod.archived)))&&<div className="detail-section"><h4>{t('detail.github','GitHub')}</h4>
        {ghMod&&ghMod.pushed&&<div style={{fontSize:'.78rem',color:'var(--txd)'}}>{t('detail.last_push','Last push:')} {ghMod.pushed}</div>}

// ═══ Help Panel ═══
function HelpPanelInner({tab:helpTab,setTab}){
  const data=useContext(DC);
  const[openCat,setOpenCat]=useState(null);
  const[helpSearch,setHelpSearch]=useState('');
  const[pfxSearch,setPfxSearch]=useState('');
  const[pfxSort,setPfxSort]=useState({col:'prefix',asc:true});
  const[pfxFilter,setPfxFilter]=useState('all');

  const pfxRegistry=data['prefix-registry']||{};
  const pfxEntries=useMemo(()=>{
    const proj=(pfxRegistry.project||[]).map(e=>({...e,type:'Project'}));
    const pers=(pfxRegistry.personal||[]).map(e=>({...e,type:'Personal'}));
    return[...proj,...pers];
  },[pfxRegistry]);
  const pfxModMap=useMemo(()=>{
    const map={};const mods=data.mods||[];
    const endsAlpha=/[a-z0-9]$/i;
    pfxEntries.forEach(e=>{const pfx=e.prefix.toLowerCase();if(pfx.length<2)return;let c=0;
      const needDelim=endsAlpha.test(pfx);
      mods.forEach(m=>{const t=(m.pfx||'').toLowerCase();if(t&&t===pfx){c++;return}
        if(!t){const tp=(m.t||'').toLowerCase();if(tp.startsWith(pfx)){if(!needDelim||!tp[pfx.length]||/[^a-z0-9]/.test(tp[pfx.length]))c++}}});
      if(c)map[e.prefix]=c});
    return map;
  },[data.mods,pfxEntries]);
  const pfxCounts=useMemo(()=>({all:pfxEntries.length,conflicts:pfxEntries.filter(e=>e.status==='Conflict').length,project:pfxEntries.filter(e=>e.type==='Project').length,personal:pfxEntries.filter(e=>e.type==='Personal').length}),[pfxEntries]);
  const filteredPfx=useMemo(()=>{
    let arr=pfxEntries;
    if(pfxFilter==='conflicts')arr=arr.filter(e=>e.status==='Conflict');
    else if(pfxFilter==='project')arr=arr.filter(e=>e.type==='Project');
    else if(pfxFilter==='personal')arr=arr.filter(e=>e.type==='Personal');
    if(pfxSearch){const q=pfxSearch.toLowerCase();arr=arr.filter(e=>e.prefix.toLowerCase().includes(q)||e.owner.toLowerCase().includes(q))}
    const{col,asc}=pfxSort;
    arr=[...arr].sort((a,b)=>{const va=(a[col]||'').toLowerCase(),vb=(b[col]||'').toLowerCase();return asc?va.localeCompare(vb):vb.localeCompare(va)});
    return arr;
  },[pfxEntries,pfxSearch,pfxSort,pfxFilter]);
  const pfxValidation=useMemo(()=>{
    const q=pfxSearch.trim();if(!q)return null;
    const exact=pfxEntries.find(e=>e.prefix.toLowerCase()===q.toLowerCase());
    const hasUnsafe=/[\$\^\.\*\+\?\[\]\\]/.test(q);
    const tooLong=q.length>3;
    return{q,exact,hasUnsafe,tooLong};
  },[pfxSearch,pfxEntries]);

  const allSearchable=useMemo(()=>{
    const items=[];
    FAQ.forEach(cat=>cat.items.forEach(item=>items.push({section:'faq',q:item.q,a:item.a,tags:item.tags||[]})));
    [['start','prerequisites clean game installs BG:EE BG2:EE Siege of Dragonspear 30-50 GB WeiDU presets First Adventure Seasoned Adventurer SCS Tactical Mod Forge Ultimate conflict alerts Spells Kits Overview Kit Cap SPLSTATE export WeiDU.log WeiDU-BGEE.log install-EET.txt PI Format Mod Download List Pre-Install Checklist Share Report'],
     ['install','Project Infinity mod_installer Big World Setup BWS-NG manual installation eet mode new-pre-eet-dir new-eet-dir cargo install WeiDU BG1:EE BG2:EE DLC Merger EE Fixpack EET Core EET_End Generalized Biffing install order'],
     ['app','sidebar presets custom preset Save As filters authors categories legend import WeiDU.log drag and drop search Name mode All mode detail panel recommendations export Share Report diff tracking keyboard shortcut'],
     ['tabs','Order overlay install sequence Portraits tab NPC portrait phase Spells Kits tab spell conflicts schools Resources Diagnostics SPLSTATE Kit Cap Spell IDs version scanner debug log WSETUP.DEBUG Tools modding tools'],
     ['badges','ESSENTIAL DUAL INSTALL OVERRIDE WIN OPT 1-OF SPLIT Active Dormant ABANDONED ARCHIVED COMPLETE UPDATED BG1 SoD SoA ToB QoL Advanced Cosmetic Recommended PnP Caution'],
     ['links','Gibberlings3 Beamdog Spellhold Studios Weaselmods Artisans Corner Pocket Plane Group WeiDU mod_installer Project Infinity EET first-time modders tips'],
     ['prefixes','filename prefix registry resource conflict namespace override 8-character area reservation modder author lookup IE Infinity Engine BlackWyrmLair claim register']
    ].forEach(([s,t])=>items.push({section:s,q:'',a:t,tags:[]}));
    return items;
  },[]);

  const searchMatches=useMemo(()=>{
    if(!helpSearch)return null;
    const q=helpSearch.toLowerCase();const matched=new Set();
    allSearchable.forEach(item=>{if(item.q.toLowerCase().includes(q)||item.a.toLowerCase().includes(q)||item.tags.some(t=>t.toLowerCase().includes(q)))matched.add(item.section)});
    return matched;
  },[helpSearch,allSearchable]);

  const filteredFAQ=useMemo(()=>{
    if(!helpSearch)return FAQ;const q=helpSearch.toLowerCase();
    return FAQ.map(cat=>({...cat,items:cat.items.filter(item=>item.q.toLowerCase().includes(q)||item.a.toLowerCase().includes(q)||(item.tags||[]).some(t=>t.toLowerCase().includes(q)))})).filter(cat=>cat.items.length>0);
  },[helpSearch]);

  useEffect(()=>{if(searchMatches&&searchMatches.size>0&&!searchMatches.has(helpTab))setTab([...searchMatches][0])},[searchMatches]);

  const HS=({children})=><div style={{fontSize:'.82rem',fontWeight:700,color:'var(--goldd)',textTransform:'uppercase',letterSpacing:'.06em',marginBottom:8,paddingBottom:4,borderBottom:'1px solid var(--brd)'}}>{children}</div>;
  const HB=({children,style})=><div style={{background:'var(--bg2)',border:'1px solid var(--brd)',borderRadius:8,padding:'12px 14px',marginBottom:10,fontSize:'.8rem',color:'var(--txd)',lineHeight:1.6,...style}}>{children}</div>;
  const HStep=({n,children})=><div style={{display:'flex',gap:10,marginBottom:8}}><span style={{background:'var(--gold)',color:'var(--bg)',borderRadius:'50%',width:22,height:22,display:'flex',alignItems:'center',justifyContent:'center',fontSize:'.72rem',fontWeight:700,flexShrink:0}}>{n}</span><div style={{fontSize:'.8rem',color:'var(--txd)',lineHeight:1.6,flex:1}}>{children}</div></div>;
  const HCode=({children})=><code style={{background:'var(--bg)',padding:'2px 6px',borderRadius:4,fontSize:'.76rem',color:'var(--cyn)',fontFamily:'Fira Code, monospace'}}>{children}</code>;
  const HLink=({href,children})=><a href={href} target="_blank" rel="noopener" style={{color:'var(--blu)'}}>{children}{" \u2197"}</a>;

          <div><b style={{color:'var(--tx)'}}>WeiDU</b> {"\u2014"} The mod scripting engine. Most installers bundle it, but having it available helps for troubleshooting. <HLink href="https://weidu.org">weidu.org</HLink></div>
        </HB>

        <HS>Build Your Mod List</HS>
        <HStep n="1">Choose a starting <b style={{color:'var(--tx)'}}>preset</b> from the sidebar {"\u2014"} or browse categories to build your own.</HStep>
        <HStep n="2">Review <b style={{color:'var(--tx)'}}>conflict alerts</b> at the top of the Mods tab. Red = hard conflicts (must fix), orange = soft (install order matters).</HStep>
        <HStep n="3">Check <b style={{color:'var(--tx)'}}>Spells & Kits {'>'} Overview</b> for engine limits: Kit Cap ({'<'}320), SPLSTATE ({'<'}256), and Spell IDs per level ({'<'}50).</HStep>
        <HStep n="4">Customize: click any mod to expand it, toggle individual components on/off.</HStep>

        <HS>Export Your Selection</HS>

          <div style={{marginBottom:6}}>Click the green <b style={{color:'var(--grn)'}}>"Export..."</b> button in the bottom toolbar. You'll get:</div>
          <div style={{display:'grid',gridTemplateColumns:'auto 1fr',gap:'4px 12px',fontSize:'.78rem'}}>
            <span style={{color:'var(--tx)',fontWeight:600}}>Install Language</span><span>Choose your language. The exported WeiDU.log uses the correct language index for each mod. Mods without your language fall back to English (with a count shown).</span>
            <HCode>WeiDU.log</HCode><span>Main install log (BG2/EET side). Used by mod_installer and for manual installs.</span>
            <HCode>WeiDU-BGEE.log</HCode><span>BG1-side log for dual-install mods (e.g., EE Fixpack). Only appears if your selection includes BG1-side components.</span>
            <HCode>install-EET.txt</HCode><span>Project Infinity format. Lists mods in install order with component numbers.</span>
            <span style={{color:'var(--tx)',fontWeight:600}}>Mod Download List</span><span>JSON file with download URLs for all selected mods {"\u2014"} useful for batch downloading.</span>
            <span style={{color:'var(--tx)',fontWeight:600}}>Pre-Install Checklist</span><span>Text file with manual steps required before running the installer.</span>

        </HB>

      {helpTab==='install'&&<div>
        <HS>Option A: Project Infinity (GUI)</HS>
        <HB><HLink href="https://forums.beamdog.com/discussion/74335">Project Infinity</HLink> is a GUI-based mod manager that handles downloading, ordering, and installing.</HB>
        <HStep n="1"><b style={{color:'var(--tx)'}}>Set up PI</b> {"\u2014"} Download and extract. Launch it and point to your BG2:EE game directory. Set PI's language to match the language you chose in the Export dialog.</HStep>
        <HStep n="2"><b style={{color:'var(--tx)'}}>Import</b> {"\u2014"} Go to File {'>'} Import mod list and select the <HCode>install-EET.txt</HCode> exported from Infinity Mod Forge.</HStep>
        <HStep n="3"><b style={{color:'var(--tx)'}}>Download mods</b> {"\u2014"} PI auto-downloads most mods. For ones not in PI's database, download manually and place in your game directory. Folder names must match tp2 names (shown in gray on each mod card).</HStep>
        <HStep n="4"><b style={{color:'var(--tx)'}}>Set BG1:EE path</b> {"\u2014"} In PI settings, set the BG:EE path so DLC Merger and EET Core can access BG1 content.</HStep>
        <HStep n="5"><b style={{color:'var(--tx)'}}>Install</b> {"\u2014"} Verify all mods show green, then click Install. A full install can take 2{"\u2013"}8 hours.</HStep>
        <HStep n="6"><b style={{color:'var(--tx)'}}>Post-install</b> {"\u2014"} Check PI's log for errors. Launch BG2:EE and start a new game (required for EET).</HStep>

        <HS>Option B: mod_installer (CLI)</HS>
        <HB><HLink href="https://github.com/dark0dave/mod_installer">mod_installer</HLink> is an open-source CLI tool that reads WeiDU.log files and installs mods in order. Use v14.5+ (older versions have EET bugs).</HB>
        <HStep n="1"><b style={{color:'var(--tx)'}}>Install</b> {"\u2014"} <HCode>cargo install mod_installer</HCode> or download a binary from GitHub releases.</HStep>
        <HStep n="2"><b style={{color:'var(--tx)'}}>Prepare</b> {"\u2014"} Download every mod referenced in your WeiDU.log files and extract each into a single mods directory (e.g. <HCode>extracted-weidu/</HCode>). Folder names must match tp2 names exactly. Include DLC Merger, EE Fixpack, and EET Core alongside your other mods.</HStep>
        <HStep n="3"><b style={{color:'var(--tx)'}}>Run <HCode>eet</HCode> mode</b> {"\u2014"} One command handles the full EET pipeline (pre-EET on BG1:EE, EET merge, then everything on BG2:EE). <HCode>--new-pre-eet-dir</HCode> and <HCode>--new-eet-dir</HCode> point at the working copies mod_installer will create, so your Steam/GOG installs stay untouched.</HStep>
        <HB style={{background:'var(--bg)',fontFamily:'Fira Code, monospace',fontSize:'.72rem',color:'var(--cyn)',whiteSpace:'pre-wrap',overflow:'auto'}}>
{`mod_installer eet \\
  --bg1-game-directory "path/to/Baldur's Gate Enhanced Edition" \\
  --bg1-log-file      "path/to/WeiDU_Logs/BGEE/weidu.log" \\
  --bg2-game-directory "path/to/Baldur's Gate II Enhanced Edition" \\
  --bg2-log-file      "path/to/WeiDU_Logs/BG2EE_EET/weidu.log" \\
  --new-pre-eet-dir   "path/to/BG_EET/BG1" \\
  --new-eet-dir       "path/to/BG_EET/BG2" \\
  --mod-directories   "path/to/extracted-weidu" \\
  --weidu-binary      "path/to/weidu.exe" \\
  --language en_US \\
  --weidu-log-mode "autolog,logapp,log-extern,log path/to/eet_logs" \\
  --skip-installed true \\
  --strict-matching false \\
  --download true \\
  --overwrite false \\
  --abort-on-warnings false \\
  --check-last-installed true \\
  --lookback 2000`}
        </HB>
        <HB style={{fontSize:'.76rem'}}>
          <b style={{color:'var(--tx)'}}>Non-EET installs</b> {"\u2014"} For BG2:EE-only, IWD:EE, or PST:EE, use <HCode>mod_installer normal --game-directory ... --log-file WeiDU.log --mod-directories ... --weidu-binary ...</HCode> against a single game directory.
        </HB>
        <HStep n="4"><b style={{color:'var(--tx)'}}>Monitor</b> {"\u2014"} Full installs take 2{"\u2013"}8 hours. Don't interrupt. Watch terminal output for ERROR or FATAL lines.</HStep>
        <HStep n="5"><b style={{color:'var(--tx)'}}>Post-install</b> {"\u2014"} Upload <HCode>setup-*.debug</HCode> files to <b>Resources {'>'} Diagnostics</b> to check for known issues. Launch BG2:EE from the <HCode>--new-eet-dir</HCode> path and start a new game.</HStep>

        <HS>Option C: Big World Setup NG (GUI)</HS>
        <HB><HLink href="https://github.com/Selphira/BigWorldSetup-Next-Generation">Big World Setup NG</HLink> is a modern Python-based GUI for automating mod installation. Cross-platform (Windows/Linux), multilingual (English, French, Chinese), and syncs with the Infinity Engine Mod List database.</HB>
        <HStep n="1"><b style={{color:'var(--tx)'}}>Install</b> {"\u2014"} Download from GitHub releases. Requires Python. Follow the setup instructions in the repository README.</HStep>
        <HStep n="2"><b style={{color:'var(--tx)'}}>Select game</b> {"\u2014"} Choose your target game (EET, BG2:EE, IWD:EE, etc.) and point to your game directory.</HStep>
        <HStep n="3"><b style={{color:'var(--tx)'}}>Choose mods</b> {"\u2014"} Browse available mods from the synced database, or import a WeiDU.log from Infinity Mod Forge. You can also add custom mods not in the database.</HStep>
        <HStep n="4"><b style={{color:'var(--tx)'}}>Install</b> {"\u2014"} Verify the install order and let BWS-NG handle downloading, extracting, and installing automatically.</HStep>
        <HStep n="5"><b style={{color:'var(--tx)'}}>Post-install</b> {"\u2014"} Check the log for errors. Launch BG2:EE and start a new game (required for EET).</HStep>

        <HS>Option D: Manual Installation</HS>
        <HB>For users who want full control. Not recommended for large installs (400+ mods would take days).</HB>
        <HStep n="1">Clean BG2:EE install. Download all mods and extract to game directory.</HStep>
        <HStep n="2">Open the <b style={{color:'var(--tx)'}}>Report</b> from Infinity Mod Forge {"\u2014"} it gives you a human-readable checklist with install order.</HStep>
        <HStep n="3">Install mods in the exact order shown in the <b>Order</b> overlay (footer button). For each mod:</HStep>
        <HB style={{background:'var(--bg)',fontFamily:'Fira Code, monospace',fontSize:'.74rem',color:'var(--cyn)'}}>cd "your-game-directory"<br/>weidu setup-MODNAME.tp2 --no-exit-pause</HB>
        <div style={{fontSize:'.78rem',color:'var(--txd)',marginBottom:12}}>When prompted, enter the component numbers shown in your WeiDU.log.</div>

        <HS>Install Order (All Methods)</HS>
        <HB style={{fontSize:'.76rem'}}>
          <div style={{columns:2,columnGap:16}}>
            {['1. PRE EET BGEE (DLC Merger, EE Fixpack)','2. EET STARTS HERE (EET Core)','3. ENGINE (EEex)','4. INTERFACE','5. GRAPHICS & SOUND','6. RESTORATIONS','7. QUEST MODS BG1','8. QUEST MODS BG2','9. QUEST MODS ToB','10. NEW NPC MODS','11. NPC EXPANSIONS','12. NPC CROSSMOD','13. CREATURE MODS','14. EXPERIENCE TWEAKS','15. ITEM ADDITION MODS','16. SPELL MODS','17. KIT & CLASS MODS','18. PRE-TACTICAL TWEAKS','19. TACTICAL (SCS)','20. POST-TACTICAL TWEAKS','21. NPC CUSTOMIZATION','22. POST-TACTICAL QUESTS','23. MUSIC & AUDIO','24. PORTRAITS','25. EET FINALIZATION (EET_End last)','26. POST EET'].map((s,i)=>
              <div key={i} style={{padding:'2px 0',color:i===0||i===1||i===24?'var(--gold)':'var(--txd)'}}>{s}</div>
            )}
          </div>
        </HB>
      </div>}

      {helpTab==='app'&&<div>
        <HS>Sidebar</HS>
        <HB>
          <div style={{marginBottom:6}}>The sidebar (click <b style={{color:'var(--tx)'}}>{"\u2630"}</b> to toggle) has five collapsible sections:</div>
          <div style={{marginBottom:4}}><b style={{color:'var(--tx)'}}>Presets</b> {"\u2014"} Three built-in presets (First Adventure, Seasoned Adventurer, Veteran's Challenge) plus your saved custom presets and community builds. First-time users see a guided wizard that recommends a starting point based on experience level and content preferences.</div>
          <div style={{marginBottom:4}}><b style={{color:'var(--tx)'}}>Filters</b> {"\u2014"} Toggle: Selected, Cross-Platform, Standalone, Active Only (hides dormant/abandoned), and phase filters (BG1, SoD, SoA, ToB).</div>
          <div style={{marginBottom:4}}><b style={{color:'var(--tx)'}}>Authors</b> {"\u2014"} Searchable author list with mod counts. Click to filter.</div>
          <div style={{marginBottom:4}}><b style={{color:'var(--tx)'}}>Categories</b> {"\u2014"} Browse mods by install category. Subcategories appear when expanded.</div>
          <div><b style={{color:'var(--tx)'}}>Legend</b> {"\u2014"} Visual reference for all badges and status indicators.</div>
        </HB>
        <HS>Custom Presets</HS>
        <HB>
          <div style={{marginBottom:4}}>Click <b style={{color:'var(--tx)'}}>"Save As..."</b> in the bottom toolbar to save your current selection as a named preset. Stored in your browser (localStorage) and persists across sessions.</div>
          <div>To delete a custom preset, expand the Presets section in the sidebar and click the delete button next to it.</div>
        </HB>
        <HS>Import</HS>
        <HB>
          <div style={{marginBottom:4}}>Drag and drop a <HCode>WeiDU.log</HCode> file onto the sidebar's import area (or click "Drop WeiDU.log" to browse). The app will parse the log, match installed mods, and recreate your selection.</div>
          <div>Useful for importing an existing modded game or sharing selections between machines.</div>
        </HB>
        <HS>Search</HS>
        <HB>
          <div style={{marginBottom:4}}>Press <HCode>/</HCode> to focus the search box. Toggle between two modes with the Name/All button:</div>
          <div style={{marginBottom:4}}><b style={{color:'var(--tx)'}}>Name mode</b> {"\u2014"} Searches mod names and tp2 IDs only (exact substring match).</div>
          <div><b style={{color:'var(--tx)'}}>All mode</b> {"\u2014"} Searches names, authors, component names, descriptions, and summaries (fuzzy match).</div>
        </HB>
        <HS>Mod Detail Panel</HS>
        <HB>
          <div style={{marginBottom:4}}>Click <b style={{color:'var(--tx)'}}>Info</b> on any mod card to open the detail panel showing:</div>
          <div>{"\u2022"} Full description and author info {"\u2022"} All components with descriptions and tags {"\u2022"} Conflict details {"\u2022"} Dependencies and recommendations {"\u2022"} Changelog notes and known issues</div>
        </HB>
        <HS>Bottom Toolbar</HS>
        <HB>
          <div style={{marginBottom:4}}>Shows: <b style={{color:'var(--tx)'}}>Mods</b> (total), <b style={{color:'var(--grn)'}}>Sel</b> (selected), and the <b style={{color:'var(--tx)'}}>{"\u0394"} diff tracker</b> (+added / -removed since session start).</div>
          <div style={{marginBottom:4}}>Buttons: <b style={{color:'var(--tx)'}}>Save As</b> (custom preset), <b style={{color:'var(--tx)'}}>Share</b> (URL), <b style={{color:'var(--tx)'}}>Report</b> (text summary), <b style={{color:'var(--grn)'}}>Export</b> (all file formats).</div>
          <div>The engine limits dot appears when SPLSTATE, Spell IDs, or Kit Cap approach their limits. Click it to jump to Diagnostics.</div>
        </HB>
      </div>}

      {helpTab==='tabs'&&<div>
        <HS>Mods Tab</HS>
        <HB>
          <div style={{marginBottom:4}}>The main browsing view. <b style={{color:'var(--tx)'}}>817 mods</b> organized by install order across 26 categories. Click any mod to expand its detail panel with components, conflicts, dependencies, and recommendations.</div>
          <div style={{marginBottom:4}}>The <b style={{color:'var(--tx)'}}>Order</b> overlay (footer button) visualizes install sequence by category. Each header has a "Why here?" section explaining that category's install position.</div>
          <div>Conflict, suggestion, and order overlays open from the footer and are mutually exclusive.</div>
        </HB>
        <HS>Portraits Tab</HS>
        <HB>
          <div style={{marginBottom:4}}>Shows all <b style={{color:'var(--tx)'}}>NPC portraits</b> affected by selected mods: Companions, Other NPCs, and Player character tabs.</div>
          <div style={{marginBottom:4}}><b style={{color:'var(--tx)'}}>Phase tracking</b> {"\u2014"} Portraits color-coded by game phase (BG1, SoD, SoA, ToB).</div>
          <div>When multiple mods change the same NPC, <b style={{color:'var(--org)'}}>conflicts</b> are flagged. Use the conflict filter to focus.</div>
        </HB>
        <HS>Spells, Kits & Items Tab</HS>
        <HB>
          <div style={{marginBottom:4}}>Unified tab with sub-tabs for <b style={{color:'var(--tx)'}}>Spells</b> (Wizard, Priest, Innate), <b style={{color:'var(--tx)'}}>Kits</b> (14 class subtabs), and <b style={{color:'var(--tx)'}}>Items</b> (7 category tabs).</div>
          <div style={{marginBottom:4}}>Each card shows action badges (ADDED, MODIFIED, REPLACED, TWEAKED, REMOVED) with mod attribution. Conflicts are highlighted when 2+ mods modify the same entry.</div>
          <div style={{marginBottom:4}}>The <b style={{color:'var(--tx)'}}>Overview</b> subtab shows engine limit progress bars (SPLSTATE.IDS cap 256, Spell IDs per level cap 50, Kit Cap 320, Item counts) and active mod contributor grids.</div>
          <div>Use the <b style={{color:'var(--tx)'}}>Affected</b> filter to see only entries touched by selected mods, or <b style={{color:'var(--tx)'}}>Conflicts</b> to find cross-mod collisions.</div>
        </HB>
        <HS>Character Planner Tab</HS>
        <HB>
          <div style={{marginBottom:4}}>Interactive <b style={{color:'var(--tx)'}}>BG2-style character sheet</b>. Pick race, class/kit, set ability scores, and slide through levels 1{"\u2013"}40 to see stats update live.</div>
          <div style={{marginBottom:4}}>11 equipment slots with searchable item dropdowns. Combat stats (THAC0, AC, saves, APR, damage) incorporate proficiency pips, equipment, and kit bonuses.</div>
          <div style={{marginBottom:4}}>Spell slots with WIS/specialist bonuses and deity sphere filtering. Proficiency allocation with mod-aware grouped categories.</div>
          <div><b style={{color:'var(--tx)'}}>Mod-aware</b> {"\u2014"} selected mods feed kits, spells, items, proficiency changes, and kit abilities into the planner.</div>
        </HB>
        <HS>Community Tab</HS>
        <HB>
          <div style={{marginBottom:4}}>Browse, load, and merge <b style={{color:'var(--tx)'}}>community-published mod builds</b>. See what other players are installing.</div>
          <div style={{marginBottom:4}}>Per-component <b style={{color:'var(--tx)'}}>stability indicators</b> from anonymized install telemetry (green/yellow/red dots).</div>
          <div>Publish your own build via the bottom toolbar {"\u2014"} builds are submitted as GitHub Issues and reviewed before appearing.</div>
        </HB>
        <HS>Resources Tab</HS>
        <HB>
          <div style={{marginBottom:4}}>Contains this help system plus three tool sub-tabs:</div>
          <div style={{marginBottom:4}}><b style={{color:'var(--tx)'}}>Tools</b> {"\u2014"} Catalog of external modding tools (installers, editors, utilities) with platform compatibility and download links.</div>
          <div style={{marginBottom:4}}><b style={{color:'var(--tx)'}}>Versions</b> {"\u2014"} Version scanner showing mod freshness via GitHub metadata. Folder scan feature (Chrome/Edge) compares your installed mods against known releases.</div>
          <div><b style={{color:'var(--tx)'}}>Diagnostics</b> {"\u2014"} Drop a <HCode>WSETUP.DEBUG</HCode> file to analyze errors and warnings. Matches against known issues with workarounds. Share diagnostics to the telemetry repo.</div>
        </HB>
      </div>}

        <HS>Communities</HS>

          <div style={{marginBottom:6}}><HLink href="https://www.gibberlings3.net/forums/">Gibberlings3 Forums</HLink> {"\u2014"} The main Infinity Engine modding community.</div>
          <div style={{marginBottom:6}}><HLink href="https://forums.beamdog.com/">Beamdog Forums</HLink> {"\u2014"} Official game forums with active modding sections.</div>

function Timeline({D,sel,essentialsList,conflicts,minEss}){
  const cats=useMemo(()=>{const c={};D.forEach(m=>{if(!c[m.c])c[m.c]=[];c[m.c].push(m);if(m.cats){m.cats.forEach(cat=>{if(cat!==m.c){if(!c[cat])c[cat]=[];if(!c[cat].some(x=>x.i===m.i))c[cat].push(m)}})}});return c},[D]);
  // Timeline's "has conflicts" highlight should only fire for actual
  // `conflicts[]` entries, not advisories (which are plausible-only).
  // Advisories deliberately don't glow red in the timeline — they're not a
  // "you have a problem" signal.
  const conflictMods=useMemo(()=>{const s=new Set();if(conflicts)conflicts.filter(c=>!c.orderOnly&&c.kind!=='advisory').forEach(c=>{if(c.a)s.add(c.a);if(c.b)s.add(c.b)});return s},[conflicts]);
  const missingEss=useMemo(()=>{if(!essentialsList)return[];return essentialsList.filter(e=>{const mod=D.find(m=>m.i===e.id);return !mod||!mod.co.some((_,ci)=>sel[mod.i+'-'+ci])});},[essentialsList,D,sel]);
  return(
    <div className="timeline">
      {minEss!==false&&missingEss.length>0&&<div style={{marginBottom:12}}>{missingEss.map(e=>(
        <div key={e.id} className="warn" style={{display:'flex',alignItems:'center',gap:8,marginBottom:4}}>
          <span style={{fontSize:'1rem'}}>{"\u26a0"}</span>
          <span><b>{e.label}</b> is not selected. {e.reason}</span>
        </div>
      ))}</div>}
      <div style={{fontSize:'.78rem',color:'var(--txd)',marginBottom:12}}>
        <span style={{display:'inline-block',width:12,height:12,background:'var(--goldd)',border:'1px solid var(--gold)',borderRadius:3,marginRight:4,verticalAlign:'middle'}}></span> Selected
        <span style={{display:'inline-block',width:12,height:12,border:'1px solid var(--brd)',borderRadius:3,marginLeft:12,marginRight:4,verticalAlign:'middle'}}></span> Available
      </div>
      {CO.filter(c=>cats[c]).map(cat=>(
        <div key={cat} className="tl-cat">
          <div className="tl-cat-head">{CL[cat]||cat} ({cats[cat].length})</div>
          <div style={{display:'flex',flexWrap:'wrap'}}>
            {cats[cat].map(mod=>{
              const isSel=mod.co.some((_,ci)=>sel[mod.i+"-"+ci]);
              const hasConf=conflictMods.has(mod.i);
              return <span key={mod.i} className={"tl-mod"+(isSel?" tl-sel":"")} style={hasConf&&isSel?{borderColor:'var(--red)',boxShadow:'0 0 4px rgba(239,68,68,.3)'}:undefined} title={mod.n+"\n"+mod.co.length+" components"+(isSel?" (selected)":"")+(hasConf?" \u26a0 has conflicts":"")}>{mod.n.length>25?mod.n.substring(0,23)+"\u2026":mod.n}</span>
            })}
          </div>
        </div>
      ))}
    </div>);
}

function renderActionBadge(action){const[label,cls]=ACTION_STYLES[action]||['?',''];return <span className={"action-badge "+cls}>{label}</span>}

// Returns the standard set of props that turn a non-button element into a
// keyboard-accessible clickable. Use on every clickable <div>/<span>: the
// onClick still fires for mouse, and Enter/Space activate it for keyboard
// users. role+aria-label make screen readers announce it as a button.
function clickableProps(label,onActivate){
  return{
    role:'button',
    tabIndex:0,
    'aria-label':label,
    onClick:onActivate,
    onKeyDown:(e)=>{if(e.key==='Enter'||e.key===' '){e.preventDefault();onActivate(e)}}
  };
}

// Toolbar/filter pill — keyboard-accessible by default. Supports the standard
// active state via `active` prop (equivalent to the legacy `pl ac` class).
// Inline style still passes through for tiny tweaks like fontSize/marginLeft.
function Pill({active,onClick,children,style,title,ariaLabel,extraClass}){
  const cls='pl'+(active?' ac':'')+(extraClass?' '+extraClass:'');
  const label=ariaLabel||(typeof children==='string'?children:title)||'';
  return <span className={cls} title={title} {...clickableProps(label,onClick)} style={style} aria-pressed={active?true:false}>{children}</span>;
}

// Shared filter-toggle tip content. Use across Spells/Kits/Items/Portraits so
// translators see one canonical copy of each label and description.
function FilterTip({kind,entityPlural,t,children}){
  const e=entityPlural||t('tip.entities','entries');
  const isAff=kind==='affected';
  const title=isAff?t('ski.affected','Affected only'):t('ski.conflicts','Conflicts only');
  const desc=isAff
    ?t('tip.affected_desc','Hide '+e+" the selected mods don't touch. Useful for quickly reviewing what a load order actually changes.")
    :t('tip.conflicts_desc','Show '+e+" touched by more than one mod's modify/replace action. These are where last-installed-wins can matter.");
  return <Tip content={<><span className="tip-title">{title}</span><span className="tip-desc">{desc}</span></>}>{children}</Tip>;
}

// Shared card footer for spells/kits/items — shows the mod currently "owning" the entity.
// Rule: if something added the entity, show that adder. Otherwise show the winning modifier.
// Full mod attribution lives in the detail modal.
function ActiveModLine({activeMods,winner,onNavigate}){
  if(!activeMods||!activeMods.length)return null;
  const adder=activeMods.find(m=>m.action==='add');
  const shown=adder||winner||activeMods[activeMods.length-1];
  if(!shown)return null;
  return <div className="mod-changes">
    <div className="mod-entry is-winner">
      <span className="mod-link" onClick={e=>{e.stopPropagation();onNavigate&&onNavigate(shown.modId)}}>{adder?"+ ":""}{shown.modName}</span>
    </div>
  </div>;
}

// Splits activeMods into the adder (if any) and the list of modifiers — used in modals.
function splitModEntries(activeMods){
  if(!activeMods||!activeMods.length)return{adder:null,modifiers:[]};
  const adder=activeMods.find(m=>m.action==='add')||null;
  const modifiers=activeMods.filter(m=>m.action!=='add');
  return{adder,modifiers};
}

// Shared empty-state for spell/kit/item grids. Picks a reason based on which filter
