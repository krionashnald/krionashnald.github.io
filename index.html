      hlaNote=pool.note||null;
    }else{
      // Default behavior — pull from each active class's pool
      activeClasses.forEach(c=>{
        const list=chargen.hlas[c]||[];
        list.forEach(h=>{if(!seen.has(h.n)){seen.add(h.n);hlaSet.push({...h,cls:c})}});
      });
    }
    if(hlaSet.length===0)return null;
    const cls=classMode==='multi'?activeClasses[0]:classMode==='dual'?dualNew:singleClass;
    const tbl=chargen.xpTable[cls];
    let thresholdLv=1;
    if(tbl){for(let i=0;i<tbl.length;i++){if(tbl[i]>=threshold){thresholdLv=i+1;break}}}
    const effLv=classMode==='multi'?Math.max(1,Math.floor(level/activeClasses.length)):
                classMode==='dual'?Math.max(1,level-dualLvl):level;
    const unlocked=xpForLevel>=threshold;
    const picks=unlocked?Math.max(0,effLv-thresholdLv+1):0;
    const xpToUnlock=Math.max(0,threshold-xpForLevel);
    return{hlas:hlaSet,picks,unlocked,thresholdLv,xpToUnlock,threshold,note:hlaNote};
  }catch(e){return null}
  },[level,activeClasses,classMode,singleClass,dualNew,dualLvl,xpForLevel,chargen,kit]);

  // Resolve mod-added kits + mod-modified vanilla kit annotations
  const resolvedKits=useMemo(()=>{
    const result=[];
    const kitAbils=(chargen&&chargen.kitAbilities)||{};
    const mergeAbils=(id)=>{const a=kitAbils[id];if(!a)return{};return{canDual:a.canDual,canDualTo:a.canDualTo,allowedMulticlass:a.allowedMulticlass,npcOnly:a.npcOnly,hlaPool:a.hlaPool,spellRestrictions:a.spellRestrictions,statBonus:a.statBonus,statReq:a.statReq}};
    // First pass: walk selected mods to collect kit modifications (action + summary per mod)
    const kitMods={}; // kitId -> [{modName, action, summary}, ...]
    const cache=data._detailCache||{};
    try{Object.keys(sel).forEach(key=>{
      if(!sel[key])return;
      const[mid,ci]=key.split('-').map(Number);
      const detail=cache[mid];
      if(!detail||!detail.kits)return;
      const entry=detail.kits[String(ci)];
      if(!entry||!Array.isArray(entry.modify))return;
      const mod=D.find(m=>m.i===mid);
      const modName=mod?mod.n:'Mod';
      entry.modify.forEach(it=>{
        if(!Array.isArray(it)||!it[0])return;
        const[kitId,action,summary]=it;
        if(!kitMods[kitId])kitMods[kitId]=[];
        kitMods[kitId].push({modName,action:action||'modify',summary:summary||''});
      });
    })}catch(e){}
    try{
    // Vanilla kits — attach any mod modifications
    if(vanillaKits){
      Object.entries(vanillaKits).forEach(([k,v])=>{
        const cls=classMode==='multi'?null:classMode==='dual'?dualNew:singleClass;
        if(cls&&v.class&&v.class.toUpperCase()===cls){
          result.push({id:k,name:v.n,class:v.class,desc:v.desc,vanilla:true,modifiers:kitMods[k]||[],...mergeAbils(k)});
        }
      });
    }
    // Mod-added kits — meta comes from the mod entry's 5th element when present
    const cache=data._detailCache||{};
    try{Object.keys(sel).forEach(key=>{
      if(!sel[key])return;
      const[mid,ci]=key.split('-').map(Number);
      const detail=cache[mid];
      if(!detail||!detail.kits)return;
      const entry=detail.kits[String(ci)];
      if(!entry||!entry.new||!Array.isArray(entry.new))return;
      entry.new.forEach(item=>{
        if(!item||!Array.isArray(item))return;
        const[ref,cls,name,desc,meta]=item;
        const targetCls=classMode==='multi'?null:classMode==='dual'?dualNew.toLowerCase():singleClass.toLowerCase();
        if(targetCls&&cls===targetCls){
          const mod=D.find(m=>m.i===mid);
          const m=(meta&&typeof meta==='object')?meta:{};
          // Mod meta overrides chargen.kitAbilities (some mods define their own kits)
          result.push({id:ref,name,class:cls,desc,vanilla:false,modName:mod?mod.n:'Mod',...mergeAbils(ref),canDual:m.canDual!=null?m.canDual:(kitAbils[ref]&&kitAbils[ref].canDual),canDualTo:m.canDualTo||(kitAbils[ref]&&kitAbils[ref].canDualTo),allowedMulticlass:m.allowedMulticlass!=null?m.allowedMulticlass:(kitAbils[ref]&&kitAbils[ref].allowedMulticlass),npcOnly:m.npcOnly||(kitAbils[ref]&&kitAbils[ref].npcOnly),hlaPool:m.hlaPool||(kitAbils[ref]&&kitAbils[ref].hlaPool),spellRestrictions:m.spellRestrictions||(kitAbils[ref]&&kitAbils[ref].spellRestrictions),statBonus:m.statBonus||(kitAbils[ref]&&kitAbils[ref].statBonus)});
        }
      });
    })}catch(e){}
    }catch(e){console.warn('Kit resolution error:',e)}
    // Post-filter by mode eligibility.
    // Semantics of allowedMulticlass:
    //   undefined/null → fail open (legacy mod data)
    //   true           → allowed in any multi
    //   [] (empty)     → NOT allowed (explicit block, most vanilla kits)
    //   ['MAGE',...]   → allowed (has candidates)
    const filtered=result.filter(k=>!k.npcOnly);
    if(classMode==='dual')return filtered.filter(k=>k.canDual==null||k.canDual===true);
    if(classMode==='multi')return filtered.filter(k=>{
      const a=k.allowedMulticlass;
      if(a==null)return true; // fail open
      if(a===true)return true;
      if(Array.isArray(a))return a.length>0;
      return false;
    });
    return filtered;
  },[vanillaKits,sel,data._detailCache,D,classMode,singleClass,dualNew,detailVer,chargen]);

  // Compute active opposition schools for specialist mages
  const oppositionSchools=useMemo(()=>{
    if(!kit||classMode!=='single')return[];
    const cache=data._detailCache||{};
    let modOpp=null;
    try{if(catMap){CO.filter(c=>catMap[c]).forEach(cat=>{
      (catMap[cat]||[]).forEach(mod=>{
        if(!mod||!mod.co)return;
        const detail=cache[mod.i];
        if(!detail||!detail.opp)return;
        mod.co.forEach((comp,ci)=>{
          if(!sel[mod.i+'-'+ci])return;
          const oppData=detail.opp[''+ci];
          if(oppData&&oppData[kit])modOpp=oppData[kit];
        });
      });
    })}}catch(e){}
    if(modOpp)return modOpp;
    return chargen.oppositionSchools&&chargen.oppositionSchools[kit]||[];
  },[kit,classMode,sel,data._detailCache,D,catMap,chargen,detailVer]);

  // Resolve spells available at current level — uses same dedup logic as SpellsPanel (last mod wins, keyed by ref)
  const resolvedSpells=useMemo(()=>{
    const result={wizard:[],priest:[]};
    const slots=calcSpellSlots;
    const hasWizard=!!slots.wizard;
    const hasPriest=!!slots.priest;
    if(!hasWizard&&!hasPriest)return result;
    // Build deduped spell state keyed by ref (same pattern as SpellsPanel)
    const state={};
    // 1. Initialize vanilla spells (skip metadata-only entries like _slotBaseline)
    if(vanillaSpells){
      Object.entries(vanillaSpells).forEach(([ref,sp])=>{
        if(!sp||typeof sp!=='object'||!sp.type||typeof sp.lv!=='number')return;
        state[ref]={...sp,ref,vanilla:true,activeMods:[],winner:null,disabled:false};
      });
    }
    // 2. Walk mods in install order — process modifications and additions
    let order=0;
    try{if(catMap&&CO&&CO.length)CO.filter(c=>catMap[c]).forEach(cat=>{if(!catMap[cat])return;
      (catMap[cat]||[]).forEach(mod=>{
        if(!mod||!mod.co||!Array.isArray(mod.co))return;
        const detail=data._detailCache[mod.i];
        const spl=detail&&detail.spl;
        if(!spl)return;
        mod.co.forEach((comp,ci)=>{
          if(!sel[mod.i+'-'+ci])return;
          const entry=spl[''+ci];
          if(!entry)return;
          // Modifications to existing spells
          if(entry.spells&&Array.isArray(entry.spells)){
            entry.spells.forEach(spEntry=>{
              if(!spEntry||!Array.isArray(spEntry))return;
              const ref=spEntry[0],action=spEntry[1],summary=spEntry[2],overrides=spEntry[3]||null;
              if(!state[ref])state[ref]={n:ref,type:'wizard',lv:0,school:'Unknown',desc:'',ref,icon:'spells/icons/'+encodeURIComponent(ref)+'.png',vanilla:false,activeMods:[],winner:null,disabled:false};
              const me={modId:mod.i,modName:mod.n,action,order};
              if(!state[ref].activeMods.some(x=>x.modId===me.modId&&x.action===me.action))state[ref].activeMods.push(me);
              if(action==='disable'||action==='remove'){state[ref].winner=me;state[ref].disabled=true}
              else{state[ref].winner=me;state[ref].disabled=false;if(overrides){if(overrides.lv!=null)state[ref].lv=overrides.lv;if(overrides.n)state[ref].n=overrides.n;if(overrides.type)state[ref].type=overrides.type;if(overrides.school)state[ref].school=overrides.school;if(overrides.desc)state[ref].desc=overrides.desc}}
            });
          }
          // New spells added by mods. Schema: [ref, type, lv, school, name, desc, sph?]
          // 7th element (optional) is a sphere-name array for priest spells so deity sphere-access
          // dimming works on mod spells too.
          if(entry.new&&Array.isArray(entry.new)){
            entry.new.forEach(item=>{
              if(!item||!Array.isArray(item))return;
              const[ref,type,lv,school,name,desc,sph]=item;
              const me={modId:mod.i,modName:mod.n,action:'add',order};
              if(!state[ref]){
                state[ref]={n:name,type,lv,school,desc,ref,vanilla:false,icon:'spells/icons/'+encodeURIComponent(ref)+'.png',activeMods:[me],winner:me,disabled:false,addedBy:mod.n};
                if(Array.isArray(sph)&&sph.length)state[ref].sph=sph.slice();
              }else{
                if(!state[ref].activeMods.some(x=>x.modId===me.modId&&x.action===me.action))state[ref].activeMods.push(me);
                if(Array.isArray(sph)&&sph.length&&!state[ref].sph)state[ref].sph=sph.slice();
              }
            });
          }
          order++;
        });
      });
    });}catch(e){console.warn('Spell mod walk error:',e)}

    // 3. Filter to spells this character can actually cast, dedup by name+level+type (last mod wins)
    const byName={};
    const charClassesLc=activeClasses.map(c=>c.toLowerCase());
    // Kit spell restrictions (e.g. Inquisitor: noPriestSpells)
    const activeKitAbil=(kit&&classMode==='single'&&chargen.kitAbilities&&chargen.kitAbilities[kit])||null;
    const kitRestr=(activeKitAbil&&activeKitAbil.spellRestrictions)||null;
    const blockPriest=!!(kitRestr&&kitRestr.noPriestSpells);
    const blockArcane=!!(kitRestr&&kitRestr.noArcaneSpells);
    Object.values(state).forEach(sp=>{
      if(sp.disabled)return;
      const sType=sp.type==='wizard'?'wizard':'priest';
      if(sType==='wizard'&&!hasWizard)return;
      if(sType==='priest'&&!hasPriest)return;
      if(sType==='priest'&&blockPriest)return;
      if(sType==='wizard'&&blockArcane)return;
      // Class-eligibility filter: if the spell has cls[], it must overlap the character's active classes.
      // Missing cls[] fails open (legacy behavior).
      if(Array.isArray(sp.cls)&&sp.cls.length>0&&!sp.cls.some(c=>charClassesLc.includes((c||'').toLowerCase())))return;
      const slotArr=sType==='wizard'?slots.wizard:slots.priest;
      if(!slotArr||sp.lv>slotArr.length||sp.lv<1||slotArr[sp.lv-1]<=0)return;
      const modName=sp.winner?sp.winner.modName:(sp.addedBy||null);
      const dedupKey=sType+'|'+(sp.n||'').toLowerCase()+'|'+sp.lv;
      const restricted=sType==='wizard'&&oppositionSchools.length>0&&oppositionSchools.includes(sp.school);
      const entry={ref:sp.ref,name:sp.n,level:sp.lv,school:sp.school,icon:sp.icon,desc:sp.desc,vanilla:sp.vanilla,modName,restricted,sph:sp.sph,cls:sp.cls,sv:sp.sv,ct:sp.ct,rng:sp.rng,aoe:sp.aoe,dur:sp.dur,scr:sp.scr,si:sp.si,order:sp.winner?sp.winner.order:(sp.activeMods&&sp.activeMods.length?sp.activeMods[sp.activeMods.length-1].order:0)};
      if(!byName[dedupKey]||entry.order>=byName[dedupKey].order){byName[dedupKey]=entry;byName[dedupKey]._sType=sType}
    });
    Object.values(byName).forEach(sp=>{result[sp._sType].push(sp)});
    result.wizard.sort((a,b)=>(a.level||0)-(b.level||0)||(a.name||'').localeCompare(b.name||''));
    result.priest.sort((a,b)=>(a.level||0)-(b.level||0)||(a.name||'').localeCompare(b.name||''));
    return result;
  },[vanillaSpells,sel,data._detailCache,D,calcSpellSlots,catMap,detailVer,oppositionSchools,activeClasses,kit,classMode,chargen]);

  // Resolve available PC portraits from selected mods
  const pcPortraits=useMemo(()=>{
    const result=[];const seen=new Set();
    const cache=data._detailCache||{};
    if(catMap&&CO&&CO.length)CO.filter(c=>catMap[c]).forEach(cat=>{
      (catMap[cat]||[]).forEach(mod=>{
        if(!mod||!mod.co)return;
        const detail=cache[mod.i];
        if(!detail||!detail.pt||!detail.pt.pc)return;
        Object.entries(detail.pt.pc).forEach(([ciKey,pc])=>{
          if(!sel[mod.i+'-'+ciKey])return;
          (pc.images||[]).forEach(img=>{
            if(!seen.has(img)){seen.add(img);result.push({src:img,mod:mod.n,label:pc.label||mod.n})}
          });
        });
      });
    });
    return result;
  },[sel,data._detailCache,D,catMap,detailVer]);

  // Kit description
  const activeKit=useMemo(()=>{
    if(!kit)return null;
    return resolvedKits.find(k=>k.id===kit)||null;
  },[kit,resolvedKits]);

  // Format number with commas
  const fmt=n=>n!=null?n.toLocaleString():'0';

  // Ability setter
  const setAbility=(key,val)=>{
    const v=Math.max(1,Math.min(25,parseInt(val)||1));
    setAb(p=>({...p,[key]:v}));
  };

  // Section header helper
  const SecHdr=({id,label,extra})=>(
    <div className="planner-sec-hdr" onClick={()=>toggleSec(id)}>
      <span><span className={"ar"+(expanded.has(id)?" op":"")} style={{fontSize:'.5rem',marginRight:6}}>{"\u25b6"}</span>{label}</span>
      {extra&&<span style={{fontSize:'.68rem',color:'var(--txd)',fontWeight:400,fontFamily:"'Source Sans 3',sans-serif"}}>{extra}</span>}
    </div>
  );

  // Dual class status
  const dualStatus=classMode==='dual'?(level<=dualLvl?'leveling old class':level-dualLvl<dualLvl?'old class abilities dormant':'old class abilities active'):null;

  return <div className="planner-panel">
    {/* Top config bar */}
    <div className="planner-top">
      <label>Name<input type="text" value={charName} onChange={e=>setCharName(e.target.value)} placeholder="Character Name" style={{width:120}}/></label>
      <label>Race<select value={race} onChange={e=>{setRace(e.target.value);setKit(null)}}>
        {Object.entries(chargen.races).map(([k,v])=><option key={k} value={k}>{v.n}</option>)}
      </select></label>
      <label>Class Mode<div className="planner-mode-btns">
        <button className={"planner-mode-btn"+(classMode==='single'?' ac':'')} onClick={()=>{setClassMode('single');setKit(null)}}>Single</button>
        {allowedMulti.length>0&&<button className={"planner-mode-btn"+(classMode==='multi'?' ac':'')} onClick={()=>{setClassMode('multi');setKit(null)}}>Multi</button>}
        {raceData.canDual&&<button className={"planner-mode-btn"+(classMode==='dual'?' ac':'')} onClick={()=>{setClassMode('dual');setKit(null)}}>Dual</button>}
      </div></label>
      {classMode==='single'&&<label>Class<select value={singleClass} onChange={e=>{setSingleClass(e.target.value);setKit(null)}}>
        {allowedClasses.map(c=><option key={c} value={c}>{(vanillaClasses[c]||{}).n||c}</option>)}
      </select></label>}
      {classMode==='multi'&&<label>Multiclass<select value={multiCombo} onChange={e=>setMultiCombo(e.target.value)}>
        {allowedMulti.map(k=><option key={k} value={k}>{k.split('/').map(c=>(vanillaClasses[c]||{}).n||c).join(' / ')}</option>)}
      </select></label>}
      {classMode==='dual'&&<>
        <label>Old Class<select value={dualOld} onChange={e=>{setDualOld(e.target.value);setKit(null)}}>
          {allowedClasses.filter(c=>chargen.dualclass.allowed[c]&&chargen.dualclass.allowed[c].length>0).map(c=><option key={c} value={c}>{(vanillaClasses[c]||{}).n||c}</option>)}
        </select></label>
        <label>New Class<select value={dualNew} onChange={e=>{setDualNew(e.target.value);setKit(null)}}>
          {dualAllowed.map(c=><option key={c} value={c}>{(vanillaClasses[c]||{}).n||c}</option>)}
        </select></label>
        <label>Dual at Lv<input type="number" min={1} max={Math.max(1,level-1)} value={dualLvl} onChange={e=>setDualLvl(Math.max(1,Math.min(level-1,parseInt(e.target.value)||1)))} style={{width:52}}/></label>
      </>}
      {classMode==='single'&&resolvedKits.length>0&&<label>Kit<select value={kit||''} onChange={e=>setKit(e.target.value||null)}>
        <option value="">None (base class)</option>
        {resolvedKits.map(k=><option key={k.id} value={k.id}>{k.name}{k.vanilla?'':' ('+k.modName+')'}</option>)}
      </select></label>}
      <label>Alignment<select value={alignment} onChange={e=>setAlignment(e.target.value)}>
        {allowedAlignments.map(a=><option key={a} value={a}>{a}</option>)}
      </select></label>
      {chargen.deities&&activeClasses.includes('CLERIC')&&(()=>{
        const kitDeity=kit&&Object.entries(chargen.deities).find(([id,d])=>d.kit===kit);
        const lockedTo=kitDeity?kitDeity[0]:null;
        const effDeity=lockedTo||deity;
        return <label>Deity<select value={effDeity} disabled={!!lockedTo} onChange={e=>setDeity(e.target.value)} title={lockedTo?'Locked by kit selection':'Choose deity for sphere access'}>
          {Object.entries(chargen.deities).map(([id,d])=><option key={id} value={id}>{d.n}</option>)}
        </select></label>;
      })()}
      {chargen.favoredEnemies&&activeClasses.includes('RANGER')&&<label>Racial Enemy<select value={favoredEnemy} onChange={e=>setFavoredEnemy(e.target.value)}>
        <option value="">— select —</option>
        {chargen.favoredEnemies.map(e=><option key={e} value={e}>{e}</option>)}
      </select></label>}
      <label>Gender<div className="planner-mode-btns">
        <button className={"planner-mode-btn"+(gender==='male'?' ac':'')} onClick={()=>setGender('male')}>Male</button>
        <button className={"planner-mode-btn"+(gender==='female'?' ac':'')} onClick={()=>setGender('female')}>Female</button>
      </div></label>
    </div>

    {/* Level slider */}
    <div className="planner-top" style={{gap:14}}>
      <div className="planner-level">
        <span style={{fontSize:'.72rem',color:'var(--txd)',textTransform:'uppercase',letterSpacing:'.06em',fontWeight:600}}>Level</span>
        <input type="range" min={1} max={40} value={level} onChange={e=>setLevel(parseInt(e.target.value))}/>
        <span className="lv-num">{level}</span>
        <span className="lv-xp">XP: {fmt(xpForLevel)}</span>
        {level<40&&(()=>{
          const cls=classMode==='multi'?activeClasses[0]:classMode==='dual'?dualNew:singleClass;
          const tbl=chargen.xpTable&&chargen.xpTable[cls];
          if(!tbl||level>=tbl.length)return null;
          const nextXp=tbl[level]||0;
          if(nextXp<=0)return null;
          const totalNext=classMode==='multi'?nextXp*activeClasses.length:nextXp;
          const gap=totalNext-xpForLevel;
          return gap>0?<span style={{fontSize:'.62rem',color:'var(--txd)',marginLeft:4}}>Next: {fmt(totalNext)} (+{fmt(gap)})</span>:null;
        })()}
      </div>
      {classMode==='multi'&&<div style={{fontSize:'.62rem',color:'var(--txd)',display:'flex',gap:8,flexWrap:'wrap'}}>
        {activeClasses.map(c=>{const tbl=chargen.xpTable&&chargen.xpTable[c];const effLv=Math.max(1,Math.floor(level/activeClasses.length));const xp=tbl?tbl[Math.min(effLv-1,tbl.length-1)]||0:0;return<span key={c} style={{color:'var(--tx)'}}>{(vanillaClasses[c]||{}).n||c} L{effLv} <span style={{color:'var(--txd)'}}>({fmt(xp)} XP)</span></span>})}
      </div>}
      <div style={{display:'flex',gap:4,alignItems:'center',marginLeft:'auto'}}>
        <button className="bt" style={{fontSize:'.65rem',padding:'2px 8px'}} onClick={()=>setExpanded(new Set())} title="Collapse all sections" aria-label="Collapse all sections">{"\u25b2"}</button>
        <button className="bt" style={{fontSize:'.65rem',padding:'2px 8px'}} onClick={()=>setExpanded(new Set(['combat','survival','spells','thiefskills','prof','hla','abilities','equipment','kitabilities','timeline']))} title="Expand all sections" aria-label="Expand all sections">{"\u25bc"}</button>
        <button className="bt" style={{fontSize:'.65rem',padding:'2px 8px',color:'var(--blu)',borderColor:'var(--blu)'}} aria-label="Copy shareable link" onClick={()=>{
          const build={n:charName,r:race,m:classMode,c:singleClass,k:kit,mc:multiCombo,do:dualOld,dn:dualNew,dl:dualLvl,l:level,
            a:[ab.str,ab.dex,ab.con,ab.int,ab.wis,ab.cha],es:excStr,al:alignment,g:gender,
            p:Object.fromEntries(Object.entries(profPips).filter(([_,v])=>v>0)),
            e:Object.fromEntries(Object.entries(equipment).filter(([_,v])=>v))};
          try{const hash='char='+btoa(JSON.stringify(build));window.location.hash=hash;navigator.clipboard.writeText(window.location.href).then(()=>{
            const btn=document.activeElement;if(btn){const orig=btn.textContent;btn.textContent='Copied!';setTimeout(()=>{btn.textContent=orig},1500)}
          })}catch(e){console.warn('Share error:',e)}
        }} title="Copy shareable link to clipboard">{"\ud83d\udd17 Share"}</button>
        <button className="bt" style={{fontSize:'.65rem',padding:'2px 8px',color:'var(--red)',borderColor:'var(--red)'}} onClick={()=>setShowResetConfirm(true)} title="Reset all planner data" aria-label="Reset all planner data">{"\u21ba Reset"}</button>
      </div>
      {classMode==='dual'&&<div className="planner-dual-info">
        {dualStatus==='leveling old class'&&<span>{"\u2694\ufe0f"} Leveling {(vanillaClasses[dualOld]||{}).n} (will dual at level {dualLvl})</span>}
        {dualStatus==='old class abilities dormant'&&<span>{"\u23f8\ufe0f"} {(vanillaClasses[dualOld]||{}).n} abilities dormant — {(vanillaClasses[dualNew]||{}).n} level {level-dualLvl} (need level {dualLvl+1} to reactivate)</span>}
        {dualStatus==='old class abilities active'&&<span>{"\u2705"} Both classes active — {(vanillaClasses[dualOld]||{}).n} {dualLvl} / {(vanillaClasses[dualNew]||{}).n} {level-dualLvl}</span>}
      </div>}
    </div>

    <div className="planner-body">
      {/* Left column: Portrait + Abilities */}
      <div className="planner-left">
        <div className="planner-portrait-card">
          <div className="planner-portrait" onClick={()=>setShowPortraitPicker(!showPortraitPicker)} style={{cursor:'pointer'}} title="Click to choose portrait">

                    {(()=>{const setVal=(effAb._eqSet||{})[key]||0;const addVal=(effAb._eqAdd||{})[key]||0;if(!setVal&&!addVal)return null;const parts=[];if(setVal)parts.push('set '+setVal);if(addVal)parts.push((addVal>0?'+':'')+addVal);return<Tip content={<><span className="tip-title">{label} from equipment</span>{setVal?<span className="tip-meta">Item SETs score to {setVal} (max rule)</span>:null}{addVal?<span className="tip-meta">Item modifiers: {addVal>0?'+':''}{addVal}</span>:null}<span className="tip-desc" style={{marginTop:3}}>Base {baseAb[key]} + equipment = {eff}</span></>}><span className="ab-adj" style={{color:'var(--cyn)',cursor:'help'}}>eq</span></Tip>})()}

          {(()=>{

                });

            if(warnings.length===0)return null;
            // Dedupe (racial + class may flag same stat)

        })()&&<div className="planner-section">

          <SecHdr id="hla" label="High Level Abilities" extra={calcHLA.unlocked?'Picks: '+calcHLA.picks:'Preview (L'+calcHLA.thresholdLv+' unlock)'}/>
          {expanded.has('hla')&&<div className="planner-sec-body">
            {!calcHLA.unlocked&&<div style={{fontSize:'.66rem',color:'var(--txd)',padding:'4px 6px',marginBottom:6,background:'var(--bg2)',border:'1px dashed var(--brd2)',borderRadius:3}}>

            <div className="planner-hla-list">
              {calcHLA.hlas.map((h,i)=>{

                  <span className="tip-title">{h.n}</span>

                  <span style={{color:calcHLA.unlocked?(h.kitSpecific?'var(--cyn)':'var(--gold)'):'var(--txd)',fontWeight:600}}>{h.n}</span>

      {/* Right column: Equipment */}
      <div className="planner-right">

              <span style={{color:'var(--txd)',textTransform:'uppercase',letterSpacing:'.04em',fontSize:'.64rem',fontWeight:600}} title={t('planner.dual_wield_tip','When enabled, weapon style is treated as Two-Weapon (off-hand weapon assumed)')}>{t('planner.dual_wield','Dual Wield')}</span>

                <button className={"planner-mode-btn"+(dualWielding?' ac':'')} onClick={()=>setDualWielding(true)} style={{fontSize:'.64rem',padding:'2px 8px'}}>On</button>

              const isWeaponSlot=slotId.startsWith('weapon');

              const activeWpn=equippedItems[activeWeapon];
              const is2H=activeWpn&&isWeaponTwoHanded(activeWpn);

              return <div key={slotId} className={"planner-equip-wrap"+(isWeaponSlot&&isActive?' wpn-active':'')+(isInactive?' slot-inactive':'')}>
                <EquipSlot slotId={slotId} label={label} types={filtTypes} item={item} otherRing={otherRing}
                  vanillaItems={resolvedItems} onSelect={ref=>setSlot(slotId,ref)} formatStats={formatEquipStats}
                  activeBadge={isWeaponSlot?{active:isActive,onToggle:()=>setActiveWeapon(slotId)}:null}
                  inactiveBadge={isInactive?{label:inactiveReason,title:'Bonuses not applied — '+inactiveReason.toLowerCase()+' loadout'}:null}
                  checkUsability={checkItemUsability}/>
              </div>;
            })}
          </div>}
        </div>
      </div>
    </div>
    {showResetConfirm&&<div className="mo" onClick={e=>{if(e.target===e.currentTarget)setShowResetConfirm(false)}}>

          <h3 className="ci" style={{color:'var(--red)',fontSize:'1rem',fontWeight:700}}>{"\u21ba"} Reset Character Planner</h3>
          <span style={{cursor:'pointer',color:'var(--txd)',fontSize:'1.2rem'}} onClick={()=>setShowResetConfirm(false)}>{"\u2715"}</span>
        </div>
        <div style={{fontSize:'.82rem',color:'var(--tx)',marginBottom:6}}>Reset all character planner data to defaults?</div>
        <div style={{fontSize:'.7rem',color:'var(--txd)',marginBottom:16}}>This will clear name, race, class, kit, stats, equipment, proficiencies, thief skills, and all other planner settings. This cannot be undone.</div>
        <div style={{display:'flex',gap:8,justifyContent:'flex-end'}}>
          <button className="bt" style={{fontSize:'.75rem',padding:'5px 14px'}} onClick={()=>setShowResetConfirm(false)}>Cancel</button>
          <button className="bt" style={{fontSize:'.75rem',padding:'5px 14px',color:'#000',background:'var(--red)',borderColor:'var(--red)',fontWeight:600}} onClick={()=>{
            Object.keys(localStorage).filter(k=>k.startsWith('emf_plan')).forEach(k=>localStorage.removeItem(k));
            window.location.reload();
          }}>{"\u21ba Reset"}</button>
        </div>
      </div>
    </div>}
  </div>;
}

// ═══ Community Builds Panel ═══
function CommunityPanel({D,sel,onLoad,installTarget}){
  const data=useContext(DC);const{t}=useLang();
  const builds=data.communityBuilds||[];
  const[sort,setSort]=useState('newest');
  const[focusFilter,setFocusFilter]=useState(null);
  const[detailBuild,setDetailBuild]=useState(null);
  useEffect(()=>{if(!detailBuild)return;const h=e=>{if(e.key==='Escape')setDetailBuild(null)};window.addEventListener('keydown',h);return()=>window.removeEventListener('keydown',h)},[detailBuild]);
  const[loadingBuild,setLoadingBuild]=useState(false);
  const TELE_BASE=URLS.telemetryBase;
  const loadBuildDetail=async(bld)=>{if(bld.keys){setDetailBuild(bld);return}setLoadingBuild(true);try{const resp=await fetch(TELE_BASE+'builds/'+bld.id+'.json',{cache:'no-cache'});if(resp.ok){const full=await resp.json();if(Array.isArray(full.keys)&&full.schemaVersion>=2){const mbi={};D.forEach(m=>{mbi[m.i]=m});full.keys=normalizePresetKeysV2toV1(full.keys,mbi)}setDetailBuild(full)}else{setDetailBuild({...bld,keys:[]})}}catch(e){setDetailBuild({...bld,keys:[]})}finally{setLoadingBuild(false)}};
  const sorted=useMemo(()=>{let b=[...builds];if(focusFilter)b=b.filter(bd=>bd.focus&&bd.focus.includes(focusFilter));if(sort==='newest')b.sort((a,c)=>(c.createdAt||'').localeCompare(a.createdAt||''));else if(sort==='components')b.sort((a,c)=>(c.componentCount||0)-(a.componentCount||0));else if(sort==='tier')b.sort((a,c)=>(a.tier||9)-(c.tier||9));return b},[builds,sort,focusFilter]);
  const allFocusTags=useMemo(()=>{const s=new Set();builds.forEach(b=>(b.focus||[]).forEach(f=>s.add(f)));return[...s].sort()},[builds]);
  const FT={story:'Story',tactical:'Tactical',minimal:'Minimal',qol:'QoL',romance:'Romance',visual:'Visual',class:'Classes',tweak:'Tweaks',npc:'NPCs'};
  // Diff current selection vs a build
  const diffBuild=(bld)=>{if(!bld.keys)return null;const bKeys=new Set(bld.keys);const sKeys=new Set(Object.keys(sel).filter(k=>sel[k]));const common=[...bKeys].filter(k=>sKeys.has(k)).length;const added=[...bKeys].filter(k=>!sKeys.has(k)).length;const removed=[...sKeys].filter(k=>!bKeys.has(k)).length;return{common,added,removed}};

function PublishModal({sel,onClose}){
  const{t}=useLang();

  const[pubName,setPubName]=useState('');const[pubDesc,setPubDesc]=useState('');const[pubAuthor,setPubAuthor]=useState('');const[pubIcon,setPubIcon]=useState('');const[pubTier,setPubTier]=useState(2);const[pubFocus,setPubFocus]=useState(new Set());
  // Versioning: id defaults to a fresh UUID for new builds; user can override to update an existing build.
  // version defaults to 1.0.0; on update, user bumps it. authorGitHub ties a build to its author so only
  // they can submit updates via aggregate.py's ownership check.
  const[pubId,setPubId]=useState(()=>crypto.randomUUID());
  const[pubVersion,setPubVersion]=useState('1.0.0');
  const[pubAuthorGH,setPubAuthorGH]=useState('');
  // If the user checks this, their build is flagged as requiring the Runner's patch system.
  // Downstream consumers (Forge card, detail modal, conflict panel, Runner card) show a notice.
  const[pubRunnerReq,setPubRunnerReq]=useState(false);
  const[pubInstallNotes,setPubInstallNotes]=useState('');
  const keys=Object.keys(sel).filter(k=>sel[k]).sort();const modCount=new Set(keys.map(k=>parseInt(k))).size;
  // Convert internal v1 idx-keys to v2 wc-keys for export. v2 keys are stable
  // across mod updates (add/remove component) since WeiDU component numbers
  // don't shift the way array indexes do.
  const convertToV2Keys=()=>{
    const mbi={};(data.mods||[]).forEach(m=>{mbi[m.i]=m});
    const out=[];
    for(const k of keys){
      const dash=k.indexOf('-');if(dash<0){out.push(k);continue}
      const mid=parseInt(k.substring(0,dash));const ci=parseInt(k.substring(dash+1));
      if(isNaN(mid)||isNaN(ci)){out.push(k);continue}
      const mod=mbi[mid];if(!mod||!Array.isArray(mod.coWC)||ci>=mod.coWC.length){out.push(k);continue}
      const wc=mod.coWC[ci];if(wc==null){out.push(k);continue}
      out.push(mid+'-'+wc);
    }
    return out;
  };
  const submit=()=>{
    const v2Keys=convertToV2Keys();
    const now=new Date().toISOString();
    const build={schema:1,schemaVersion:2,id:pubId.trim()||crypto.randomUUID(),version:(pubVersion||'1.0.0').trim(),name:pubName.trim(),desc:pubDesc.trim(),author:pubAuthor.trim()||'Anonymous',authorGitHub:pubAuthorGH.trim(),icon:pubIcon||'',color:'#a78bfa',keys:v2Keys,tier:pubTier,difficulty:pubTier===1?'beginner':pubTier===2?'intermediate':'advanced',focus:[...pubFocus],modCount,componentCount:v2Keys.length,forgeVersion:CONFIG.VER,createdAt:now,updatedAt:now,recommendedInstaller:pubRunnerReq?'runner':null,installNotes:pubInstallNotes.trim()};
    const title=encodeURIComponent('Community Build: '+build.name+' ('+modCount+'m/'+v2Keys.length+'c)');
    const body=encodeURIComponent('```json\n'+JSON.stringify(build,null,2)+'\n```');
    window.open(URLS.telemetryRepo+'/issues/new?title='+title+'&body='+body+'&labels=community-build','_blank');
    onClose();
  };
  return(<div className="mo" onClick={onClose}><div className="md" onClick={e=>e.stopPropagation()} style={{maxWidth:500}}>
    <h2 className="ci" style={{color:'var(--pur)',marginBottom:10,fontSize:'1rem'}}>{t('modal.publish_title','Publish Community Build')}</h2>
    <div style={{fontSize:'.78rem',color:'var(--txd)',marginBottom:10}}>{t('modal.publish_desc_pre','Share your')} {keys.length} {t('modal.publish_desc_mid','component selection')} ({modCount} {t('modal.publish_desc_post','mods) with the community. Builds are reviewed before publishing.')}</div>
    <div style={{display:'flex',flexDirection:'column',gap:8}}>
      <input className="sx" placeholder={t('modal.publish_name','Build name (required)')} value={pubName} onChange={e=>setPubName(e.target.value)} autoFocus/>
      <textarea className="sx" placeholder={t('modal.publish_desc_hint','Description \u2014 what makes this build interesting?')} value={pubDesc} onChange={e=>setPubDesc(e.target.value)} rows={3} style={{resize:'vertical'}}/>
      <div style={{display:'flex',gap:8}}>
        <input className="sx" placeholder={t('modal.publish_author','Your name (optional)')} value={pubAuthor} onChange={e=>setPubAuthor(e.target.value)} style={{flex:1}}/>
        <input className="sx" placeholder={t('modal.publish_author_gh','GitHub username (for updates)')} value={pubAuthorGH} onChange={e=>setPubAuthorGH(e.target.value)} style={{flex:1}}/>
        <input className="sx" placeholder={t('modal.publish_icon','Icon emoji')} value={pubIcon} onChange={e=>setPubIcon(e.target.value)} style={{width:60,textAlign:'center'}}/>
      </div>
      <div style={{display:'flex',gap:8}}>
        <input className="sx" placeholder={t('modal.publish_id','Build ID (leave unchanged for new builds; enter existing id to publish an update)')} value={pubId} onChange={e=>setPubId(e.target.value)} style={{flex:2,fontFamily:'monospace',fontSize:'.75rem'}}/>
        <input className="sx" placeholder={t('modal.publish_version','Version (e.g. 1.0.0; bump on update)')} value={pubVersion} onChange={e=>setPubVersion(e.target.value)} style={{flex:1}}/>
      </div>
      <div>
        <div style={{fontSize:'.78rem',color:'var(--txd)',marginBottom:4}}>{t('modal.publish_tier','Difficulty tier:')}</div>
        <div style={{display:'flex',gap:6}}>{[[1,'Beginner','var(--grn)'],[2,'Intermediate','var(--blu)'],[3,'Advanced','var(--red)']].map(([v,l,c])=><button key={v} className={"pl"+(pubTier===v?' ac':'')} style={pubTier===v?{background:c,color:'var(--bg)',borderColor:c}:{}} onClick={()=>setPubTier(v)}>{l}</button>)}</div>
      </div>
      <div>
        <div style={{fontSize:'.78rem',color:'var(--txd)',marginBottom:4}}>{t('modal.publish_focus','Focus tags (select all that apply):')}</div>
        <div style={{display:'flex',gap:4,flexWrap:'wrap'}}>{FOCUS_OPTS.map(([k,l])=><button key={k} className={"pl"+(pubFocus.has(k)?' ac':'')} onClick={()=>{const n=new Set(pubFocus);if(n.has(k))n.delete(k);else n.add(k);setPubFocus(n)}}>{l}</button>)}</div>
      </div>
      {/* Installer requirement: flag builds that rely on the Runner's patch system so the Forge can warn users. */}
      {(()=>{const runner=INSTALLERS&&INSTALLERS.runner;if(!runner)return null;return(<div style={{background:'var(--bg)',padding:'8px 10px',borderRadius:4,border:'1px solid var(--brd)'}}>
        <label style={{display:'flex',alignItems:'flex-start',gap:8,cursor:'pointer',fontSize:'.78rem'}}>
          <input type="checkbox" checked={pubRunnerReq} onChange={e=>setPubRunnerReq(e.target.checked)} style={{marginTop:2}}/>
          <span>
            <span style={{color:'var(--tx)',fontWeight:500}}>{t('modal.publish_requires_runner','This build requires')+' '+runner.name}</span>
            <span style={{display:'block',color:'var(--txd)',fontSize:'.72rem',marginTop:2}}>{t('modal.publish_requires_runner_hint','Check if your build relies on the Runner\u2019s patch system to resolve cross-mod conflicts. The Forge will warn users who try to install manually.')}</span>
          </span>
        </label>
        {pubRunnerReq&&<textarea className="sx" placeholder={t('modal.publish_install_notes','Optional install notes (install order tips, known gotchas\u2026)')} value={pubInstallNotes} onChange={e=>setPubInstallNotes(e.target.value)} rows={2} style={{marginTop:8,resize:'vertical',fontSize:'.75rem'}}/>}
      </div>)})()}
    </div>
    <div style={{marginTop:12,display:'flex',justifyContent:'flex-end',gap:6}}>
      <button className="bt" onClick={onClose}>{t('btn.cancel','Cancel')}</button>
      <button className="bt" style={{background:'var(--pur)',color:'var(--bg)',border:'none',fontWeight:700}} disabled={!pubName.trim()||keys.length===0} onClick={submit}>{t('btn.submit_github','Submit to GitHub')}</button>
    </div>
  </div></div>);
}

function VersionTracker({vcMap,sel,D,ghLookup}){
  const[scanResults,setScanResults_]=useState(()=>{try{const s=sessionStorage.getItem('scanResults');return s?JSON.parse(s):null}catch(e){return null}});const setScanResults=v=>{setScanResults_(v);try{if(v)sessionStorage.setItem('scanResults',JSON.stringify(v));else sessionStorage.removeItem('scanResults')}catch(e){}};const[scanning,setScanning]=useState(false);const[scanProg,setScanProg]=useState('');const[scanFilter,setScanFilter]=useState(null);const[scanSort,setScanSort]=useState('status');const[vtSort,setVtSort]=useState('date');
  const wfMap=useMemo(()=>{const m={};if(D)D.forEach(mod=>{mod.co.forEach(c=>{if(c.wf){const k=c.wf.toLowerCase();if(!m[k])m[k]=[];if(!m[k].some(x=>x.i===mod.i))m[k].push(mod)}})});return m},[D]);
  const scanMods=useCallback(async()=>{
    if(!window.showDirectoryPicker)return;
    try{const dirH=await window.showDirectoryPicker();setScanning(true);setScanProg('Reading folders...');
    const results=[];const folders=[];
    for await(const entry of dirH.values()){if(entry.kind==='directory')folders.push(entry)}
    setScanProg('Scanning 0/'+folders.length+' folders...');
    for(let fi=0;fi<folders.length;fi++){
      if(fi%5===0)setScanProg('Scanning '+fi+'/'+folders.length+'...');
      const fold=folders[fi];const folderName=fold.name;
      let version=null;let tp2Found=false;let newestFile=0;
      const findTp2=async(dir,depth)=>{if(depth>2||version)return;
        try{for await(const e of dir.values()){
          if(e.kind==='file'){
            if(/\.tp2$/i.test(e.name)){
              tp2Found=true;if(!version){try{const f=await e.getFile();newestFile=Math.max(newestFile,f.lastModified);const txt=await f.text();
                const lines=txt.split('\n');for(const line of lines){
                  const m=line.match(/^VERSION\s+(?:~([^~]*)~|(@\d+))/i);
                  if(m){version=m[1]||m[2];break}
                }}catch(re){}}
            }else{try{const f=await e.getFile();newestFile=Math.max(newestFile,f.lastModified)}catch(fe){}}
          }else if(e.kind==='directory'&&depth<2){await findTp2(e,depth+1)}
        }}catch(pe){}};
      await findTp2(fold,0);
      let matches=wfMap[folderName.toLowerCase()]||[];
      if(matches.length===0){try{for await(const sub of fold.values()){if(sub.kind==='directory'){const sm=wfMap[sub.name.toLowerCase()];if(sm){matches=sm;break}}}}catch(se){}}
      if(matches.length>0){matches.forEach(mod=>{
        const vc=vcMap&&vcMap[mod.i];const latestTag=vc&&vc.tag?vc.tag:(mod.v||null);const latestDate=vc?vc.release_date:null;
        const norm=s=>s?s.replace(/^[vV](?:ersion)?[- ]?/i,'').replace(/\.0+$/,'').replace(/(\.\d+?)0+$/,'$1').trim().toLowerCase():'';
        const vCmp=(a,b)=>{const rcW=s=>/^(alpha|beta|rc|dev|pre)/i.test(s)?-1:0;const pa=a.split(/[.\-_]/).map(p=>{const n=parseInt(p);return isNaN(n)?p:n});const pb=b.split(/[.\-_]/).map(p=>{const n=parseInt(p);return isNaN(n)?p:n});const ml=Math.max(pa.length,pb.length);for(let j=0;j<ml;j++){const x=pa[j],y=pb[j];if(x===undefined&&y!==undefined){if(typeof y==='string'&&rcW(y)<0)return 1;return -1}if(y===undefined&&x!==undefined){if(typeof x==='string'&&rcW(x)<0)return -1;return 1}if(typeof x==='number'&&typeof y==='number'){if(x!==y)return x-y}else{const sx=String(x),sy=String(y);if(sx!==sy){const rw=rcW(sx)-rcW(sy);if(rw!==0)return rw;return sx<sy?-1:1}}}return 0};
        let status='unmatched';
        if(!version&&!tp2Found)status='unmatched';
        else if(!version)status='no-version';
        else if(!latestTag)status='unknown';
        else if(norm(version)===norm(latestTag))status='current';
        else if(vCmp(norm(version),norm(latestTag))>=0)status='current';
        else status='outdated';
        let staleVer=false;
        if(status==='outdated'&&newestFile&&latestDate){const relMs=new Date(latestDate).getTime();if(relMs&&newestFile>relMs){status='current';staleVer=true}}
        results.push({folder:folderName,installedVersion:version,latestVersion:latestTag,latestDate,modId:mod.i,modName:mod.n,status,url:mod.u,archived:mod.ab||(vc&&vc.archived)||false,staleVer})
      })}else if(tp2Found){results.push({folder:folderName,installedVersion:version,latestVersion:null,latestDate:null,modId:null,modName:folderName,status:version?'unmatched':'no-version',url:null})}
    }
    results.sort((a,b)=>{const o={outdated:0,current:1,'no-version':2,unknown:3,unmatched:4};return(o[a.status]||5)-(o[b.status]||5)});
    setScanResults(results);setScanning(false);setScanProg('')}catch(e){setScanning(false);setScanProg('')}
  },[wfMap,vcMap]);

function DiagPanel(){

        <div className="drop-zone" onClick={()=>fRef.current?.click()} onDragOver={e=>{e.preventDefault();e.stopPropagation()}} onDrop={e=>{e.preventDefault();e.stopPropagation();const f=e.dataTransfer.files[0];if(f)handleDbg(f)}} style={{marginBottom:8}}>

          {dbg.unknown.map((u,i)=>(<div key={'u'+i} className="diag-card diag-crit"><div style={{display:'flex',justifyContent:'space-between'}}><span style={{fontWeight:600,fontSize:'.83rem',color:'var(--red)'}}>{u.cat}</span><span className="bd" style={{background:'#2a1a1a',color:'var(--red)',fontSize:'.58rem'}}>NEW</span></div><div className="fi" style={{fontSize:'.7rem',color:'var(--txd)',marginTop:3,maxHeight:50,overflow:'auto'}}>{u.msg}</div></div>))}
          <div style={{marginTop:8,display:'flex',gap:6}}>
            <button className="bt bs" onClick={()=>{const t=genBugReport(dbg);navigator.clipboard.writeText(t).catch(()=>{});const b=new Blob([t],{type:'text/markdown'});const u=URL.createObjectURL(b);const a=document.createElement('a');a.href=u;a.download='bug-report.md';a.click()}}>Export Bug Report</button>
            <button className="bt bs" title="Opens a pre-filled GitHub Issue with anonymized error data" onClick={()=>{const rpt={schema:1,id:crypto.randomUUID(),timestamp:new Date().toISOString(),source:'forge-diagnostics',weiduVersion:String(dbg.ver||'unknown'),errors:Object.values(dbg.errors.reduce((a,e)=>{const k=e.cat||'unknown';a[k]=a[k]||{tp2:e.mod||'unknown',pattern:k,count:0};a[k].count++;return a},{})),warnings:Object.values(dbg.warnings.reduce((a,w)=>{const k=w.cat||'unknown';a[k]=a[k]||{tp2:w.mod||'unknown',pattern:k,count:0};a[k].count++;return a},{})),successCount:dbg.success.length,engineLimits:null};const title=encodeURIComponent('Diagnostic Report: '+dbg.errors.length+'err/'+dbg.warnings.length+'warn/'+dbg.success.length+'ok');const body=encodeURIComponent('```json\n'+JSON.stringify(rpt,null,2)+'\n```');window.open(URLS.telemetryRepo+'/issues/new?title='+title+'&body='+body+'&labels=install-report','_blank')}}>Share on GitHub</button>
          </div>
        </div>)}
      </div>
    </div>);
}

  const inferFocus=(p)=>{const cats=new Set();(p.keys||[]).forEach(k=>{const mid=parseInt(k);const mod=D.find(m=>m.i===mid);if(mod)cats.add(mod.c)});const f=[];if(cats.has('NPC')||cats.has('NPC_EE'))f.push('npc');if(cats.has('QUEST')||cats.has('QUEST_EE')||cats.has('MEGA'))f.push('story');if(cats.has('TACTICAL')||cats.has('AI'))f.push('tactical');if(cats.has('UI')||cats.has('PORTRAIT')||cats.has('VISUAL'))f.push('visual');if(cats.has('TWEAK'))f.push('qol');if(cats.has('CLASS')||cats.has('KIT'))f.push('class');return f};

          <button className="bt bs" onClick={()=>{const md=genReport(D,sel,diff);const b=new Blob([md],{type:'text/markdown'});const u=URL.createObjectURL(b);const a=document.createElement('a');a.href=u;a.download='install-report.md';a.click()}}>{t('btn.report','Report')}</button>
          <button className="bt bg" onClick={async()=>{await loadSelectedDetails(data,D,sel);if(installTarget&&installTarget!=='all'&&incompatSel.length>0){setExportConfirm({next:'export'})}else{setModal('export')}}}>{t('btn.export','Export...')}</button>
          <button className="bt" style={{color:'var(--red)',borderColor:'var(--red)'}} onClick={()=>setModal('confirmClear')}>{t('btn.reset','Reset')}</button>
        </div>
        <div style={{display:'flex',alignItems:'center',gap:6,flexShrink:0}}>
          {sugTotal>0&&<button className="bt bs" style={{color:showSuggestions?'var(--blu)':'var(--txd)',borderColor:showSuggestions?'rgba(96,165,250,.4)':'var(--brd)',fontSize:'.72rem'}} onClick={()=>{const v=!showSuggestions;setShowSuggestions(v);if(v){setShowConflicts(false);setShowOrderOverlay(false)}}} title={t('overlay.suggestions','Suggestions')}>{t('overlay.suggestions','Suggestions')} <span style={{color:'var(--blu)',fontWeight:700}}>{sugTotal}</span></button>}
          {conflictTotal>0&&<button className="bt bs" style={{color:showConflicts?(hardCt>0?'var(--red)':'var(--org)'):'var(--txd)',borderColor:showConflicts?(hardCt>0?'rgba(248,113,113,.4)':'rgba(251,146,60,.4)'):'var(--brd)',fontSize:'.72rem'}} onClick={()=>{const v=!showConflicts;setShowConflicts(v);if(v){setShowSuggestions(false);setShowOrderOverlay(false)}}} title={t('overlay.conflicts','Conflicts')}>{"\u26a0"} {t('overlay.conflicts','Conflicts')}{conflictBadge>0&&<span style={{color:hardCt>0?'var(--red)':'var(--org)',fontWeight:700,marginLeft:3}}>{conflictBadge}</span>}</button>}
          <button className="bt bs" style={{color:showOrderOverlay?'var(--gold)':'var(--txd)',borderColor:showOrderOverlay?'var(--goldd)':'var(--brd)',fontSize:'.72rem'}} onClick={()=>{const v=!showOrderOverlay;setShowOrderOverlay(v);if(v){setShowConflicts(false);setShowSuggestions(false)}}} title={t('overlay.order_tip','Install Order Map')}>{"\u2630"} {t('overlay.order','Order')}</button>
          <span style={{fontSize:'.58rem',color:'var(--txd)',opacity:.6,fontFamily:'Fira Code, monospace'}}>{"v"+CONFIG.VER}</span>
        </div>
      </div>
      </>})()}

      {/* Save preset modal */}
      {modal==='save'&&(<div className="mo" onClick={()=>setModal(null)}><div className="md" onClick={e=>e.stopPropagation()} style={{maxWidth:420}}>
        <h2 className="ci" style={{color:'var(--gold)',marginBottom:10,fontSize:'1rem'}}>{t('modal.save_preset','Save Custom Preset')}</h2>
        <div style={{fontSize:'.82rem',color:'var(--txd)',marginBottom:8}}>{selCount} {t('modal.comps_saved','components will be saved.')}</div>
        <input className="sx" placeholder={t('modal.preset_name','Preset name...')} value={saveName} onChange={e=>setSaveName(e.target.value)} onKeyDown={e=>{if(e.key==='Enter')savePreset()}} autoFocus/>
        <div style={{marginTop:10,display:'flex',justifyContent:'flex-end',gap:6}}>
          <button className="bt" onClick={()=>setModal(null)}>{t('btn.cancel','Cancel')}</button>
          <button className="bt bg" disabled={!saveName.trim()||selCount===0} onClick={savePreset}>{t('btn.save','Save')}</button>
        </div>
      </div></div>)}

      {modal==='publish'&&<PublishModal sel={sel} onClose={()=>setModal(null)}/>}

      {exportConfirm&&<div className="mo" onClick={e=>{if(e.target===e.currentTarget)setExportConfirm(null)}}>
        <div className="md" onClick={e=>e.stopPropagation()} style={{maxWidth:560,width:'90%',maxHeight:'85vh',overflowY:'auto'}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12,paddingBottom:10,borderBottom:'1px solid var(--brd)'}}>
            <h3 style={{color:'var(--gold)',margin:0,fontFamily:"'Cinzel',serif"}}>{t('export.incompat_title','Incompatible Selections')}</h3>
            <button className="bt" onClick={()=>setExportConfirm(null)} style={{fontSize:'.8rem',padding:'4px 10px'}}>{"\u2715"}</button>
          </div>
          <p style={{fontSize:'.82rem',color:'var(--tx)',lineHeight:1.5,margin:'0 0 10px'}}>
            <b style={{color:'var(--red)'}}>{incompatSel.length}</b>{' '+t('export.incompat_count','selected component'+(incompatSel.length!==1?'s':'')+" aren't compatible with your chosen target")+' ('}<b>{(INSTALL_TARGETS.find(([id])=>id===installTarget)||[])[1]||installTarget}</b>{'). ' +t('export.incompat_explain','The install runner (or WeiDU directly) will skip them at install time with a "not compatible" error.')}
          </p>
          <div style={{maxHeight:200,overflowY:'auto',margin:'10px 0',background:'var(--bg)',borderRadius:4,padding:'6px 10px',border:'1px solid var(--brd)'}}>
            {incompatSel.map(({mod,ci},i)=><div key={i} style={{fontSize:'.72rem',padding:'2px 0',borderBottom:i<incompatSel.length-1?'1px solid var(--bg2)':'none'}}>
              <span style={{color:'var(--tx)'}}>{mod.n}</span>
              <span style={{color:'var(--txd)',marginLeft:6}}>{' \u00b7 '+(mod.co[ci]?.n||'Component '+ci)}</span>
              <span style={{color:'var(--red)',marginLeft:6,fontSize:'.64rem'}}>{'('+((mod.coGames&&mod.coGames[ci])||[]).join(', ')+')'}</span>
            </div>)}
          </div>
          <div style={{display:'flex',gap:8,justifyContent:'flex-end',marginTop:12}}>
            <button className="bt" onClick={()=>setExportConfirm(null)}>{t('export.cancel','Cancel')}</button>
            <button className="bt" onClick={()=>{setExportConfirm(null);setModal('export')}}>{t('export.keep_all','Export as-is')}</button>
            <button className="bt" style={{background:'var(--goldd)',color:'var(--bg)',borderColor:'var(--gold)'}} onClick={()=>{const next={...sel};incompatSel.forEach(({key})=>{delete next[key]});setSel(next);setExportConfirm(null);setTimeout(()=>setModal('export'),0)}}>{t('export.strip_and_export','Strip incompatible & export')}</button>
          </div>
        </div>
      </div>}

      {modal==='export'&&(()=>{const ex=doExport();const LANGS=Object.entries(LANG_NAMES);const selMods=D.filter(m=>m.co.some((_,ci)=>sel[m.i+'-'+ci]));const langStats=userLang!=='en'?{total:selMods.length,supported:selMods.filter(m=>{const fm=getFullMod(data,m);return fm.langs&&fm.langs[userLang]!=null}).length}:null;const nonZeroEn=selMods.filter(m=>{const fm=getFullMod(data,m);return fm.langs&&fm.langs[userLang]!=null&&fm.langs[userLang]!==0});return(<div className="mo" onClick={()=>setModal(null)}><div className="md" onClick={e=>e.stopPropagation()}>
        <h2 className="ci" style={{color:'var(--gold)',marginBottom:10,fontSize:'1rem'}}>{t('modal.export','Export')}</h2>
        <div style={{background:'var(--bg)',borderRadius:6,padding:10,marginBottom:8,display:'flex',alignItems:'center',gap:8}}>
          <label style={{fontWeight:600,fontSize:'.85rem',whiteSpace:'nowrap'}}>{t('modal.install_lang','Install Language:')}</label>
          <select value={userLang} onChange={e=>setUserLang(e.target.value)} style={{minWidth:140,background:'var(--bg2)',color:'var(--tx)',border:'1px solid var(--bd)',borderRadius:4,padding:'4px 6px',fontSize:'.85rem'}}>
            {LANGS.map(([code,name])=><option key={code} value={code}>{name}</option>)}
          </select>
          {langStats&&<span style={{fontSize:'.78rem',color:langStats.supported===langStats.total?'var(--grn)':'#f0ad4e'}}>{langStats.supported}/{langStats.total} mods</span>}
        </div>
        {langStats&&langStats.supported<langStats.total&&<div className="warn info" style={{fontSize:'.78rem',marginBottom:6}}>{langStats.total-langStats.supported} mod(s) don't have {LANGS.find(l=>l[0]===userLang)?.[1]||userLang} translations and will fall back to English.</div>}
        {nonZeroEn.length>0&&<div className="warn info" style={{fontSize:'.78rem',marginBottom:6}}>{nonZeroEn.length} mod(s) have {LANGS.find(l=>l[0]===userLang)?.[1]||userLang} at a non-default index (not #0). The exported WeiDU.log handles this automatically, but manual installers should not assume #0 is always {LANGS.find(l=>l[0]===userLang)?.[1]||userLang}.</div>}
        {ex.msgs.map((w,i)=><div key={i} className={"warn "+(w.t==='err'?'err':w.t==='info'?'info':'')}>{w.m}</div>)}
        {ex.installNotes.length>0&&<div style={{background:'#4a3000',border:'1px solid #b8860b',borderRadius:6,padding:10,marginTop:8}}>
          <div style={{fontWeight:700,color:'#ffc107',marginBottom:6,fontSize:'.9rem'}}>{t('modal.export_pre_install','Pre-Install Steps Required')}</div>
          <div style={{fontSize:'.82rem',color:'#ffe0a0',marginBottom:6}}>{t('modal.export_pre_install_msg','Complete these steps before running the installer:')}</div>
          {ex.installNotes.map((n,i)=><div key={i} style={{display:'flex',gap:6,marginBottom:4,fontSize:'.8rem',color:'#ffe0a0'}}>
            <span>{n.type==='folder'?'\uD83D\uDCC1':n.type==='download'?'\u2B07\uFE0F':n.type==='file'?'\uD83D\uDCC4':'\u2699\uFE0F'}</span>
            <span><b>{n.mod}</b>: {n.t}</span>
          </div>)}
        </div>}
        <div style={{display:'flex',flexDirection:'column',gap:6,marginTop:8}}>
          <div style={{background:'var(--bg)',borderRadius:6,padding:10,display:'flex',justifyContent:'space-between',alignItems:'center'}}><span style={{fontWeight:600}}>{t('modal.export_weidu','WeiDU.log')+" ("+(ex.weidu.split("\n").length-3)+")"}</span><button className="bt bs" onClick={()=>dl(ex.weidu,'WeiDU.log')}>{t('btn.download','Download')}</button></div>
          {ex.bgee&&<div style={{background:'var(--bg)',borderRadius:6,padding:10,display:'flex',justifyContent:'space-between',alignItems:'center'}}><span style={{fontWeight:600}}>{t('modal.export_bgee','WeiDU-BGEE.log')+" ("+(ex.bgee.split("\n").length-3)+")"}</span><button className="bt bs" onClick={()=>dl(ex.bgee,'WeiDU-BGEE.log')}>{t('btn.download','Download')}</button></div>}
          <div style={{background:'var(--bg)',borderRadius:6,padding:10,display:'flex',justifyContent:'space-between',alignItems:'center'}}><span style={{fontWeight:600}}>{t('modal.export_pi','PI Format')}</span><button className="bt bs" onClick={()=>dl(ex.pi,'install-EET.txt')}>{t('btn.download','Download')}</button></div>
          <div style={{background:'var(--bg)',borderRadius:6,padding:10,display:'flex',justifyContent:'space-between',alignItems:'center'}}><span style={{fontWeight:600}}>{t('modal.export_modlist','Mod Download List')}</span><button className="bt bs" onClick={()=>{const seen=new Set();const mods=[];D.forEach(mod=>{if(seen.has(mod.t)||!mod.u)return;const hasSel=mod.co.some((_,ci)=>sel[mod.i+'-'+ci]);if(!hasSel)return;seen.add(mod.t);const ghMatch=mod.u.match(/github\.com\/([^\/]+)\/([^\/]+)/);mods.push({name:mod.n,tp2:mod.t,url:mod.u,github:ghMatch?ghMatch[1]+'/'+ghMatch[2].replace(/\.git$/,''):null})});dl(JSON.stringify({generated:new Date().toISOString(),description:'Mod download list from Infinity Mod Forge. For GitHub mods, download the latest release. For other mods, visit the URL.',mods},null,2),'mod_downloads.json')}}>{t('btn.download','Download')}</button></div>
          {ex.installNotes.length>0&&<div style={{background:'var(--bg)',borderRadius:6,padding:10,display:'flex',justifyContent:'space-between',alignItems:'center'}}><span style={{fontWeight:600}}>{t('modal.export_checklist','Pre-Install Checklist')}</span><button className="bt bs" onClick={()=>{const lines=['Infinity Mod Forge - Pre-Install Checklist','Generated: '+new Date().toISOString(),'','Complete these steps BEFORE running the installer:',''];ex.installNotes.forEach((n,i)=>{lines.push('[ ] '+(i+1)+'. ['+n.mod+'] '+n.t)});lines.push('','---','All steps completed? You are ready to run the installer.');dl(lines.join('\n'),'pre-install-checklist.txt')}}>{t('btn.download','Download')}</button></div>}
        </div>
        <div style={{marginTop:8,display:'flex',justifyContent:'flex-end'}}><button className="bt" onClick={()=>setModal(null)}>{t('btn.close','Close')}</button></div>
      </div></div>)})()}

      {modal==='shared'&&(<div className="mo" onClick={()=>setModal(null)}><div className="md" onClick={e=>e.stopPropagation()} style={{maxWidth:480}}>
        <h2 className="ci" style={{color:'var(--gold)',marginBottom:10,fontSize:'1rem'}}>{t('modal.shared','Selection Shared')}</h2>
        <div style={{fontSize:'.85rem',marginBottom:8}}>{t('modal.shared_msg','URL updated with your selection. Share this link:')}</div>
        <div style={{background:'var(--bg)',padding:10,borderRadius:6,wordBreak:'break-all'}} className="fi">{window.location.href}</div>
        <div style={{fontSize:'.78rem',color:'var(--txd)',marginTop:6}}>{t('modal.shared_note','Anyone who opens this URL will see your exact mod selection.')}</div>
        <div style={{marginTop:8,display:'flex',justifyContent:'flex-end'}}><button className="bt" onClick={()=>setModal(null)}>{t('btn.close','Close')}</button></div>
      </div></div>)}

      {modal==='confirmClear'&&(<div className="mo" onClick={()=>setModal(null)}><div className="md" onClick={e=>e.stopPropagation()} style={{maxWidth:380}}>
        <h2 className="ci" style={{color:'var(--red)',marginBottom:10,fontSize:'1rem'}}>{t('modal.clear','Clear Selection?')}</h2>
        <div style={{fontSize:'.85rem',marginBottom:12}}>{t('modal.clear_msg_pre','This will deselect all')} <b>{stats.c}</b> {t('modal.clear_msg_comps','components across')} <b>{stats.m}</b> {t('modal.clear_msg_post','mods. This cannot be undone.')}</div>
        <div style={{display:'flex',justifyContent:'flex-end',gap:6}}>
          <button className="bt" onClick={()=>setModal(null)}>{t('btn.cancel','Cancel')}</button>
          <button className="bt" style={{background:'var(--red)',color:'#fff',borderColor:'var(--red)'}} onClick={()=>{initSel.current={};setSel({});setModal(null)}}>{t('btn.clear_all','Clear All')}</button>
        </div>
      </div></div>)}
    </div>
    </AC.Provider>);
}

function App(){return <DataLoader><LangProvider><AppInner/></LangProvider></DataLoader>}
ReactDOM.render(<App/>,document.getElementById('root'));

</script>
</body>
</html>
