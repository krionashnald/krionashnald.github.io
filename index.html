function SpellsPanel({D,sel,vanillaSpells,detailVer,onGoToMod,spellids,catMap,filter:externalFilter}){
  const data=useContext(DC);const{t}=useLang();
  const[_f,_sf]=useState('');const filter=externalFilter!=null?externalFilter:_f;
  const[subTab,setSubTab]=useState(()=>{const v=LS.get(LK.STAB);return v&&v!=='overview'?v:'wizard'});
  const[level,setLevel]=useState(1);
  const[affectedOnly,setAffectedOnly]=useState(()=>LS.get('spellAffectedOnly',false)===true);
  const[conflictsOnly,setConflictsOnly]=useState(()=>LS.get('spellConflictsOnly',false)===true);
  const[expSplLv,setExpSplLv]=useState(null);
  const[detailSpell,setDetailSpell]=useState(null);

  useEffect(()=>{LS.set(LK.STAB,subTab)},[subTab]);
  useEffect(()=>{LS.set('spellAffectedOnly',affectedOnly)},[affectedOnly]);
  useEffect(()=>{LS.set('spellConflictsOnly',conflictsOnly)},[conflictsOnly]);
  useEffect(()=>{if(!detailSpell)return;const h=e=>{if(e.key==='Escape')setDetailSpell(null)};window.addEventListener('keydown',h);return()=>window.removeEventListener('keydown',h)},[detailSpell]);

  // Resolve spells: walk selected mods in install order, last modifier wins
  const resolved=useMemo(()=>{
    const state={};
    // Initialize from vanilla spells
    Object.entries(vanillaSpells||{}).forEach(([ref,sp])=>{
      state[ref]={...sp,ref,vanilla:true,activeMods:[],winner:null,hasConflict:false};
    });

    // Walk mods in install order
    let order=0;
    CO.filter(c=>catMap[c]).forEach(cat=>{
      (catMap[cat]||[]).forEach(mod=>{
        const detail=data._detailCache[mod.i];
        const spl=detail&&detail.spl;
        if(!spl)return;
        mod.co.forEach((comp,ci)=>{
          const selKey=mod.i+'-'+ci;
          if(!sel[selKey])return;
          const ciKey=''+ci;
          const entry=spl[ciKey];
          if(!entry)return;
          // Process modified vanilla spells
          if(entry.spells){
            entry.spells.forEach(spEntry=>{
              const ref=spEntry[0],action=spEntry[1],summary=spEntry[2],overrides=spEntry[3]||null;
              if(!state[ref]){
                state[ref]={n:ref,type:'wizard',lv:0,school:'Unknown',desc:'',ref,vanilla:false,activeMods:[],winner:null,hasConflict:false};
              }
              const me={modId:mod.i,modName:mod.n,compIdx:ci,compName:comp.n,action,summary,order,scope:entry.scope};
              if(!state[ref].activeMods.some(x=>x.modId===me.modId&&x.action===me.action&&x.summary===me.summary))state[ref].activeMods.push(me);
              if(action==='disable'||action==='remove'){state[ref].winner=me;state[ref].disabled=true}else if(action==='modify'||action==='replace'||action==='tweak'){state[ref].winner=me;state[ref].disabled=false;if(overrides){if(overrides.lv!=null)state[ref].lv=overrides.lv;if(overrides.n)state[ref].n=overrides.n;if(overrides.type)state[ref].type=overrides.type;if(overrides.school)state[ref].school=overrides.school;if(overrides.desc)state[ref].desc=overrides.desc}}
            });
          }
          // Process new spells — merge into the main spell table
          if(entry.new){
            entry.new.forEach(([ref,type,lv,school,name,desc])=>{
              const me={modId:mod.i,modName:mod.n,compIdx:ci,compName:comp.n,action:'add',summary:null,order,scope:entry.scope};
              if(!state[ref]){
                state[ref]={n:name,type,lv,school,desc,ref,vanilla:false,icon:'spells/icons/'+encodeURIComponent(ref)+'.png',activeMods:[me],winner:me,hasConflict:false,addedBy:mod.n};
              } else {
                if(!state[ref].activeMods.some(x=>x.modId===me.modId&&x.action===me.action))state[ref].activeMods.push(me);
              }
            });
          }
          order++;
        });
      });
    });

    // Mark conflicts
    Object.values(state).forEach(s=>{
      const modifiers=s.activeMods.filter(m=>m.action==='modify'||m.action==='replace');
      s.hasConflict=modifiers.length>1;
    });
    return{spells:state};
  },[sel,D,vanillaSpells,catMap,detailVer]);

  // Filter + sort spells for current view
  const spellList=useMemo(()=>{
    const fl=filter.toLowerCase();
    return Object.values(resolved.spells)
      .filter(sp=>{
        // Type filter by sub-tab
        if(subTab==='wizard'&&sp.type!=='wizard')return false;
        if(subTab==='priest'&&sp.type!=='priest')return false;
        if(subTab==='innate'&&sp.type!=='innate'&&sp.type!=='hla'&&sp.type!=='special')return false;
        if(subTab==='overview')return false;
        // When conflicts mode is on, show all conflicting spells across all levels for this type
        if(conflictsOnly){
          if(subTab==='wizard'&&sp.type!=='wizard')return false;
          if(subTab==='priest'&&sp.type!=='priest')return false;
          if(subTab==='innate'&&sp.type!=='innate'&&sp.type!=='hla'&&sp.type!=='special')return false;
          if(!sp.hasConflict)return false;
          if(fl&&!sp.n.toLowerCase().includes(fl)&&!(sp.school||'').toLowerCase().includes(fl))return false;
          return true;
        }
        // Level filter (innate has no levels)
        if(subTab!=='innate'&&level!=='hla'&&sp.lv!==level)return false;
        if(subTab!=='innate'&&level==='hla'&&sp.type!=='hla')return false;
        // Text filter
        if(fl){
          if(!sp.n.toLowerCase().includes(fl)&&!(sp.school||'').toLowerCase().includes(fl)&&!sp.activeMods.some(m=>m.modName.toLowerCase().includes(fl)))return false;
        }
        if(affectedOnly&&sp.activeMods.length===0)return false;
        return true;
      })
      .sort((a,b)=>a.n.localeCompare(b.n));
  },[resolved.spells,subTab,level,filter,affectedOnly,conflictsOnly]);

  // Stats
  const stats=useMemo(()=>{
    const all=Object.values(resolved.spells);
    const modified=all.filter(s=>s.activeMods.length>0&&s.vanilla!==false).length;
    const added=all.filter(s=>s.vanilla===false).length;
    const conflicts=all.filter(s=>s.hasConflict).length;
    const byType={wizard:0,priest:0,innate:0};
    all.forEach(s=>{if(s.type==='wizard')byType.wizard++;else if(s.type==='priest')byType.priest++;else byType.innate++});
    return{total:all.length,modified,added,conflicts,byType};
  },[resolved]);

  // Level pills data
  const maxLevel=subTab==='wizard'?9:subTab==='priest'?7:0;
  const levelCounts=useMemo(()=>{
    if(!maxLevel)return{};
    const counts={};
    const type=subTab;
    for(let l=1;l<=maxLevel;l++){
      const spells=Object.values(resolved.spells).filter(s=>s.type===type&&s.lv===l);
      const mod=spells.filter(s=>s.activeMods.length>0).length;
      counts[l]={total:spells.length,mod};
    }
    // HLA count
    const hlas=Object.values(resolved.spells).filter(s=>s.type==='hla');
    counts.hla={total:hlas.length,mod:hlas.filter(s=>s.activeMods.length>0).length};
    return counts;
  },[resolved.spells,subTab,maxLevel]);

  const navigateToMod=(modId)=>{
    const mod=D.find(m=>m.i===modId);
    if(mod)onGoToMod(mod);
  };

  // ── Render ──
  return(<div className="spell-panel">
    <div className="spell-toolbar">
      <FilterTip kind="affected" t={t}>
        <Pill active={affectedOnly} onClick={()=>setAffectedOnly(!affectedOnly)} style={{fontSize:'.72rem'}}>{t('ski.affected','Affected')}</Pill>
      </FilterTip>
      <FilterTip kind="conflicts" t={t}>
        <Pill active={conflictsOnly} onClick={()=>setConflictsOnly(!conflictsOnly)} style={{fontSize:'.72rem'}}>{t('ski.conflicts','Conflicts')}</Pill>
      </FilterTip>
    </div>

    <div className="spell-subtabs">
      {SPELL_TABS.map(([k,label])=><div key={k} className={"spell-subtab"+(subTab===k?' ac':'')} onClick={()=>{setSubTab(k);if(k==='wizard'||k==='priest')setLevel(1)}}>{label}{k==='wizard'?' ('+stats.byType.wizard+')':k==='priest'?' ('+stats.byType.priest+')':k==='innate'?' ('+stats.byType.innate+')':''}</div>)}
    </div>

    {/* Wizard / Priest sub-tabs — level pills + spell list */}
    {(subTab==='wizard'||subTab==='priest')&&(<div>
      {conflictsOnly&&<div style={{marginBottom:8,fontSize:'.78rem',color:'var(--org)'}}>{"\u26a0"} Showing all {subTab} spell conflicts across all levels</div>}
      {!conflictsOnly&&<div className="spell-levels">
        {Array.from({length:maxLevel},(_,i)=>i+1).map(l=>{const splKey=(subTab==='wizard'?'w':'p')+l;const splLv=spellids&&spellids.levels[splKey];const danger=splLv&&splLv.total>LIMITS.SPELL_LEVEL_CAP;const warn=splLv&&splLv.total>LIMITS.SPELL_LEVEL_CAP-10;
          return <div key={l} className={"pill"+(level===l?' ac':'')} style={danger?{borderColor:'rgba(248,113,113,.5)',color:'var(--red)'}:warn?{borderColor:'rgba(251,146,60,.4)',color:'var(--org)'}:{}} onClick={()=>setLevel(l)}>
          {l}{splLv?<span className="cnt" style={danger?{color:'var(--red)'}:warn?{color:'var(--org)'}:{}}>{splLv.total}/{50}</span>:levelCounts[l]&&<span className="cnt">({levelCounts[l].total})</span>}
        </div>})}
      </div>}
      {spellList.length>0?<div className="spell-grid">
        {spellids&&(()=>{const splKey=(subTab==='wizard'?'w':'p')+level;const splLv=spellids.levels[splKey];const contribs=spellids.contribsByLv[splKey];
          return splLv&&<div style={{width:'100%',marginBottom:4,padding:'4px 10px',background:'var(--bg2)',borderRadius:4,border:'1px solid var(--brd)',fontSize:'.72rem'}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
              <span style={{color:'var(--txd)'}}>Level {level}: <span style={{color:splLv.total>LIMITS.SPELL_LEVEL_CAP?'var(--red)':splLv.total>LIMITS.SPELL_LEVEL_CAP-10?'var(--org)':'var(--pur)',fontWeight:600}}>{splLv.total}/{LIMITS.SPELL_LEVEL_CAP}</span> ({splLv.base} vanilla{splLv.mod>0?` + ${splLv.mod} mods`:''})</span>
              {contribs&&<span style={{color:'var(--blu)',cursor:'pointer',fontSize:'.65rem'}} onClick={()=>setExpSplLv(expSplLv===splKey?null:splKey)}>{expSplLv===splKey?'\u25bc Hide contributors':'\u25b6 Show contributors'}</span>}
            </div>
            {expSplLv===splKey&&contribs&&<div style={{marginTop:4,borderTop:'1px solid var(--brd)',paddingTop:4}}>
              {contribs.sort((a,b)=>b.n-a.n).map((c,i)=><div key={i} style={{display:'flex',justifyContent:'space-between',padding:'1px 0'}}>
                <span><span style={{color:'var(--tx)'}}>{c.comp}</span> <span style={{color:'var(--txd)'}}>({c.mod})</span></span>
                <span style={{color:'var(--pur)',fontWeight:600}}>+{c.n}</span>
              </div>)}
            </div>}
          </div>})()}
        {spellList.map(sp=>{const actionInfo=sp.winner?ACTION_STYLES[sp.winner.action]:null;const status=sp.hasConflict?'CONFLICT':sp.vanilla===false?'ADDED':sp.activeMods.length>0?'MODIFIED':'VANILLA';return <div key={sp.ref} className={"spell-card"+(sp.hasConflict?' has-conflict':sp.vanilla===false?' is-added':sp.activeMods.length>0?' has-mods':'')} style={{cursor:'pointer'}} {...clickableProps(sp.n+' \u2014 '+(sp.school||sp.type)+' \u2014 '+status,()=>setDetailSpell(sp))}>
          <div className={"card-action-bar "+(actionInfo?actionInfo[1]:'action-vanilla')}>{actionInfo?actionInfo[0]:'VANILLA'}</div>
          {sp.icon&&<div className="spell-icon"><img src={sp.icon} alt={sp.n} loading="lazy" onError={e=>{e.target.parentNode.style.display='none'}}/></div>}
          <div className="spell-name">{sp.n}</div>
          <div className="spell-school">{sp.school}{conflictsOnly&&sp.lv>0&&<span style={{marginLeft:4}}>L{sp.lv}</span>}</div>
          {(sp.ct||sp.rng||sp.sv||sp.dur)&&<div style={{fontSize:'.62rem',color:'var(--txd)',lineHeight:1.3,marginTop:2}}>
            {[sp.ct&&'CT '+sp.ct,sp.rng&&'R '+sp.rng,(sp.aoe&&sp.aoe!=='single')&&'AoE '+sp.aoe,sp.sv&&sp.sv!=='none'&&'Sv '+sp.sv,sp.dur&&sp.dur!=='instant'&&sp.dur].filter(Boolean).join(' \u00b7 ')}
          </div>}
          {sp.sph&&sp.sph.length>0&&<div style={{fontSize:'.6rem',color:'var(--purL)',marginTop:1}}>{sp.sph.join(', ')}</div>}
          {sp.desc&&<div className="card-info"><div className="spell-desc">{sp.desc}</div></div>}
          <CardFooter activeMods={sp.activeMods} winner={sp.winner} refId={sp.ref} onNavigate={navigateToMod}/>
        </div>})}
      </div>:<EmptyGrid entity="Spell" entityPlural="spells" filter={filter} affectedOnly={affectedOnly} conflictsOnly={conflictsOnly} extraReason="No spells at this level."/>}
    </div>)}

    {/* Innate sub-tab */}
    {subTab==='innate'&&(<div>
      {spellList.length>0?<div className="spell-grid">
        {spellList.map(sp=>{const actionInfo=sp.winner?ACTION_STYLES[sp.winner.action]:null;const status=sp.hasConflict?'CONFLICT':sp.vanilla===false?'ADDED':sp.activeMods.length>0?'MODIFIED':'VANILLA';return <div key={sp.ref} className={"spell-card"+(sp.hasConflict?' has-conflict':sp.vanilla===false?' is-added':sp.activeMods.length>0?' has-mods':'')} style={{cursor:'pointer'}} {...clickableProps(sp.n+' \u2014 '+(sp.school||sp.type)+' \u2014 '+status,()=>setDetailSpell(sp))}>
          <div className={"card-action-bar "+(actionInfo?actionInfo[1]:'action-vanilla')}>{actionInfo?actionInfo[0]:'VANILLA'}</div>
          {sp.icon&&<div className="spell-icon"><img src={sp.icon} alt={sp.n} loading="lazy" onError={e=>{e.target.parentNode.style.display='none'}}/></div>}
          <div className="spell-name">{sp.n}</div>
          <div className="spell-school">{sp.type==='hla'?'HLA':sp.school}</div>
          {sp.desc&&<div className="card-info"><div className="spell-desc">{sp.desc}</div></div>}
          <CardFooter activeMods={sp.activeMods} winner={sp.winner} refId={sp.ref} onNavigate={navigateToMod}/>
        </div>})}
      </div>:<EmptyGrid entity="Innate Abilities" entityPlural="innate abilities or HLAs" filter={filter} affectedOnly={affectedOnly} conflictsOnly={conflictsOnly} extraReason="No innate abilities or HLAs in the database yet."/>}
    </div>)}

    {detailSpell&&<SpellDetailModal spell={detailSpell} onClose={()=>setDetailSpell(null)} onGoToMod={mid=>{const m=D&&D.find(x=>x.i===mid);if(m&&onGoToMod){setDetailSpell(null);onGoToMod(m)}}}/>}

  </div>);
}

// ═══ Kits Panel ═══

function KitsPanel({D,sel,vanillaKits,vanillaClasses,detailVer,onGoToMod,kitcap,catMap,filter:externalFilter}){
  const data=useContext(DC);const{t}=useLang();
  const[_f,_sf]=useState('');const filter=externalFilter!=null?externalFilter:_f;
  const[subTab,setSubTab]=useState(()=>{const v=LS.get(LK.KTAB);return v&&v!=='overview'?v:'fighter'});
  const[affectedOnly,setAffectedOnly]=useState(()=>LS.get('kitAffectedOnly',false)===true);
  const[conflictsOnly,setConflictsOnly]=useState(()=>LS.get('kitConflictsOnly',false)===true);
  const[expKitClass,setExpKitClass]=useState(null);
  const[detailKit,setDetailKit]=useState(null);

  useEffect(()=>{LS.set(LK.KTAB,subTab)},[subTab]);
  useEffect(()=>{LS.set('kitAffectedOnly',affectedOnly)},[affectedOnly]);
  useEffect(()=>{LS.set('kitConflictsOnly',conflictsOnly)},[conflictsOnly]);
  useEffect(()=>{if(!detailKit)return;const h=e=>{if(e.key==='Escape')setDetailKit(null)};window.addEventListener('keydown',h);return()=>window.removeEventListener('keydown',h)},[detailKit]);

  // Resolve kitAbilities for a kit: scan selected mod components, fall back to chargen.json
  const resolveKitAbil=(kitRef)=>{
    if(!kitRef)return null;
    const chargen=data&&data.chargen;
    let abil=null;
    try{
      if(D&&catMap){
        CO.filter(c=>catMap[c]).forEach(cat=>{(catMap[cat]||[]).forEach(mod=>{
          if(!mod||!mod.co)return;
          const detail=data._detailCache&&data._detailCache[mod.i];
          if(!detail||!detail.kitAbilities)return;
          mod.co.forEach((comp,ci)=>{
            if(!sel[mod.i+'-'+ci])return;
            const ka=detail.kitAbilities[''+ci];
            if(ka&&ka[kitRef])abil=ka[kitRef];
          });
        })});
      }
    }catch(e){}
    if(!abil&&chargen&&chargen.kitAbilities)abil=chargen.kitAbilities[kitRef];
    return abil;
  };

  // Resolve kits: walk selected mods in install order, last modifier wins
  const resolvedKits=useMemo(()=>{
    const state={};
    Object.entries(vanillaKits||{}).forEach(([ref,kit])=>{
      state[ref]={...kit,ref,vanilla:true,activeMods:[],winner:null,hasConflict:false};
    });
    let order=0;
    CO.filter(c=>catMap[c]).forEach(cat=>{
      (catMap[cat]||[]).forEach(mod=>{
        const detail=data._detailCache[mod.i];
        const kits=detail&&detail.kits;
        if(!kits)return;
        mod.co.forEach((comp,ci)=>{
          const selKey=mod.i+'-'+ci;
          if(!sel[selKey])return;
          const entry=kits[''+ci];
          if(!entry)return;
          if(entry.modify){
            entry.modify.forEach(kEntry=>{
              const ref=kEntry[0],action=kEntry[1],summary=kEntry[2];
              if(!state[ref]){
                state[ref]={n:ref,class:'unknown',desc:'',ref,vanilla:false,activeMods:[],winner:null,hasConflict:false};
              }
              const me={modId:mod.i,modName:mod.n,compIdx:ci,compName:comp.n,action,summary,order};
              if(!state[ref].activeMods.some(x=>x.modId===me.modId&&x.action===me.action&&x.summary===me.summary))state[ref].activeMods.push(me);
              if(action==='remove'){state[ref].winner=me;state[ref].removed=true}
              else{state[ref].winner=me;state[ref].removed=false}
            });
          }
          if(entry.new){
            entry.new.forEach(([ref,cls,name,desc])=>{
              const me={modId:mod.i,modName:mod.n,compIdx:ci,compName:comp.n,action:'add',summary:null,order};
              if(!state[ref]){
                state[ref]={n:name,class:cls,desc:desc||'',ref,vanilla:false,activeMods:[me],winner:me,hasConflict:false,addedBy:mod.n};
              } else {
                if(!state[ref].activeMods.some(x=>x.modId===me.modId&&x.action===me.action))state[ref].activeMods.push(me);
              }
            });
          }
          order++;
        });
      });
    });
    Object.values(state).forEach(k=>{
      const modifiers=k.activeMods.filter(m=>m.action==='modify'||m.action==='replace');
      k.hasConflict=modifiers.length>1;
    });
    return state;
  },[sel,D,vanillaKits,catMap,detailVer]);

  // Resolve class overhauls
  const resolvedClasses=useMemo(()=>{
    const state={};
    Object.entries(vanillaClasses||{}).forEach(([ref,cls])=>{
      state[ref]={...cls,ref,activeMods:[],winner:null,hasConflict:false};
    });
    let order=0;
    CO.filter(c=>catMap[c]).forEach(cat=>{
      (catMap[cat]||[]).forEach(mod=>{
        const detail=data._detailCache[mod.i];
        const classes=detail&&detail.classes;
        if(!classes)return;
        mod.co.forEach((comp,ci)=>{
          const selKey=mod.i+'-'+ci;
          if(!sel[selKey])return;
          const entries=classes[''+ci];
          if(!entries)return;
          entries.forEach(([ref,action,summary])=>{
            if(!state[ref]){
              state[ref]={n:ref,group:'other',desc:'',ref,activeMods:[],winner:null,hasConflict:false};
            }
            const me={modId:mod.i,modName:mod.n,compIdx:ci,compName:comp.n,action,summary,order};
            if(!state[ref].activeMods.some(x=>x.modId===me.modId&&x.action===me.action&&x.summary===me.summary))state[ref].activeMods.push(me);
            state[ref].winner=me;
          });
          order++;
        });
      });
    });
    Object.values(state).forEach(c=>{
      const modifiers=c.activeMods.filter(m=>m.action==='modify'||m.action==='replace');
      c.hasConflict=modifiers.length>1;
    });
    return state;
  },[sel,D,vanillaClasses,catMap,detailVer]);

  // Filter kits for current class tab
  const kitList=useMemo(()=>{
    const fl=filter.toLowerCase();
    return Object.values(resolvedKits)
      .filter(kit=>{
        if(subTab==='overview')return false;
        if(kit.class!==subTab)return false;
        if(conflictsOnly&&!kit.hasConflict)return false;
        if(affectedOnly&&kit.activeMods.length===0)return false;
        if(fl&&!kit.n.toLowerCase().includes(fl)&&!kit.class.toLowerCase().includes(fl)&&!kit.activeMods.some(m=>m.modName.toLowerCase().includes(fl)))return false;
        return true;
      })
      .sort((a,b)=>a.n.localeCompare(b.n));
  },[resolvedKits,subTab,filter,affectedOnly,conflictsOnly]);

  // Stats
  const stats=useMemo(()=>{
    const all=Object.values(resolvedKits);
    const vanilla=all.filter(k=>k.vanilla).length;
    const added=all.filter(k=>k.vanilla===false).length;
    const modified=all.filter(k=>k.activeMods.length>0&&k.vanilla).length;
    const conflicts=all.filter(k=>k.hasConflict).length;
    const byClass={};
    all.forEach(k=>{byClass[k.class]=(byClass[k.class]||0)+1});
    const classOverhauls=Object.values(resolvedClasses).filter(c=>c.activeMods.length>0).length;
    const classConflicts=Object.values(resolvedClasses).filter(c=>c.hasConflict).length;
    return{total:all.length,vanilla,added,modified,conflicts,byClass,classOverhauls,classConflicts};
  },[resolvedKits,resolvedClasses]);


  // Per-class kit counts for overview pills
  const classCounts=useMemo(()=>{
    const counts={};
    const classIds=['fighter','ranger','paladin','cleric','druid','thief','bard','mage','sorcerer','monk','shaman','multi','npc'];
    classIds.forEach(c=>{
      const kits=Object.values(resolvedKits).filter(k=>k.class===c);
      const affected=kits.filter(k=>k.activeMods.length>0).length;
      counts[c]={total:kits.length,affected};
    });
    return counts;
  },[resolvedKits]);

  const navigateToMod=(modId)=>{
    const mod=D.find(m=>m.i===modId);
    if(mod)onGoToMod(mod);
  };


  // ── Render ──
  return(<div className="spell-panel">
    <div className="spell-toolbar">
      <FilterTip kind="affected" t={t}>
        <Pill active={affectedOnly} onClick={()=>setAffectedOnly(!affectedOnly)} style={{fontSize:'.72rem'}}>{t('ski.affected','Affected')}</Pill>
      </FilterTip>
      <FilterTip kind="conflicts" t={t}>
        <Pill active={conflictsOnly} onClick={()=>setConflictsOnly(!conflictsOnly)} style={{fontSize:'.72rem'}}>{t('ski.conflicts','Conflicts')}</Pill>
      </FilterTip>
    </div>

    <div className="spell-subtabs">
      {KIT_TABS.map(([k,label])=>{
        const cnt=stats.byClass[k]||0;
        return <div key={k} className={"spell-subtab"+(subTab===k?' ac':'')} onClick={()=>setSubTab(k)}>{label}{' ('+cnt+')'}</div>;
      })}
    </div>

    {/* Class sub-tabs */}
    {kitList.length>0?<div>
      {conflictsOnly&&<div style={{fontSize:'.78rem',color:'var(--org)',marginBottom:8}}>Showing only kits with conflicts across all levels.</div>}
      <div className="spell-grid">
        {kitList.map(kit=>{const parsed=parseKitName(kit.n,kit.class);const actionInfo=kit.winner?ACTION_STYLES[kit.winner.action]:null;const status=kit.hasConflict?'CONFLICT':kit.vanilla===false?'ADDED':kit.activeMods.length>0?'MODIFIED':'VANILLA';return <div key={kit.ref} className={"spell-card"+(kit.hasConflict?' has-conflict':kit.vanilla===false?' is-added':kit.activeMods.length>0?' has-mods':'')} style={{cursor:'pointer'}} {...clickableProps(parsed.name+' \u2014 '+(KIT_CLASS_LABELS[kit.class]||kit.class)+' \u2014 '+status,()=>setDetailKit(kit))}>
          <div className={"card-action-bar "+(actionInfo?actionInfo[1]:'action-vanilla')}>{actionInfo?actionInfo[0]:'VANILLA'}</div>
          <div className="spell-name">{parsed.name}</div>
          {parsed.sub&&<div style={{fontSize:'.6rem',color:'var(--txd)',fontStyle:'italic',marginBottom:1}}>{parsed.sub}</div>}
          <div className="spell-school" style={{color:KIT_CLASS_COLORS[kit.class]||'var(--txd)'}}>{KIT_CLASS_LABELS[kit.class]||kit.class}</div>
          {kit.desc&&<div className="card-info"><div className="spell-desc">{kit.desc}</div></div>}
          <CardFooter activeMods={kit.activeMods} winner={kit.winner} refId={kit.ref} onNavigate={navigateToMod}/>
        </div>})}
      </div>
    </div>:<EmptyGrid entity="Kit" entityPlural="kits" filter={filter} affectedOnly={affectedOnly} conflictsOnly={conflictsOnly} extraReason="No kits found for this class. Kit detail data may not be populated yet."/>}

    {detailKit&&<KitDetailModal kit={detailKit} abil={resolveKitAbil(detailKit.ref)} onClose={()=>setDetailKit(null)} onGoToMod={mid=>{const m=D&&D.find(x=>x.i===mid);if(m&&onGoToMod){setDetailKit(null);onGoToMod(m)}}}/>}

  </div>);
}

// ═══ Items Panel ═══
// Item type → tint color. Loaded from data/config.json:itemColors at startup.
// Module-scope object so consumers can keep destructured/closure references; loader
// uses Object.assign to fill it without breaking those references.
const ITEM_CAT_COLORS={};

// Item type → Unicode glyph (placeholder when the real BAM icon is missing).
// Loaded from data/config.json:itemGlyphs at startup.
const ITEM_CAT_GLYPHS={};

// Placeholder rendered when item.icon is missing or fails to load.
function ItemIconFallback({type,size}){const sz=size||48;const color=ITEM_CAT_COLORS[type]||'var(--txd)';const glyph=ITEM_CAT_GLYPHS[type]||'\u2753';return <div style={{width:sz,height:sz,display:'flex',alignItems:'center',justifyContent:'center',background:'var(--bg3)',borderRadius:4,fontSize:sz*0.55,color,border:'1px dashed var(--brd)'}}>{glyph}</div>}
// Wraps an <img> and swaps in the fallback glyph on 404 or empty src.
function ItemIcon({item,size,style}){const[broken,setBroken]=React.useState(false);const sz=size||48;if(!item.icon||broken)return <ItemIconFallback type={item.type} size={sz}/>;return <img src={item.icon} alt={item.n} loading="lazy" onError={()=>setBroken(true)} style={{width:sz,height:sz,objectFit:'contain',imageRendering:'pixelated',...(style||{})}}/>}

const ITEM_CHUNK_SIZE=120;
// Replace WeiDU/IE template tokens in names so the UI doesn't show raw <CHARNAME>.
// Replace WeiDU/IE template tokens (<CHARNAME>, <PRO_HISHER>, etc.) with readable generic words.
function prettifyItemText(s){if(!s)return s;return s.replace(/<CHARNAME>/g,'Hero').replace(/<PRO_HISHER>/gi,'their').replace(/<PRO_HIMHER>/gi,'them').replace(/<PRO_HESHE>/gi,'they').replace(/<PRO_MANWOMAN>/gi,'person').replace(/<PRO_BOYGIRL>/gi,'child').replace(/<[A-Z_]+>/g,'')}
// Name-specific: apply text prettify, then strip leading [Faulty]-style tags (rendered as badges).
function prettifyItemName(n){if(!n)return n;return prettifyItemText(n).replace(/^\s*(?:\[[^\]]+\]\s*)+/,'').trim()}
// Extract leading bracketed qualifiers like "[Faulty]" from an item name.
// These are descriptive tags (not part of the name) and should render as badges.
function getItemNameTags(n){if(!n)return[];const out=[];const m=n.match(/^\s*((?:\[[^\]]+\]\s*)+)/);if(!m)return out;const re=/\[([^\]]+)\]/g;let x;while((x=re.exec(m[1]))!==null)out.push(x[1].trim());return out}
const NAME_TAG_COLORS={Faulty:{bg:'#5a2020',fg:'#ff9a7a',border:'#a84545'}};
function NameTagBadge({tag}){const c=NAME_TAG_COLORS[tag]||{bg:'var(--bg2)',fg:'var(--txd)',border:'var(--brd)'};return <span style={{fontSize:'.55rem',padding:'1px 5px',borderRadius:8,background:c.bg,color:c.fg,border:'1px solid '+c.border,fontWeight:600,letterSpacing:.3,textTransform:'uppercase',marginRight:4,verticalAlign:'middle'}}>{tag}</span>}

function ItemsPanel({vanillaItems,D,sel,catMap,detailVer,onGoToMod,filter:externalFilter}){
  const data=useContext(DC);const{t}=useLang();
  const[_f,_sf]=useState('');const filter=externalFilter!=null?externalFilter:_f;
  const[subTab,setSubTab]=useState(()=>LS.get(LK.ITAB)||'weapons');
  const[sortBy,setSortBy]=useState('name');
  const[typeFilter,setTypeFilter]=useState(null);
  const[detailItem,setDetailItem]=useState(null);
  const[chunkLimit,setChunkLimit]=useState(ITEM_CHUNK_SIZE);
  const sentinelRef=useRef(null);
  const scrollHandlerRef=useRef(null);
  // Callback ref: when sentinel mounts, find the scroll ancestor and attach a scroll listener.
  // Reveals next chunk when sentinel comes within 400px of the scroll viewport.
  const setSentinel=useCallback(node=>{
    if(scrollHandlerRef.current){
      scrollHandlerRef.current.target.removeEventListener('scroll',scrollHandlerRef.current.handler);
      scrollHandlerRef.current=null;
    }
    sentinelRef.current=node;
    if(!node)return;
    let scrollRoot=node.parentElement;
    while(scrollRoot){
      const ovy=getComputedStyle(scrollRoot).overflowY;
      if((ovy==='auto'||ovy==='scroll')&&scrollRoot.scrollHeight>scrollRoot.clientHeight)break;
      scrollRoot=scrollRoot.parentElement;
    }
    const target=scrollRoot||window;
    const check=()=>{
      if(!sentinelRef.current)return;
      const sr=sentinelRef.current.getBoundingClientRect();
      const cr=scrollRoot?scrollRoot.getBoundingClientRect():{top:0,bottom:window.innerHeight};
      if(sr.top<cr.bottom+400)setChunkLimit(c=>c+ITEM_CHUNK_SIZE);
    };
    target.addEventListener('scroll',check,{passive:true});
    scrollHandlerRef.current={target,handler:check};
    // Also check immediately in case sentinel is already visible
    check();
  },[]);
  const[classFilter,setClassFilter]=useState(()=>LS.get('itemClassFilter','')||'');
  const[chargesOnly,setChargesOnly]=useState(()=>LS.get('itemChargesOnly',false)===true);
  const[handFilter,setHandFilter]=useState(()=>LS.get('itemHandFilter','')||'');
  const[specialFilter,setSpecialFilter]=useState(()=>LS.get('itemSpecialFilter',null)||null);
  const[showFilters,setShowFilters]=useState(()=>LS.get('itemShowFilters',false)===true);
  const[affectedOnly,setAffectedOnly]=useState(()=>LS.get('itemAffectedOnly',false)===true);
  const[conflictsOnly,setConflictsOnly]=useState(()=>LS.get('itemConflictsOnly',false)===true);

  useEffect(()=>{LS.set(LK.ITAB,subTab);setTypeFilter(null)},[subTab]);
  useEffect(()=>{LS.set('itemClassFilter',classFilter)},[classFilter]);
  useEffect(()=>{LS.set('itemChargesOnly',chargesOnly)},[chargesOnly]);
  useEffect(()=>{LS.set('itemHandFilter',handFilter)},[handFilter]);
  useEffect(()=>{LS.set('itemSpecialFilter',specialFilter)},[specialFilter]);
  useEffect(()=>{LS.set('itemShowFilters',showFilters)},[showFilters]);
  useEffect(()=>{LS.set('itemAffectedOnly',affectedOnly)},[affectedOnly]);
  useEffect(()=>{LS.set('itemConflictsOnly',conflictsOnly)},[conflictsOnly]);
  useEffect(()=>{if(!detailItem)return;const h=e=>{if(e.key==='Escape')setDetailItem(null)};window.addEventListener('keydown',h);return()=>window.removeEventListener('keydown',h)},[detailItem]);
  // Reset chunked rendering when filters/category change
  useEffect(()=>{setChunkLimit(ITEM_CHUNK_SIZE)},[subTab,filter,sortBy,typeFilter,classFilter,chargesOnly,handFilter,specialFilter,affectedOnly,conflictsOnly]);

  // Resolve mod items: merge vanilla + mod-added items
  const resolvedItems=useMemo(()=>{
    const state={};
    // Start with vanilla items
    Object.entries(vanillaItems||{}).forEach(([ref,item])=>{
      state[ref]={...item,ref,vanilla:true,activeMods:[],winner:null,hasConflict:false};
    });
    if(D&&sel&&catMap){
      let order=0;
      CO.filter(c=>catMap[c]).forEach(cat=>{(catMap[cat]||[]).forEach(mod=>{
        const detail=data._detailCache[mod.i];
        const itemData=detail&&detail.items;
        if(!itemData)return;
        mod.co.forEach((comp,ci)=>{
          if(!sel[mod.i+'-'+ci])return;
          const entry=itemData[''+ci];
          if(!entry)return;
          if(entry.modify)entry.modify.forEach(([ref,action,summary])=>{
            if(!state[ref])state[ref]={n:ref,type:'misc',ref,vanilla:false,activeMods:[],winner:null,hasConflict:false};
            const me={modId:mod.i,modName:mod.n,compIdx:ci,compName:comp.n,action,summary,order};
            if(!state[ref].activeMods.some(x=>x.modId===me.modId&&x.action===me.action&&x.summary===me.summary))state[ref].activeMods.push(me);
            if(action==='remove'){state[ref].winner=me;state[ref].removed=true}
            else{state[ref].winner=me;state[ref].removed=false}
          });
          if(entry.new)entry.new.forEach(([ref,type,name,desc,st])=>{
            const me={modId:mod.i,modName:mod.n,compIdx:ci,compName:comp.n,action:'add',order};
            if(!state[ref]){const e={n:name||ref,type:type||'misc',desc:desc||'',ref,icon:'items/icons/I'+encodeURIComponent(ref)+'.png',vanilla:false,activeMods:[me],winner:me,hasConflict:false,addedBy:mod.n};if(st){if(st.special){e.special=st.special;const s={...st};delete s.special;e.stats=s}else{e.stats=st}}
              // Empty-shell mod items: no display name AND no description means
              // the mod never surfaced this as a player-equippable item. These
              // are engine helpers (creature attacks, projectile holders, summon
              // effects) that got scanned as COPY targets — hide them from the
              // main tabs the same way we hide internal vanilla items.
              if(!name&&!desc)e.internal=true;
              // Creature-attack items: the resref exists only to give an NPC/
              // monster a strike. Recognize names that are literally "Attack"
              // (optionally with +N enchantment) or end with " Attack" (e.g.
              // "Shadow Elemental Attack").
              else if(name){
                const n=name.trim();
                if(/^Attack(\s*\+\d+)?$/i.test(n)||/\sAttack$/i.test(n))e.internal=true;
                // Dialogue-name detection: real item names never contain sentence
                // punctuation. Any of these is a misrouted strref:
                //   • `?` or `!` anywhere (questions/exclamations)
                //   • `. ` anywhere (mid-sentence period-space)
                //   • ends with `.` and name is >15 chars (declarative line)
                //   • plain >40 chars catches paragraph-style leaks
                else if(n.includes('?')||n.includes('!')||n.includes('. ')||(n.endsWith('.')&&n.length>15)||n.length>40)e.internal=true;
                // Empty-shell mod items: no description is usually enough signal
                // that the item is either (a) a creature-attack inventory marker,
                // (b) a placeholder/debug entry (e.g. iiItemMod "Empty Bottle"),
                // or (c) an item with a broken strref extraction. We gate this
                // off only on AC attribution — monster weapons have dmg/profType
                // too, so those don't count as evidence of a real player item.
                else if(!desc&&!(e.stats&&e.stats.ac!=null)&&!e.special&&n.length<=30)e.internal=true;
              }
              state[ref]=e}
            else if(!state[ref].activeMods.some(x=>x.modId===me.modId&&x.action===me.action))state[ref].activeMods.push(me);
          });
          order++;
        });
      })});
    }
    Object.values(state).forEach(it=>{
      const modifiers=it.activeMods.filter(m=>m.action==='modify'||m.action==='replace');
      it.hasConflict=modifiers.length>1;
    });
    return state;
  },[vanillaItems,D,sel,catMap,detailVer]);

  // Get types for current category tab
  const catTypes=useMemo(()=>{
    const cat=ITEM_CATS.find(c=>c[0]===subTab);
    return cat?cat[2]:[];
  },[subTab]);

  // Filter and sort items
  const itemList=useMemo(()=>{
    const fl=filter.toLowerCase();
    return Object.values(resolvedItems)
      .filter(item=>{
        // Internal items show only in the Internal tab; other tabs hide them
        if(item.internal&&subTab!=='internal')return false;
        // Internal tab also accepts internal-flagged equipment items even though their type
        // (e.g., "ring", "helmet") isn't in the internal catTypes list
        if(subTab==='internal'&&item.internal){/* allow */}
        else if(!catTypes.includes(item.type))return false;
        if(typeFilter&&item.type!==typeFilter)return false;
        if(fl&&!item.n.toLowerCase().includes(fl)&&!item.ref.toLowerCase().includes(fl)&&!(item.desc||'').toLowerCase().includes(fl))return false;
        // Class filter
        if(classFilter){
          const us=item.usability||(item.stats&&item.stats.usability);
          if(us&&us.classes&&!us.classes.includes(classFilter))return false;
        }
        // Charges filter
        if(chargesOnly){
          const ch=item.charges||(item.stats&&item.stats.charges);
          if(!ch)return false;
        }
        // Hand filter (weapons only)
        if(handFilter){
          const stats=item.stats||{};
          const isW=stats.dmg||stats.thac0||stats.dmgBonus;
          if(isW){
            if(handFilter==='2h'&&!stats.twoHanded)return false;
            if(handFilter==='1h'&&stats.twoHanded)return false;
          }
        }
        // Special type filter
        if(specialFilter){
          const sp=item.special||(item.stats&&Array.isArray(item.stats.special)?item.stats.special:[]);
          if(!sp.some(s=>s.type===specialFilter))return false;
        }
        if(affectedOnly&&(!item.activeMods||item.activeMods.length===0))return false;
        if(conflictsOnly&&!item.hasConflict)return false;
        return true;
      })
      .sort((a,b)=>{
        // Sort on the prettified, suffix-stripped name so the order matches what
        // the user actually sees on the cards (raw `n` may contain <CHARNAME>
        // tokens, `+N` or ` AC N` suffixes that throw off plain alphabetical sort).
        // Tiebreak by enchantment desc so "Backbiter +3" precedes "Backbiter +1".
        const sortName=it=>prettifyItemName(it.n)
          .replace(/\s+AC\s*\d+\s*$/i,'')
          .replace(/\s\+\d+/g,'')
          .replace(/\s+,/g,',')
          .replace(/\s{2,}/g,' ')
          .trim();
        const nameCmp=sortName(a).localeCompare(sortName(b))||((b.ench||0)-(a.ench||0));
        if(sortBy==='name')return nameCmp;
        if(sortBy==='type')return a.type.localeCompare(b.type)||nameCmp;
        if(sortBy==='price')return(b.price||0)-(a.price||0);
        if(sortBy==='ench')return(b.ench||0)-(a.ench||0);
        return 0;
      });
  },[resolvedItems,catTypes,filter,sortBy,typeFilter,classFilter,chargesOnly,handFilter,specialFilter,affectedOnly,conflictsOnly]);

  // Group same-name + same-source + same-TYPE items into a single card with a variants list.
  // Source = mod ID for added items, "vanilla" for vanilla items. Internal tab and the
  // Miscellaneous category skip grouping (these often legitimately reuse names).
  // Grouping keyed on type so e.g. "Hero's Resolve" produces a separate card per
  // weapon type (large sword, mace, dagger, etc.) rather than collapsing everything.
  const groupedItemList=useMemo(()=>{
    // Internal tab uses a plain table view, so grouping isn't applied there.
    // Miscellaneous DID skip grouping historically but that left dozens of
    // duplicate cards (Blue Globe ×4, Book of Infinite Spells ×11, etc.) —
    // those are textbook variants and should collapse like other categories.
    if(subTab==='internal')return itemList.map(it=>({...it,variants:[it]}));
    const groups=new Map();
    const order=[];
    // Strip trailing rating suffixes so naming variants collapse into one card:
    //   "+N" (enchantment) — "Aster's Edge +3/+4/+5" → "Aster's Edge"
    //   "AC N" — "Bracers of Defense AC 8/7/5/4/3" → "Bracers of Defense"
    // Source is intentionally NOT in the key: mod clones of a vanilla item
    // (e.g. CMTSW10 "Blade of Roses +3" duplicates SW1H40) appear in one card
    // with both refs, not as two separate cards.
    const baseName=n=>prettifyItemName(n)
      .replace(/\s+AC\s*\d+\s*$/i,'')
      .replace(/\s\+\d+/g,'')
      .replace(/\s+,/g,',')
      .replace(/\s{2,}/g,' ')
      .trim();
    itemList.forEach(it=>{
      const key=baseName(it.n)+'\x00'+(it.type||'');
      if(groups.has(key)){
        groups.get(key).variants.push(it);
      }else{
        const g={...it,variants:[it]};
        groups.set(key,g);
        order.push(g);
      }
    });
    // Pick the "primary" variant per group: prefer vanilla (more universal data),
    // then highest enchantment, then best AC (most-negative stats.ac = strongest),
    // then alphabetical resref. AC tiebreak puts "Bracers of Defense AC 3" (best)
    // on the card's face when collapsing the AC 8/7/5/4/3 series.
    order.forEach(g=>{
      if(g.variants.length>1){
        g.variants.sort((a,b)=>{
          if(a.vanilla!==b.vanilla)return a.vanilla?-1:1;
          const enchDiff=(b.ench||0)-(a.ench||0);
          if(enchDiff)return enchDiff;
          const acA=a.stats?.ac,acB=b.stats?.ac;
          if(acA!=null&&acB!=null&&acA!==acB)return acA-acB;
          return a.ref.localeCompare(b.ref);
        });
        // Promote the primary variant's data to the group representative
        const v=g.variants;
        Object.assign(g,v[0],{variants:v});
      }
    });
    return order;
  },[itemList,subTab]);

  // Stats per category (from resolved items including mod-added)
  const catCounts=useMemo(()=>{
    const counts={};
    ITEM_CATS.forEach(([key,,types])=>{
      if(key==='internal'){
        // Internal tab gets all internal-flagged items + items already typed as internal
        counts[key]=Object.values(resolvedItems).filter(it=>it.internal||types.includes(it.type)).length;
      }else{
        counts[key]=Object.values(resolvedItems).filter(it=>!it.internal&&types.includes(it.type)).length;
      }
    });
    return counts;
  },[resolvedItems]);

  // Sub-type breakdown for current tab (unfiltered by typeFilter so counts stay stable)
  const typeCounts=useMemo(()=>{
    const fl=filter.toLowerCase();
    const counts={};
    Object.values(resolvedItems).forEach(item=>{
      if(item.internal&&subTab!=='internal')return;
      if(subTab!=='internal'&&!catTypes.includes(item.type))return;
      if(subTab==='internal'&&!item.internal&&!catTypes.includes(item.type))return;
      if(fl&&!item.n.toLowerCase().includes(fl)&&!item.ref.toLowerCase().includes(fl)&&!(item.desc||'').toLowerCase().includes(fl))return;
      counts[item.type]=(counts[item.type]||0)+1;
    });
    return counts;
  },[resolvedItems,catTypes,filter,subTab]);

  const navigateToMod=(modId)=>{const mod=D&&D.find(m=>m.i===modId);if(mod&&onGoToMod)onGoToMod(mod)};

  const ITEM_CLASS_LIST=['Fighter','Mage','Sorcerer','Cleric','Ranger','Paladin','Thief','Druid','Bard','Monk','Barbarian','Shaman'];
  const SPECIAL_TYPES=[['immunity','Immunity'],['resistance','Resistance'],['ability','Ability'],['regen','Regen'],['extraSpellSlot','Spell Slot'],['freeAction','Free Action'],['other','Other']];
  const isWeaponsCategory=subTab==='weapons'||subTab==='ranged';
  const activeFilterCount=(classFilter?1:0)+(chargesOnly?1:0)+(handFilter?1:0)+(specialFilter?1:0);

  return(<div className="spell-panel">
    <div className="spell-toolbar">
      <span style={{fontSize:'.72rem',color:'var(--txd)'}}>Sort:</span>
      {[['name','Name'],['type','Type'],['price','Price'],['ench','Ench.']].map(([k,label])=>
        <Pill key={k} active={sortBy===k} onClick={()=>setSortBy(k)} style={{fontSize:'.72rem'}}>{label}</Pill>
      )}
      <span style={{borderLeft:'1px solid var(--brd)',height:18,margin:'0 4px'}}/>
      <FilterTip kind="affected" entityPlural="items" t={t}>
        <Pill active={affectedOnly} onClick={()=>setAffectedOnly(!affectedOnly)} style={{fontSize:'.72rem'}}>Affected only</Pill>
      </FilterTip>
      <FilterTip kind="conflicts" entityPlural="items" t={t}>
        <Pill active={conflictsOnly} onClick={()=>setConflictsOnly(!conflictsOnly)} style={{fontSize:'.72rem'}}>Conflicts only</Pill>
      </FilterTip>
      <span style={{borderLeft:'1px solid var(--brd)',height:18,margin:'0 4px'}}/>
      <Pill active={showFilters} onClick={()=>setShowFilters(!showFilters)} style={{fontSize:'.72rem'}} title="Toggle filters">
        Filters{activeFilterCount>0?' ('+activeFilterCount+')':''}
      </Pill>
      {activeFilterCount>0&&<Pill onClick={()=>{setClassFilter('');setChargesOnly(false);setHandFilter('');setSpecialFilter(null)}} style={{fontSize:'.72rem',color:'var(--red)'}} title="Clear all filters" ariaLabel="Clear all filters">{"\u2715"} Clear</Pill>}
    </div>
    {showFilters&&<div style={{display:'flex',gap:8,flexWrap:'wrap',padding:'4px 12px',borderBottom:'1px solid var(--brd)',background:'var(--bgs)',alignItems:'center'}}>
      <div style={{display:'flex',gap:4,alignItems:'center'}}>
        <span style={{fontSize:'.65rem',color:'var(--txd)'}}>Usable by:</span>
        <select value={classFilter} onChange={e=>setClassFilter(e.target.value)} style={{fontSize:'.7rem',padding:'2px 6px',background:'var(--bg2)',color:'var(--tx)',border:'1px solid var(--brd)',borderRadius:4}}>
          <option value="">Any class</option>
          {ITEM_CLASS_LIST.map(c=><option key={c} value={c}>{c}</option>)}
        </select>
      </div>
      <div style={{display:'flex',gap:3,alignItems:'center'}}>
        <span style={{fontSize:'.65rem',color:'var(--txd)'}}>Special:</span>
        {SPECIAL_TYPES.map(([k,lbl])=>
          <span key={k} onClick={()=>setSpecialFilter(specialFilter===k?null:k)} style={{fontSize:'.6rem',padding:'1px 6px',borderRadius:8,background:specialFilter===k?'var(--gold15)':'var(--bg2)',color:specialFilter===k?'var(--gold)':'var(--txd)',border:'1px solid '+(specialFilter===k?'var(--goldd)':'var(--brd)'),cursor:'pointer'}}>{lbl}</span>
        )}
      </div>
      <Pill active={chargesOnly} onClick={()=>setChargesOnly(!chargesOnly)} style={{fontSize:'.65rem'}}>Has charges</Pill>
      {isWeaponsCategory&&<div style={{display:'flex',gap:3,alignItems:'center'}}>
        <span style={{fontSize:'.65rem',color:'var(--txd)'}}>Hand:</span>
        {[['','All'],['1h','1H'],['2h','2H']].map(([k,lbl])=>
          <span key={k||'all'} onClick={()=>setHandFilter(k)} style={{fontSize:'.6rem',padding:'1px 6px',borderRadius:8,background:handFilter===k?'var(--gold15)':'var(--bg2)',color:handFilter===k?'var(--gold)':'var(--txd)',border:'1px solid '+(handFilter===k?'var(--goldd)':'var(--brd)'),cursor:'pointer'}}>{lbl}</span>
        )}
      </div>}
    </div>}

    <div className="spell-subtabs">
      {ITEM_CATS.map(([k,label])=>{
        const cnt=catCounts[k]||0;
        return <div key={k} className={"spell-subtab"+(subTab===k?' ac':'')} onClick={()=>setSubTab(k)}>{label}{' ('+cnt+')'}</div>;
      })}
    </div>

    {/* Type breakdown pills */}
    {Object.keys(typeCounts).length>1&&<div style={{display:'flex',gap:4,flexWrap:'wrap',padding:'4px 12px',borderBottom:'1px solid var(--brd)'}}>
      {catTypes.filter(t=>typeCounts[t]).map(t=>
        <span key={t} onClick={()=>setTypeFilter(typeFilter===t?null:t)} style={{fontSize:'.62rem',padding:'1px 6px',borderRadius:8,background:typeFilter===t?'var(--gold15)':'var(--bg2)',color:typeFilter===t?'var(--gold)':(ITEM_CAT_COLORS[t]||'var(--txd)'),border:'1px solid '+(typeFilter===t?'var(--goldd)':'var(--brd)'),cursor:'pointer'}}>{t} <b>{typeCounts[t]}</b></span>
      )}
    </div>}

    {itemList.length>0?<div>
      {subTab==='internal'?<div style={{padding:'0 8px'}}>
        <div style={{fontSize:'.72rem',color:'var(--txd)',marginBottom:8}}>Creature weapons, broken items, keys, containers, familiars, and other non-equippable internal items. These are not player-facing equipment.</div>
        <table style={{width:'100%',borderCollapse:'collapse',fontSize:'.72rem'}}>
          <thead><tr style={{borderBottom:'1px solid var(--brd)',textAlign:'left'}}>
            <th style={{padding:'4px 8px',color:'var(--txd)',fontWeight:600}}>Resref</th>
            <th style={{padding:'4px 8px',color:'var(--txd)',fontWeight:600}}>Name</th>
            <th style={{padding:'4px 8px',color:'var(--txd)',fontWeight:600}}>Type</th>
          </tr></thead>
          <tbody>{itemList.map(item=>
            <tr key={item.ref} style={{borderBottom:'1px solid var(--bg2)'}}>
              <td style={{padding:'3px 8px',fontFamily:'monospace',fontSize:'.62rem',color:'var(--txd)'}}>{item.ref}</td>
              <td style={{padding:'3px 8px',color:'var(--tx)'}}>{prettifyItemName(item.n)}{item.ench?<span style={{color:'var(--gold)',marginLeft:4}}>+{item.ench}</span>:''}</td>
              <td style={{padding:'3px 8px',color:ITEM_CAT_COLORS[item.type]||'var(--txd)'}}><span>{item.type}</span>{getItemNameTags(item.n).map(t=><React.Fragment key={t}><span style={{color:'var(--txd)',opacity:.5,margin:'0 4px'}}>·</span><NameTagBadge tag={t}/></React.Fragment>)}</td>
            </tr>
          )}</tbody>
        </table>
      </div>:<div className="spell-grid">
        {groupedItemList.slice(0,chunkLimit).map(item=>{
          const enchLabel=item.ench&&!item.n.match(/\+\d+\s*$/)?'+'+item.ench:'';
          // Vanilla item that has mod-added clones in its variants list — treat
          // the group as TWEAKED rather than VANILLA so the user sees that mods
          // are doing something with this name even if not literally modifying
          // the vanilla resref.
          const hasModVariant=item.vanilla===true&&item.variants&&item.variants.some(v=>v.vanilla===false);
          const actionInfo=item.winner?ACTION_STYLES[item.winner.action]:(hasModVariant?ACTION_STYLES.tweak:null);
          const stats=item.stats||{};
          const isWeapon=stats.dmg||stats.thac0||stats.dmgBonus;
          const badges=[];
          if(isWeapon){
            const dmgStr=stats.dmg?(stats.dmg+(stats.dmgBonus?(stats.dmgBonus>0?'+':'')+stats.dmgBonus:'')):'';
            if(dmgStr)badges.push({k:'dmg',t:dmgStr,c:'var(--red)',ti:'Damage'});
            if(stats.thac0)badges.push({k:'tha',t:'THAC0'+(stats.thac0>0?'+':'')+stats.thac0,c:'var(--org)',ti:'THAC0 bonus'});
            if(stats.speed)badges.push({k:'spd',t:'Spd '+stats.speed,c:'var(--cyn)',ti:'Speed factor (lower=faster)'});
            if(stats.apr)badges.push({k:'apr',t:'APR+'+stats.apr,c:'var(--gold)',ti:'Extra attacks per round'});
            if(stats.twoHanded)badges.push({k:'2h',t:'2H',c:'var(--txd)',ti:'Two-handed'});
          }else{
            if(stats.ac!=null){
              const acText=item.type==='armor'?('AC '+stats.ac):('AC'+(stats.ac>0?'+':'')+stats.ac);
              badges.push({k:'ac',t:acText,c:'var(--blu)',ti:'Armor Class'});
            }
            if(stats.saves)badges.push({k:'sv',t:'Save+'+stats.saves,c:'var(--grn)',ti:'All saves bonus'});
          }
          if(stats.magicResist)badges.push({k:'mr',t:'MR '+stats.magicResist+'%',c:'var(--pur)',ti:'Magic Resistance'});
          if(stats.fireResist)badges.push({k:'fr',t:'🔥'+stats.fireResist+'%',c:'#ff6b3d',ti:'Fire Resistance'});
          if(stats.coldResist)badges.push({k:'cr',t:'❄'+stats.coldResist+'%',c:'#7ec8ff',ti:'Cold Resistance'});
          ['str','dex','con','int','wis','cha'].forEach(s=>{
            if(stats[s])badges.push({k:s,t:s.toUpperCase()+(stats[s]>0?'+':'')+stats[s],c:'var(--gold)',ti:'Ability bonus'});
          });
          const specials=item.special||(stats.special&&Array.isArray(stats.special)?stats.special:[]);
          const specIcons=specials.slice(0,2).map((s,i)=>{
            const map={immunity:'🛡',resistance:'🛡',regen:'♻',freeAction:'🦶',ability:'⚡',extraSpellSlot:'📖',other:'✦'};
            const ic=map[s.type]||'✦';
            const tt=s.target?(s.type+': '+s.target+(s.value?' '+s.value+'%':'')):(s.desc||s.type);
            return {k:'sp'+i,t:ic,c:'var(--gold)',ti:tt};
          });
          const charges=item.charges||stats.charges;
          const chargeBadge=charges?{k:'ch',t:charges.count+(charges.period==='day'?'/day':charges.period==='single use'?' chgs':''),c:'var(--gold)',ti:'Charges: '+charges.count+' '+charges.period}:null;
          const usability=item.usability||stats.usability;
          const hasUsabilityRestriction=usability&&usability.classes&&usability.classes.length<6;
          const usabilityBadge=hasUsabilityRestriction?{k:'us',t:'🔒',c:'var(--txd)',ti:'Restricted: '+usability.classes.join(', ')}:null;
          const allBadges=[...badges,...specIcons];
          if(chargeBadge)allBadges.push(chargeBadge);
          if(usabilityBadge)allBadges.push(usabilityBadge);

          const itemStatus=item.hasConflict?'CONFLICT':item.vanilla===false?'ADDED':item.activeMods&&item.activeMods.length>0?'MODIFIED':'VANILLA';
          return <div key={item.ref} className={"spell-card"+(item.hasConflict?' has-conflict':item.vanilla===false?' is-added':item.activeMods&&item.activeMods.length>0?' has-mods':'')} style={{borderLeft:'3px solid '+(ITEM_CAT_COLORS[item.type]||'var(--brd)'),cursor:'pointer'}} {...clickableProps(prettifyItemName(item.n)+' \u2014 '+item.type+' \u2014 '+itemStatus,()=>setDetailItem(item))}>
            <div className={"card-action-bar "+(actionInfo?actionInfo[1]:'action-vanilla')}>{actionInfo?actionInfo[0]:'VANILLA'}</div>
            <div className="spell-icon"><ItemIcon item={item} size={32}/></div>
            {/* Card name strips every "+N" anywhere in the string (not just at
                the end) and " AC N" trailing suffix for a cleaner header —
                handles both "Aster's Edge +5" and "Long Sword +3 'Purifier'".
                Enchantment/AC info is still surfaced via the stats badges and
                the modal header keeps the full "+N" text. */}
            <div className="spell-name">{prettifyItemName(item.n).replace(/\s+AC\s*\d+\s*$/i,'').replace(/\s\+\d+/g,'').replace(/\s+,/g,',').replace(/\s{2,}/g,' ').trim()}</div>
            <div className="spell-school" style={{color:ITEM_CAT_COLORS[item.type]||'var(--txd)',display:'flex',gap:6,alignItems:'center',justifyContent:'center',flexWrap:'wrap'}}>
              <span>{item.type}</span>
              {getItemNameTags(item.n).map(t=><React.Fragment key={t}><span style={{color:'var(--txd)',opacity:.5}}>·</span><NameTagBadge tag={t}/></React.Fragment>)}
            </div>
            {allBadges.length>0&&<div style={{display:'flex',gap:3,flexWrap:'wrap',justifyContent:'center',marginTop:2,padding:'0 4px'}}>
              {allBadges.map(b=><span key={b.k} title={b.ti} style={{fontSize:'.55rem',padding:'1px 5px',borderRadius:6,background:'var(--bg2)',color:b.c,border:'1px solid var(--brd)',whiteSpace:'nowrap'}}>{b.t}</span>)}
            </div>}
            <div style={{display:'flex',gap:8,fontSize:'.58rem',color:'var(--txd)',marginTop:2,justifyContent:'center'}}>
              {item.price!=null&&<span>💰 {item.price.toLocaleString()}</span>}
              {item.wt!=null&&<span>⚖ {item.wt} lb</span>}
            </div>
            {(item.desc||(item.variants&&item.variants.length>1))&&<div className="card-info">
              {item.desc&&<div className="spell-desc">{prettifyItemText(item.desc)}</div>}
              {item.variants&&item.variants.length>1&&<div style={{fontSize:'.58rem',color:'var(--txd)',textAlign:'center',fontStyle:'italic'}}>{item.variants.length} variants</div>}
            </div>}
            {/* For vanilla items with mod-added clones (TWEAKED), synthesize a
                tweak-action activeMods list from the variants so the footer
                shows which mod(s) added the clones. Real activeMods (modify/
                replace entries on the vanilla item) take priority unchanged. */}
            <CardFooter activeMods={hasModVariant&&!item.activeMods?.length?item.variants.filter(v=>v.vanilla===false).flatMap(v=>v.activeMods||[]).map(m=>({...m,action:'tweak'})):item.activeMods} winner={item.winner} refId={item.ref} onNavigate={navigateToMod}/>
          </div>;
        })}
      </div>}
      {subTab!=='internal'&&groupedItemList.length>chunkLimit&&<div ref={setSentinel} style={{padding:'12px',textAlign:'center',fontSize:'.7rem',color:'var(--txd)'}}>Loading more... ({chunkLimit} of {groupedItemList.length})</div>}
    </div>:<EmptyGrid entity="Item" entityPlural="items" filter={filter} affectedOnly={affectedOnly} conflictsOnly={conflictsOnly} extraReason="No items in this category."/>}
    {detailItem&&<ItemDetailModal item={detailItem} onClose={()=>setDetailItem(null)} onGoToMod={mid=>{const m=D&&D.find(x=>x.i===mid);if(m&&onGoToMod){setDetailItem(null);onGoToMod(m)}}}/>}
  </div>);
}

// ═══ Item Detail Modal ═══
function ItemDetailModal({item,onClose,onGoToMod}){
  const{t}=useLang();const stats=item.stats||{};
  const specials=item.special||(stats.special&&Array.isArray(stats.special)?stats.special:[]);
  const charges=item.charges||stats.charges;
  const usability=item.usability||stats.usability;
  const isWeapon=stats.dmg||stats.thac0||stats.dmgBonus;

  // Build stats grid entries
  const statRows=[];
  if(isWeapon){
    if(stats.dmg)statRows.push(['Damage',stats.dmg+(stats.dmgBonus?(stats.dmgBonus>0?'+':'')+stats.dmgBonus:'')]);
    if(stats.thac0)statRows.push(['THAC0 Bonus',(stats.thac0>0?'+':'')+stats.thac0]);
    if(stats.speed)statRows.push(['Speed Factor',stats.speed]);
    if(stats.apr)statRows.push(['Extra APR','+'+stats.apr]);
    if(stats.twoHanded)statRows.push(['Two-handed','Yes']);
    if(item.profType)statRows.push(['Proficiency',item.profType]);
    if(stats.profType)statRows.push(['Proficiency',stats.profType]);
  }
  if(stats.ac!=null)statRows.push([item.type==='armor'?'Armor Class':'AC Bonus',item.type==='armor'?stats.ac:((stats.ac>0?'+':'')+stats.ac)]);
  if(stats.saves)statRows.push(['All Saves','+'+stats.saves]);
  ['saveDeath','saveWand','savePoly','saveBreath','saveSpell'].forEach(k=>{if(stats[k])statRows.push([k.replace('save',t('detail.save_vs','Save vs. ')),(stats[k]>0?'+':'')+stats[k]])});
  ['str','dex','con','int','wis','cha'].forEach(k=>{if(stats[k])statRows.push([k.toUpperCase()+' Bonus',(stats[k]>0?'+':'')+stats[k]])});
  if(stats.magicResist)statRows.push(['Magic Resistance',stats.magicResist+'%']);
  if(stats.fireResist)statRows.push(['Fire Resistance',stats.fireResist+'%']);
  if(stats.coldResist)statRows.push(['Cold Resistance',stats.coldResist+'%']);
  if(item.price!=null)statRows.push(['Price',item.price.toLocaleString()+' gp']);
  if(item.wt!=null)statRows.push(['Weight',item.wt+' lb']);

  // Group specials by type
  const groupedSpecials={};
  specials.forEach(s=>{const t=s.type||'other';if(!groupedSpecials[t])groupedSpecials[t]=[];groupedSpecials[t].push(s)});

  // Build usability summary
  const usabilityRows=[];
  if(usability){
    if(usability.classes)usabilityRows.push(['Allowed Classes',usability.classes.join(', ')]);
    if(usability.races)usabilityRows.push(['Allowed Races',usability.races.join(', ')]);
    if(usability.excludedAlignments)usabilityRows.push(['Excluded Alignments',usability.excludedAlignments.join(', ')]);
    ['minStr','minStrBonus','minDex','minCon','minInt','minWis','minCha','minLevel'].forEach(k=>{
      if(usability[k]){const lbl='Min '+k.slice(3);usabilityRows.push([lbl,usability[k]])}
    });
  }

  return <div className="mo" onClick={onClose}>
    <div className="md" onClick={e=>e.stopPropagation()} style={{maxWidth:560,width:'90%',maxHeight:'85vh',overflowY:'auto'}}>
      {/* Header */}
      <div style={{display:'flex',gap:12,alignItems:'center',marginBottom:12,paddingBottom:10,borderBottom:'1px solid var(--brd)'}}>
        <div style={{width:48,height:48,flexShrink:0,background:'var(--bg3)',borderRadius:4,overflow:'hidden'}}><ItemIcon item={item}/></div>
        <div style={{flex:1,minWidth:0}}>
          <div style={{fontSize:'1.05rem',color:'var(--gold)',fontWeight:600}}>{prettifyItemName(item.n)}{item.ench&&!item.n.match(/\+\d+\s*$/)&&<span style={{marginLeft:6}}>+{item.ench}</span>}</div>
          <div style={{display:'flex',gap:8,alignItems:'center',marginTop:2,flexWrap:'wrap'}}>
            <span style={{fontSize:'.7rem',padding:'1px 8px',borderRadius:8,background:'var(--bg2)',color:ITEM_CAT_COLORS[item.type]||'var(--txd)',border:'1px solid var(--brd)'}}>{item.type}</span>
            {getItemNameTags(item.n).map(t=><React.Fragment key={t}><span style={{color:'var(--txd)',opacity:.5}}>·</span><NameTagBadge tag={t}/></React.Fragment>)}
            <RefChip refId={item.ref}/>
            {item.vanilla===false&&<span className="action-badge action-add" style={{fontSize:'.55rem'}}>ADDED</span>}
            {item.hasConflict&&<span style={{fontSize:'.55rem',padding:'1px 6px',borderRadius:4,background:'var(--bg-err)',color:'var(--red)'}}>CONFLICT</span>}
          </div>
        </div>
        <button className="bt" onClick={onClose} style={{fontSize:'.8rem',padding:'4px 10px'}}>{"\u2715"}</button>
      </div>

      {/* Stats grid */}
      {statRows.length>0&&<div style={{marginBottom:14}}>
        <h4 style={{fontSize:'.78rem',color:'var(--tx)',margin:'0 0 6px',textTransform:'uppercase',letterSpacing:'.5px'}}>Stats</h4>
        <div style={{display:'grid',gridTemplateColumns:'repeat(2, 1fr)',gap:'2px 12px'}}>
          {statRows.map(([k,v])=><div key={k} style={{display:'flex',justifyContent:'space-between',fontSize:'.72rem',padding:'2px 0',borderBottom:'1px solid var(--bg2)'}}>
            <span style={{color:'var(--txd)'}}>{k}</span><span style={{color:'var(--tx)',fontWeight:600}}>{v}</span>
          </div>)}
        </div>
      </div>}

      {/* Charges */}
      {charges&&<div style={{marginBottom:14,padding:8,background:'var(--bg2)',borderRadius:4,border:'1px solid var(--brd)'}}>
        <span style={{fontSize:'.7rem',color:'var(--gold)',fontWeight:600}}>Charges:</span>
        <span style={{fontSize:'.78rem',marginLeft:8,color:'var(--tx)'}}>{charges.count} {charges.period==='day'?'/ day':charges.period==='single use'?'(single use)':charges.period}</span>
      </div>}

      {/* Special abilities grouped */}
      {Object.keys(groupedSpecials).length>0&&<div style={{marginBottom:14}}>
        <h4 style={{fontSize:'.78rem',color:'var(--tx)',margin:'0 0 6px',textTransform:'uppercase',letterSpacing:'.5px'}}>Special Abilities</h4>
        {groupedSpecials.immunity&&<div style={{marginBottom:6,fontSize:'.72rem'}}><span style={{color:'var(--blu)',fontWeight:600}}>Immunities: </span><span style={{color:'var(--tx)'}}>{groupedSpecials.immunity.map(s=>s.target).join(', ')}</span></div>}
        {groupedSpecials.resistance&&<div style={{marginBottom:6,fontSize:'.72rem'}}><span style={{color:'var(--cyn)',fontWeight:600}}>Resistances: </span><span style={{color:'var(--tx)'}}>{groupedSpecials.resistance.map(s=>s.target+' '+s.value+'%').join(', ')}</span></div>}
        {groupedSpecials.regen&&groupedSpecials.regen.map((s,i)=><div key={'r'+i} style={{marginBottom:4,fontSize:'.72rem',color:'var(--grn)'}}>♻ {s.desc}</div>)}
        {groupedSpecials.freeAction&&<div style={{marginBottom:4,fontSize:'.72rem',color:'var(--gold)'}}>🦶 Free Action — immune to slow, web, hold, paralysis</div>}
        {groupedSpecials.extraSpellSlot&&groupedSpecials.extraSpellSlot.map((s,i)=><div key={'es'+i} style={{marginBottom:4,fontSize:'.72rem',color:'var(--pur)'}}>📖 +1 {s.spellType||'wizard'} spell slot at level {s.level}</div>)}
        {groupedSpecials.ability&&<div style={{marginBottom:6,fontSize:'.72rem'}}><span style={{color:'var(--gold)',fontWeight:600}}>Castable Abilities: </span><span style={{color:'var(--tx)'}}>{groupedSpecials.ability.map(s=>s.desc).join(', ')}</span></div>}
        {groupedSpecials.other&&groupedSpecials.other.map((s,i)=><div key={'o'+i} style={{marginBottom:4,fontSize:'.72rem',color:'var(--tx)'}}>✦ {s.desc}</div>)}
      </div>}

      {/* Usability / Requirements */}
      {usabilityRows.length>0&&<div style={{marginBottom:14}}>
        <h4 style={{fontSize:'.78rem',color:'var(--tx)',margin:'0 0 6px',textTransform:'uppercase',letterSpacing:'.5px'}}>Requirements</h4>
        {usabilityRows.map(([k,v])=><div key={k} style={{fontSize:'.72rem',padding:'2px 0',display:'flex',justifyContent:'space-between'}}>
          <span style={{color:'var(--txd)',marginRight:8,minWidth:140}}>{k}:</span><span style={{color:'var(--tx)',textAlign:'right',flex:1}}>{v}</span>
        </div>)}
      </div>}

      {/* Variants list grouped by weapon/item type */}
      {item.variants&&item.variants.length>1&&(()=>{
        const byType={};
        item.variants.forEach(v=>{(byType[v.type]||(byType[v.type]=[])).push(v)});
        const orderedTypes=Object.keys(byType).sort((a,b)=>byType[b].length-byType[a].length||a.localeCompare(b));
        return <div style={{marginBottom:14}}>
          <h4 style={{fontSize:'.78rem',color:'var(--tx)',margin:'0 0 6px',textTransform:'uppercase',letterSpacing:'.5px'}}>Variants ({item.variants.length})</h4>
          <div style={{fontSize:'.7rem',color:'var(--txd)',marginBottom:6}}>Items with this name across vanilla and selected mods. All exist in-game as separate references.</div>
          {orderedTypes.map(t=>{
            const group=byType[t];
            return <div key={t} style={{marginBottom:6,padding:'6px 8px',background:'var(--bg2)',borderRadius:4,borderLeft:'2px solid '+(ITEM_CAT_COLORS[t]||'var(--brd)')}}>
              <div style={{fontSize:'.7rem',color:ITEM_CAT_COLORS[t]||'var(--tx)',fontWeight:600,marginBottom:4,textTransform:'capitalize'}}>{t} ({group.length})</div>
              <div style={{display:'grid',gridTemplateColumns:'1fr',gap:'2px 0'}}>
                {group.map(v=>{
                  const vs=v.stats||{};
                  const dmgStr=vs.dmg?(vs.dmg+(vs.dmgBonus?(vs.dmgBonus>0?'+':'')+vs.dmgBonus:'')):'';
                  const sourceLabel=v.vanilla?'vanilla':(v.addedBy||'mod');
                  const sourceColor=v.vanilla?'var(--txd)':'var(--grn)';
                  return <div key={v.ref} style={{fontSize:'.66rem',padding:'1px 0',display:'flex',gap:8,alignItems:'center'}}>
                    <span style={{color:'var(--txd)',fontFamily:'monospace',minWidth:78}}>{v.ref}</span>
                    <span style={{color:sourceColor,fontSize:'.6rem',minWidth:120,fontStyle:v.vanilla?'normal':'italic'}}>{sourceLabel}</span>
                    {dmgStr&&<span style={{color:'var(--red)'}}>{dmgStr}</span>}
                    {vs.ac!=null&&<span style={{color:'var(--blu)'}}>{t==='armor'?'AC '+vs.ac:'AC'+(vs.ac>0?'+':'')+vs.ac}</span>}
                    {vs.thac0!=null&&vs.thac0!==0&&<span style={{color:'var(--gold)'}}>THAC0{vs.thac0>0?'+':''}{vs.thac0}</span>}
                  </div>;
                })}
              </div>
            </div>;
          })}
        </div>;
      })()}

      {/* Description */}
      {item.desc&&<div style={{marginBottom:14}}>
        <h4 style={{fontSize:'.78rem',color:'var(--tx)',margin:'0 0 6px',textTransform:'uppercase',letterSpacing:'.5px'}}>Description</h4>
        <div style={{fontSize:'.72rem',color:'var(--tx)',lineHeight:1.5,whiteSpace:'pre-wrap'}}>{prettifyItemText(item.desc)}</div>
      </div>}

      {/* Mod attribution — adder (if any) + modifiers */}
      {(()=>{const{adder,modifiers}=splitModEntries(item.activeMods);const showFallbackAdder=!adder&&item.vanilla===false&&item.addedBy;if(!adder&&!modifiers.length&&!showFallbackAdder)return null;return <div>
        {adder&&<div style={{marginBottom:modifiers.length?14:0}}>
          <h4 style={{fontSize:'.78rem',color:'var(--tx)',margin:'0 0 6px',textTransform:'uppercase',letterSpacing:'.5px'}}>Added By</h4>
          <div style={{padding:'4px 8px',background:'var(--bg2)',borderLeft:'2px solid var(--grn)',borderRadius:3}}>
            <div style={{fontSize:'.72rem'}}>
              <span className="mod-link" style={{cursor:'pointer'}} onClick={()=>onGoToMod(adder.modId)}>{adder.modName}</span>
              <span style={{color:'var(--txd)',marginLeft:6,fontSize:'.62rem'}}>{" \u00b7 "}{adder.compName||('comp '+adder.compIdx)}</span>
            </div>
            {adder.summary&&<div style={{fontSize:'.66rem',color:'var(--txd)',marginTop:2}}>{adder.summary}</div>}
          </div>
        </div>}
        {showFallbackAdder&&<div style={{marginBottom:modifiers.length?14:0,padding:8,background:'var(--bg2)',borderRadius:4,border:'1px solid var(--brd)'}}>
          <span style={{fontSize:'.7rem',color:'var(--grn)',fontWeight:600}}>Added by:</span>
          <span style={{fontSize:'.78rem',marginLeft:8,color:'var(--tx)'}}>{item.addedBy}</span>
        </div>}
        {modifiers.length>0&&<div>
          <h4 style={{fontSize:'.78rem',color:'var(--tx)',margin:'0 0 6px',textTransform:'uppercase',letterSpacing:'.5px'}}>Modifications</h4>
          {modifiers.map((m,i)=><div key={i} style={{padding:'4px 8px',marginBottom:4,background:'var(--bg2)',borderLeft:'2px solid '+(m===item.winner?'var(--gold)':'var(--brd)'),borderRadius:3}}>
            <div style={{fontSize:'.72rem'}}>
              <span className="mod-link" style={{cursor:'pointer'}} onClick={()=>onGoToMod(m.modId)}>{m.modName}</span>
              <span style={{color:'var(--txd)',marginLeft:6,fontSize:'.62rem'}}>{" \u00b7 "}{m.compName||('comp '+m.compIdx)}{" \u00b7 "}{(m.action||'').toUpperCase()}</span>
              {m===item.winner&&<span style={{color:'var(--gold)',marginLeft:6,fontSize:'.62rem'}}>WINNER</span>}
            </div>
            {m.summary&&<div style={{fontSize:'.66rem',color:'var(--txd)',marginTop:2}}>{m.summary}</div>}
          </div>)}
        </div>}
      </div>})()}
    </div>
  </div>;
}

// ═══ Kit Detail Modal ═══
function KitDetailModal({kit,abil,onClose,onGoToMod}){
  const{t}=useLang();const k=kit;
  const classColor=KIT_CLASS_COLORS[k.class]||'var(--txd)';
  const classLabel=KIT_CLASS_LABELS[k.class]||k.class;
  const parsed=parseKitName(k.n,k.class);

  const passive=(abil&&abil.passive)||[];
  const activated=(abil&&abil.activated)||[];
  const restr=(abil&&abil.restrictions)||{};
  const statReq=abil&&abil.statReq;
  const statBonus=abil&&abil.statBonus;
  const hlaPool=abil&&abil.hlaPool;
  const spellR=abil&&abil.spellRestrictions;
  const resistB=abil&&abil.resistBonus;
  const canDual=abil&&abil.canDual;
  const canDualTo=abil&&abil.canDualTo;
  const allowedMulti=abil&&abil.allowedMulticlass;
  const npcOnly=abil&&abil.npcOnly;

  // signed=true for stat modifiers (+/-), signed=false for requirements (bare number)
  const fmtStats=(obj,signed)=>{
    const out=[];
    ['str','dex','con','int','wis','cha'].forEach(s=>{
      if(obj[s]!=null){const v=obj[s];
        const str=typeof v==='number'?(signed?(v>=0?'+':'')+v:String(v)):String(v);
        out.push(s.toUpperCase()+' '+str);
      }
    });
    return out;
  };

  return <div className="mo" onClick={onClose}>
    <div className="md" onClick={e=>e.stopPropagation()} style={{maxWidth:560,width:'90%',maxHeight:'85vh',overflowY:'auto'}}>
      <div style={{display:'flex',gap:12,alignItems:'center',marginBottom:12,paddingBottom:10,borderBottom:'1px solid var(--brd)'}}>
        <div style={{width:48,height:48,flexShrink:0,background:'var(--bg3)',borderRadius:4,display:'flex',alignItems:'center',justifyContent:'center',border:'2px solid '+classColor}}>
          <div style={{width:28,height:28,borderRadius:'50%',background:classColor,boxShadow:'0 0 8px '+classColor+'60'}}/>
        </div>
        <div style={{flex:1,minWidth:0}}>
          <div style={{fontSize:'1.05rem',color:'var(--gold)',fontWeight:600}}>{parsed.name}</div>
          {parsed.sub&&<div style={{fontSize:'.7rem',color:'var(--txd)',fontStyle:'italic',marginTop:1}}>{parsed.sub}</div>}
          <div style={{display:'flex',gap:8,alignItems:'center',marginTop:4,flexWrap:'wrap'}}>

function SpellDetailModal({spell,onClose,onGoToMod}){

  if(sp.aoe)statRows.push(['Area of Effect',sp.aoe]);
  if(sp.dur)statRows.push(['Duration',sp.dur]);
  if(sp.sv)statRows.push(['Saving Throw',sp.sv==='none'?'None':'vs. '+sp.sv.charAt(0).toUpperCase()+sp.sv.slice(1)]);

        </div>}

        </div>
        <button className="bt" onClick={onClose} style={{fontSize:'.8rem',padding:'4px 10px'}}>{"\u2715"}</button>
      </div>

      {/* Stats grid */}
      {statRows.length>0&&<div style={{marginBottom:14}}>
        <h4 style={{fontSize:'.78rem',color:'var(--tx)',margin:'0 0 6px',textTransform:'uppercase',letterSpacing:'.5px'}}>Stats</h4>
        <div style={{display:'grid',gridTemplateColumns:'repeat(2, 1fr)',gap:'2px 12px'}}>
          {statRows.map(([k,v])=><div key={k} style={{display:'flex',justifyContent:'space-between',fontSize:'.72rem',padding:'2px 0',borderBottom:'1px solid var(--bg2)'}}>
            <span style={{color:'var(--txd)'}}>{k}</span><span style={{color:'var(--tx)',fontWeight:600}}>{v}</span>

          </div>
        </div>}
        {showFallbackAdder&&<div style={{marginBottom:modifiers.length?14:0,padding:8,background:'var(--bg2)',borderRadius:4,border:'1px solid var(--brd)'}}>
          <span style={{fontSize:'.7rem',color:'var(--grn)',fontWeight:600}}>Added by:</span>
